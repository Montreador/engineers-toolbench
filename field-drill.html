<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16181D">
<title>Field Drill · Maintenance Engineering Card Decks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16181D;
    --panel:#1E2128;
    --panel-2:#232730;
    --line:#31353F;
    --line-soft:#282C34;
    --ink:#E9E7E2;
    --muted:#8B929C;
    --faint:#5A616B;
    --bn:#C0803F;   /* conductor brown  +24V */
    --bu:#3B8CD1;   /* conductor blue   0V   */
    --bk:#C9CDD4;   /* conductor black  signal (light so it reads on dark) */
    --amber:#F0B429;/* energised / active / flip affordance */
    --green:#4FA96A;/* got it */
    --red:#E05646;  /* review / danger */
    --shadow:0 18px 40px -18px rgba(0,0,0,.7),0 2px 0 rgba(255,255,255,.02) inset;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #1b1e25 0%, var(--bg) 55%);
    color:var(--ink);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;
    padding:
      max(14px,env(safe-area-inset-top))
      14px
      max(14px,env(safe-area-inset-bottom));
    min-height:100dvh;
  }
  .app{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px}

  /* ---------- header ---------- */
  .head{display:block}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.22em;color:var(--amber);text-transform:uppercase;margin-bottom:11px}
  .backlink{display:inline-flex;align-items:center;gap:5px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.1em;color:var(--muted);text-decoration:none;margin-bottom:14px;transition:.15s}
  .backlink:hover{color:var(--amber)}
  .deckseg{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x proximity}
  .deckseg::-webkit-scrollbar{display:none}
  .deckbtn{flex:0 0 auto;scroll-snap-align:center;font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:13px;letter-spacing:.01em;text-transform:uppercase;color:var(--muted);background:transparent;border:none;border-radius:8px;padding:11px 15px;cursor:pointer;transition:.15s;white-space:nowrap}
  .deckbtn[aria-selected="true"]{color:var(--bg);background:var(--amber)}
  .deckbtn:not([aria-selected="true"]):hover{color:var(--ink)}
  .deckbtn:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  .deckmeta{margin-top:11px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.07em;color:var(--faint);display:flex;gap:7px;align-items:center}
  .deckmeta .dot-sep{color:var(--line)}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .ey{
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.22em;
    color:var(--amber);text-transform:uppercase;margin-bottom:7px}
  .brand h1{
    font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:23px;
    letter-spacing:.02em;text-transform:uppercase}
  .brand .sub{color:var(--muted);font-size:12px;margin-top:3px;letter-spacing:.02em}
  .docref{
    font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--faint);
    border:1px solid var(--line);border-radius:5px;padding:5px 8px;
    letter-spacing:.08em;white-space:nowrap}

  /* ---------- category chips ---------- */
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;font-family:"Chakra Petch",sans-serif;font-weight:600;
    font-size:11px;letter-spacing:.09em;text-transform:uppercase;
    color:var(--muted);background:var(--panel);border:1px solid var(--line);
    padding:8px 13px;border-radius:20px;cursor:pointer;transition:.15s;white-space:nowrap}
  .chip:hover{color:var(--ink);border-color:var(--faint)}
  .chip[aria-pressed="true"]{color:var(--bg);background:var(--amber);border-color:var(--amber)}
  .chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* ---------- terminal-strip progress ---------- */
  .strip{display:flex;gap:3px;height:9px}
  .seg{flex:1;border-radius:2px;background:var(--line-soft);border:1px solid transparent;transition:.15s}
  .seg.cur{background:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .seg.got{background:var(--green)}
  .seg.rev{background:var(--red)}

  /* ---------- card ---------- */
  .stage{perspective:1600px;flex:1;min-height:0}
  .card{
    position:relative;width:100%;height:100%;min-height:340px;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);
    cursor:pointer}
  .card.flip{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
    padding:22px 20px 18px;display:flex;flex-direction:column;overflow:hidden}
  .face::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--cat,var(--faint))}
  .back{transform:rotateY(180deg)}

  .meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cat{
    font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:11px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--cat,var(--muted))}
  .num{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--faint);letter-spacing:.06em}

  .q{
    font-family:"Chakra Petch",sans-serif;font-weight:600;
    font-size:clamp(21px,5.6vw,27px);line-height:1.24;letter-spacing:.005em}
  .qwrap{flex:1;display:flex;align-items:center}

  .alabel{
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.2em;
    color:var(--green);text-transform:uppercase;margin-bottom:10px}
  .a{font-size:clamp(15px,4vw,17px);line-height:1.5;color:var(--ink)}
  .a b{color:var(--amber);font-weight:600}
  .a .bn{color:var(--bn);font-weight:600}
  .a .bu{color:var(--bu);font-weight:600}
  .a .bk{color:var(--bk);font-weight:600}
  .backscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-right:2px}
  .backscroll::-webkit-scrollbar{width:4px}
  .backscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

  .why{
    margin-top:14px;border:1px solid var(--line);border-left:3px solid var(--amber);
    background:rgba(240,180,41,.06);border-radius:0 7px 7px 0;padding:11px 13px}
  .why .wl{
    font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.2em;
    color:var(--amber);text-transform:uppercase;margin-bottom:5px}
  .why p{font-size:13.5px;line-height:1.5;color:#D7D4CD}
  .why.danger{border-left-color:var(--red);background:rgba(224,86,70,.07)}
  .why.danger .wl{color:var(--red)}

  /* schematic */
  .fig{margin-top:15px;display:flex;justify-content:center}
  .fig svg{width:100%;max-width:280px;height:auto}
  .fig text{font-family:"IBM Plex Mono",monospace}

  .hint{
    margin-top:auto;padding-top:14px;display:flex;align-items:center;gap:8px;
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.16em;
    color:var(--faint);text-transform:uppercase}
  .hint .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

  /* recall buttons on back */
  .recall{margin-top:14px;display:flex;gap:9px}
  .rbtn{
    flex:1;font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:12px;
    letter-spacing:.08em;text-transform:uppercase;padding:12px;border-radius:8px;
    cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);transition:.15s}
  .rbtn.got:hover,.rbtn.got.on{color:var(--bg);background:var(--green);border-color:var(--green)}
  .rbtn.rev:hover,.rbtn.rev.on{color:var(--bg);background:var(--red);border-color:var(--red)}
  .rbtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* ---------- controls ---------- */
  .controls{display:flex;gap:9px;align-items:stretch}
  .nav{
    flex:0 0 auto;width:56px;display:flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);cursor:pointer;font-size:20px;transition:.15s}
  .nav:hover{border-color:var(--faint);background:var(--panel-2)}
  .nav:active{transform:translateY(1px)}
  .nav:disabled{opacity:.3;cursor:default}
  .flipbtn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:var(--amber);color:var(--bg);border:none;border-radius:10px;cursor:pointer;
    font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:14px;letter-spacing:.09em;
    text-transform:uppercase;transition:.15s}
  .flipbtn small{font-family:"IBM Plex Mono",monospace;font-weight:500;font-size:9px;letter-spacing:.12em;opacity:.7}
  .flipbtn:hover{filter:brightness(1.06)}
  .flipbtn:active{transform:translateY(1px)}
  .nav:focus-visible,.flipbtn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* ---------- footer bar ---------- */
  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .score{display:flex;gap:14px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.05em}
  .score span{color:var(--faint)}
  .score b{font-weight:600}
  .score .g b{color:var(--green)}
  .score .r b{color:var(--red)}
  .tools{display:flex;gap:7px}
  .tool{
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:6px;
    padding:7px 10px;cursor:pointer;transition:.15s}
  .tool:hover{color:var(--ink);border-color:var(--faint)}
  .tool[aria-pressed="true"]{color:var(--bg);background:var(--red);border-color:var(--red)}
  .tool:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:14px;line-height:1.5}
  .lc{text-transform:none}

  /* ---------- learn more button ---------- */
  .morebtn{
    width:100%;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:9px;
    background:transparent;border:1px dashed var(--line);border-radius:8px;padding:11px;
    cursor:pointer;color:var(--muted);transition:.15s}
  .morebtn span{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
  .morebtn small{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;color:var(--faint)}
  .morebtn:hover{border-color:var(--amber);color:var(--amber)}
  .morebtn:hover small{color:var(--amber);opacity:.7}
  .morebtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* ---------- deeper-dive sheet ---------- */
  .sheet-wrap{position:fixed;inset:0;z-index:50;display:none}
  .sheet-wrap.open{display:block}
  .sheet-bd{position:absolute;inset:0;background:rgba(8,9,11,.66);opacity:0;transition:opacity .25s ease}
  .sheet-wrap.open .sheet-bd{opacity:1}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;margin:0 auto;max-width:560px;
    max-height:88dvh;display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-bottom:none;border-radius:16px 16px 0 0;
    box-shadow:0 -20px 50px -20px rgba(0,0,0,.8);
    transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.2,1);
    padding:10px 20px max(20px,env(safe-area-inset-bottom))}
  .sheet-wrap.open .sheet{transform:translateY(0)}
  .sheet-grab{width:38px;height:4px;border-radius:4px;background:var(--line);margin:6px auto 12px}
  .sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--line-soft)}
  .sheet-cat{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .sheet-title{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:17px;line-height:1.3}
  .sheet-x{flex:0 0 auto;width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:13px;cursor:pointer;transition:.15s}
  .sheet-x:hover{color:var(--ink);border-color:var(--faint)}
  .sheet-x:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:14px}
  .sheet-body::-webkit-scrollbar{width:5px}
  .sheet-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
  .sheet-body h4{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:12px;letter-spacing:.09em;text-transform:uppercase;color:var(--amber);margin:16px 0 6px}
  .sheet-body h4:first-child{margin-top:0}
  .sheet-body p{font-size:14.5px;line-height:1.6;color:#D7D4CD;margin-bottom:4px}
  .sheet-body p+p{margin-top:8px}
  .sheet-body b{color:var(--amber);font-weight:600}
  .sheet-body .bn{color:var(--bn);font-weight:600}
  .sheet-body .bu{color:var(--bu);font-weight:600}
  .sheet-body .bk{color:var(--bk);font-weight:600}
  .sheet-body code{font-family:"IBM Plex Mono",monospace;font-size:12.5px;background:rgba(255,255,255,.05);border:1px solid var(--line-soft);border-radius:4px;padding:1px 5px;color:var(--ink)}

  @media (prefers-reduced-motion:reduce){
    .card{transition:none}
    .hint .dot{animation:none}
    .sheet,.sheet-bd{transition:none}
  }
  @media (max-height:680px){
    .brand h1{font-size:20px}.brand .sub{display:none}
    .face{padding:18px 16px 14px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="head">
    <a class="backlink" href="index.html">← Toolbench</a>
    <div class="eyebrow">Field Drill · The Toolbox</div>
    <div class="deckseg" role="tablist" aria-label="Choose deck">
      <button class="deckbtn" data-deck="0" role="tab" aria-selected="true">Sensors</button>
      <button class="deckbtn" data-deck="1" role="tab" aria-selected="false">Signals</button>
      <button class="deckbtn" data-deck="2" role="tab" aria-selected="false">Safety</button>
      <button class="deckbtn" data-deck="3" role="tab" aria-selected="false">Drives</button>
      <button class="deckbtn" data-deck="4" role="tab" aria-selected="false">Isolate</button>
      <button class="deckbtn" data-deck="5" role="tab" aria-selected="false">Heaters</button>
    </div>
    <div class="deckmeta"><span id="deckRef">ELEC-REF-016</span><span class="dot-sep">·</span><span id="deckSub">PNP / NPN</span></div>
  </header>

  <nav class="chips" id="chips" aria-label="Filter by category"></nav>
  <div class="strip" id="strip" aria-hidden="true"></div>

  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-live="polite" aria-label="Flash card, tap to reveal answer">
      <div class="face front">
        <div class="meta"><span class="cat" id="fcat"></span><span class="num" id="fnum"></span></div>
        <div class="qwrap"><div class="q" id="q"></div></div>
        <div class="hint"><span class="dot"></span> Tap to reveal</div>
      </div>
      <div class="face back">
        <div class="meta"><span class="cat" id="bcat"></span><span class="num" id="bnum"></span></div>
        <div class="backscroll">
          <div class="alabel">Answer</div>
          <div class="a" id="a"></div>
          <div id="fig"></div>
          <div id="why"></div>
          <button class="morebtn" id="moreBtn" type="button">
            <span>＋ Learn more</span>
            <small>the full picture</small>
          </button>
        </div>
        <div class="recall">
          <button class="rbtn got" id="btnGot" type="button">✓ Got it</button>
          <button class="rbtn rev" id="btnRev" type="button">↻ Review</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="nav" id="prev" aria-label="Previous card">‹</button>
    <button class="flipbtn" id="flip" type="button">Flip<small>SPACE</small></button>
    <button class="nav" id="next" aria-label="Next card">›</button>
  </div>

  <div class="foot">
    <div class="score">
      <span class="g">Got it <b id="sGot">0</b></span>
      <span class="r">Review <b id="sRev">0</b></span>
      <span>Card <b id="sPos">–</b></span>
    </div>
    <div class="tools">
      <button class="tool" id="reviewOnly" aria-pressed="false">Review&nbsp;set</button>
      <button class="tool" id="shuffle">Shuffle</button>
      <button class="tool" id="reset">Reset</button>
    </div>
  </div>
</div>

<div class="sheet-wrap" id="sheetWrap" aria-hidden="true">
  <div class="sheet-bd" id="sheetBd"></div>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-grab"></div>
    <div class="sheet-head">
      <div>
        <div class="sheet-cat" id="sheetCat"></div>
        <div class="sheet-title" id="sheetTitle"></div>
      </div>
      <button class="sheet-x" id="sheetX" type="button" aria-label="Close">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<script>
/* ---------------- data ---------------- */
const DECKS = [
{ name:"Sensor Wiring", sub:"PNP / NPN · sourcing & sinking", ref:"ELEC-REF-016",
  cats:{
  FUNDAMENTALS:{key:"FUNDAMENTALS", color:"#C0803F"},
  WIRING:{key:"WIRING", color:"#3B8CD1"},
  "PLC SIDE":{key:"PLC SIDE", color:"#8E6FD1"},
  DIAGNOSTICS:{key:"DIAGNOSTICS", color:"#F0B429"}
  },
  cards:[
  { cat:"FUNDAMENTALS",
    q:`PNP output — does it source or sink?`,
    a:`Sources. It switches the signal line up to <b>+24V</b> when active — current flows <span class="bn">out</span> of the output, through the load, down to 0V.`,
    why:{l:"Hook", t:"PNP Pushes Positive. The transistor connects the signal line to +24V, so the output is the current source."} },

  { cat:"FUNDAMENTALS",
    q:`NPN output — does it source or sink?`,
    a:`Sinks. It switches the signal line down to <b>0V</b> when active — current flows from +24V, through the load, and <span class="bu">into</span> the output.`,
    why:{l:"Hook", t:"NPN pulls it down to 0V. The transistor connects the signal line to 0V, so the output is the current sink."} },

  { cat:"WIRING",
    q:`3-wire DC sensor — what are the standard wire colours?`,
    a:`<span class="bn">Brown</span> = +24V (L+).  <span class="bu">Blue</span> = 0V (L−).  <span class="bk">Black</span> = output / signal.  (White = 2nd output on a 4-wire.)`,
    wire:"colours",
    why:{l:"Note", t:"IEC 60947-5-2 — identical for PNP and NPN. Only the side the load sits on changes; the supply wires never move."} },

  { cat:"WIRING",
    q:`PNP sensor — which side does the load sit?`,
    a:`Between <span class="bk">Black</span> (output) and <span class="bu">Blue</span> (0V). The sensor sources +24V into the top of the load; the load returns to 0V.`,
    wire:"pnp",
    why:{l:"Why", t:"The sensor sits between +24V and the signal node. Turn it on and it pushes +24V down onto the load."} },

  { cat:"WIRING",
    q:`NPN sensor — which side does the load sit?`,
    a:`Between <span class="bn">Brown</span> (+24V) and <span class="bk">Black</span> (output). The load hangs off +24V; the sensor sinks the bottom of it to 0V.`,
    wire:"npn",
    why:{l:"Why", t:"The sensor sits between the signal node and 0V. Turn it on and it pulls the bottom of the load down to 0V, so current flows."} },

  { cat:"PLC SIDE",
    q:`Feeding PNP sensors into a PLC — what must the input common be tied to?`,
    a:`<b>0V (M).</b> The input card has to <b>sink</b>, because a PNP sensor sources +24V into it. Wrong rail and nothing reads.`,
    why:{l:"Rule", t:"Sensor and input must be opposite-handed: a sourcing sensor needs a sinking input. PNP sensor → common on 0V."} },

  { cat:"PLC SIDE",
    q:`Feeding NPN sensors into a PLC — what must the input common be tied to?`,
    a:`<b>+24V.</b> The input card has to <b>source</b>, because an NPN sensor sinks it down to 0V.`,
    why:{l:"Rule", t:"Opposite-handed again: a sinking sensor needs a sourcing input. NPN sensor → common on +24V."} },

  { cat:"PLC SIDE",
    q:`The two questions to answer before wiring any sensor to a PLC?`,
    a:`1) Is the sensor <b>PNP or NPN</b>?  2) Is the input card set to <b>sink or source</b> (common on 0V or +24V)?  They must be opposite-handed.`,
    why:{l:"Method", t:"Get these two straight first and the wiring falls out on its own. Most sensor 'faults' are just these two mismatched."} },

  { cat:"DIAGNOSTICS",
    q:`Sensor's own LED is lit but the PLC won't read the input. First check?`,
    a:`Common / polarity <b>mismatch</b> — the input common is on the wrong rail (PNP sensor into a sourcing input, or the reverse). The sensor's happy; the PLC just can't see it.`,
    why:{l:"Why", t:"The sensor LED only proves the sensor is powered and switching. It says nothing about whether the PLC input can accept that signal type."} },

  { cat:"DIAGNOSTICS",
    q:`DMM from output to blue (0V) — PNP readings, off vs on?`,
    a:`Off ≈ <b>0V</b>.  On ≈ <b>+24V</b>. Clean either way, load in circuit or not.`,
    why:{l:"Note", t:"A PNP output is driven to a solid level in both states, so it reads true even unloaded. Handy for a quick bench check."} },

  { cat:"DIAGNOSTICS",
    q:`DMM from output to blue (0V) — NPN readings, off vs on?`,
    a:`On ≈ <b>0V</b>.  Off ≈ <b>+24V</b> — but only with the load (or PLC input) in circuit. Unloaded, an NPN output floats and reads all sorts.`,
    why:{l:"Trap", t:"No load means nothing pulls the OFF state up to +24V, so a floating NPN output gives junk readings. Always test it loaded."} },

  { cat:"FUNDAMENTALS",
    q:`Why is PNP the European default?`,
    a:`The signal line rests at <b>0V</b>. A wire chafing through to frame or earth reads as <b>OFF</b> — a safe failure. On NPN, that same short to earth looks like a live signal.`,
    why:{l:"Safety", t:"An earth fault on a PNP line fails to the safe state (off). On NPN it fails to a false ON — the machine sees a signal that isn't real.", danger:true} },

  { cat:"WIRING",
    q:`NO vs NC — what's the output doing at rest?`,
    a:`<b>NO</b> (normally open): output OFF until the target's present.  <b>NC</b> (normally closed): output ON until the target's present.`,
    why:{l:"Note", t:"Independent of PNP/NPN — you can have any combination. A sensor can be PNP-NO, PNP-NC, NPN-NO or NPN-NC."} },

  { cat:"WIRING",
    q:`4-wire sensor — what's the white wire for?`,
    a:`The <b>second output</b>. Usually the complement: if black is NO, white is NC. One sensor gives you both switching states.`,
    why:{l:"Note", t:"The pairing isn't guaranteed — some use the 4th wire differently. Always confirm on the datasheet before you rely on it."} },

  { cat:"DIAGNOSTICS",
    q:`You've got a PNP sensor but the panel's wired for NPN inputs. Fix on the bench?`,
    a:`You <b>can't</b> just swap the sensor's wires — the transistor type is fixed. Either move the input card's common to 0V (make it sink), or fit an interposing relay / signal converter.`,
    why:{l:"Why", t:"PNP vs NPN is set by the sensor's output stage, not the wiring. The clean answer is fitting the correct sensor type."} }
  ],
  more:[
// 0 PNP source/sink
`<h4>What's inside</h4><p>A PNP sensor's output stage is a PNP transistor with its emitter sat on <span class="bn">+24V</span>. Detect a target and the transistor turns on, connecting the <span class="bk">black</span> signal line to +24V. So the sensor <b>sources</b> current: conventional current flows out of the black wire, through the load, and down to <span class="bu">0V</span>.</p>
<h4>Why it matters</h4><p>Because the output is driven to +24V, the load must return to 0V to complete the circuit. That's the whole reason a PNP load sits on the 0V side.</p>
<h4>At rest</h4><p>De-energised, the black line is pulled toward 0V through the load, so a switched-off PNP output measures near <code>0V</code>. Clean and predictable — which is what makes PNP easy to bench-test.</p>`,
// 1 NPN source/sink
`<h4>What's inside</h4><p>An NPN output stage is an NPN transistor with its emitter on <span class="bu">0V</span>. Detect a target and it turns on, connecting the <span class="bk">black</span> line down to 0V. The sensor <b>sinks</b> current: the +24V supply sources it, current runs through the load and drains into the black wire to 0V.</p>
<h4>Why it matters</h4><p>The load has to be referenced to <span class="bn">+24V</span> so there's a potential to drive current down through it when the sensor pulls low.</p>
<h4>The catch</h4><p>An NPN output is effectively open-collector. Switched off, it doesn't drive anything — the line only rises toward +24V if a load (or pull-up) is present. No load and it floats, which is why an unloaded NPN output reads unpredictably on a meter.</p>`,
// 2 wire colours
`<h4>The standard</h4><p>IEC 60947-5-2 fixes the DC 3/4-wire colours: <span class="bn">brown = L+ (+24V)</span>, <span class="bu">blue = L− (0V)</span>, <span class="bk">black = main output</span>, white = second output. Any brand off the shelf wires the supply the same way.</p>
<h4>Colour ≠ type</h4><p>The standard covers colour, not whether the sensor is PNP or NPN — that's separate and printed on the body or datasheet. Same four colours regardless.</p>
<h4>M12 pinout</h4><p>Most floor wiring is via M12 cordsets, so know the pins: <code>1 = BN</code>, <code>3 = BU</code>, <code>4 = BK</code>, <code>2 = WH</code>. When a cordset's cut back to bare cores, the pin number is how you keep it straight.</p>`,
// 3 PNP load side
`<h4>The circuit</h4><p>A PNP output switches to +24V, so the load's far end must sit at 0V to see a voltage. The path is <span class="bn">+24V</span> → sensor → <span class="bk">black</span> → load → <span class="bu">0V</span>.</p>
<h4>Bench check</h4><p>Meter black-to-blue: off ≈ <code>0V</code>, on ≈ <code>24V</code>. It reads true either way because a PNP output is actively driven high.</p>
<h4>The PLC parallel</h4><p>Feed a PLC and the input itself <i>is</i> the load — a sinking input provides the internal path to 0V. Get that and the whole PNP-into-PLC picture falls out.</p>`,
// 4 NPN load side
`<h4>The circuit</h4><p>An NPN output switches to 0V, so the load's far end must sit at +24V. The path is <span class="bn">+24V</span> → load → <span class="bk">black</span> → sensor → <span class="bu">0V</span>. Turn it on and the sensor pulls black to 0V, so current flows down through the load.</p>
<h4>The floating trap</h4><p>Switched off, black rises to +24V <b>only through the load</b>. No load fitted and the output floats — meter reads anywhere from a few volts to near 24, drifting. Classic "reads fine but does nothing." Always test an NPN output loaded, or with a pull-up resistor.</p>`,
// 5 PLC common PNP
`<h4>Sink vs source at the card</h4><p>A digital input card is sinking or sourcing depending on where you tie the input common (labelled <code>1M</code>, <code>COM</code>, etc.). A PNP sensor sources +24V into the terminal, so the card must <b>sink</b> that current — common goes to <span class="bu">0V</span>.</p>
<h4>Current path</h4><p>Sensor sources +24V → into the input terminal → through the input opto/resistor → out the common → to 0V. Tie the common to the wrong rail and there's no return path, so the channel never energises.</p>
<h4>On an S7-1200</h4><p>DI common (e.g. 1M) to 0V makes the inputs accept PNP sensors — the standard European setup. Some cards are fixed, some switchable; always confirm before wiring a batch.</p>`,
// 6 PLC common NPN
`<h4>The mirror image</h4><p>An NPN sensor sinks to 0V, so the input has to <b>source</b> current out to it — common goes to <span class="bn">+24V</span>.</p>
<h4>Current path</h4><p>+24V from the common → through the input circuit → out the terminal → into the <span class="bk">black</span> wire → sensor sinks it to 0V. Common on 0V here and nothing flows.</p>
<h4>Watch for</h4><p>NPN is more common on Japanese/Asian machinery. Mixing an NPN sensor onto a card commoned for PNP (or vice versa) is the single most frequent "it won't read" call. Some newer modules auto-detect type — but don't assume; check.</p>`,
// 7 two questions
`<h4>A two-body problem</h4><p>Every sensor-to-PLC link needs the sensor's output type and the input's polarity to be <b>complementary</b> — one sources, the other sinks. If both try to source, or both sink, there's no current path and the input never sees a signal.</p>
<h4>Why it's the method</h4><p>When a new sensor won't read, you don't start swapping wires. You confirm two things: (1) sensor type, from the marking or datasheet; (2) how the input common is tied. Around nine in ten of these faults resolve right there.</p>
<h4>Everything else is secondary</h4><p>Wire colours, NO/NC, cable length — all matter, but they're downstream of getting the sink/source handshake right first.</p>`,
// 8 LED lit but PLC won't read
`<h4>What the LED actually tells you</h4><p>The output LED means the sensor is powered and its output transistor has switched — i.e. it's detecting. It says <b>nothing</b> about whether the downstream circuit is complete.</p>
<h4>The usual cause</h4><p>Wrong common on the input card. The sensor switches happily (LED on) but no current can pass into or out of the PLC input, so the channel stays dark. Meter the input terminal to confirm the level is actually arriving.</p>
<h4>Divide and conquer</h4><p>LED on, PLC off → suspect polarity/common mismatch first. LED off too → different half of the problem: sensor power, target detection, or the sensor itself. The LED cleanly splits the fault in two.</p>`,
// 9 DMM PNP
`<h4>Push-type output</h4><p>PNP outputs actively drive the line. On → transistor pulls it to +24V. Off → not driven high, and any load pulls it to 0V. Both states are firmly defined, so you get a trustworthy reading even lightly loaded.</p>
<h4>Expected values</h4><p>Off ≈ <code>0–1V</code>, on ≈ <code>23–24V</code> (a volt or so dropped across the transistor).</p>
<h4>Quick rig</h4><p>Brown/blue to a 24V bench PSU, meter black-to-blue, wave a target past the face and watch it swing <code>0 ↔ 24</code>. Fastest confidence check there is.</p>`,
// 10 DMM NPN
`<h4>Pull-type / open collector</h4><p>NPN outputs only pull down. On → line to 0V (reads ~0V). Off → transistor open, and the line rises to +24V <b>only if something pulls it up</b> — the load or the PLC input.</p>
<h4>Why unloaded reads junk</h4><p>With nothing pulling it up, an off NPN output floats. A high-impedance meter then reads anything from a couple of volts to near 24, drifting as you watch. Fit the load (or a pull-up) before you trust the reading.</p>
<h4>Expected values (loaded)</h4><p>On ≈ <code>0–1V</code>, off ≈ <code>23–24V</code>. This asymmetry versus PNP is exactly why PNP is the friendlier one to bench-test.</p>`,
// 11 why PNP European default
`<h4>The earth-fault case</h4><p>Picture the signal wire chafing through to the machine frame, which is bonded to 0V.</p>
<p><b>PNP:</b> the line rests near 0V and only goes high when active. A short to earth just ties it to 0V — the <b>off</b> state. Safe: the machine sees no phantom signal.</p>
<p><b>NPN:</b> the line rests high and drops when active. A short to earth pulls it to 0V — which looks exactly like a genuine <b>on</b>. A wiring fault can now command an unintended action.</p>
<h4>The upshot</h4><p>Positive-switching (PNP) fails toward the safe state on the most common wiring fault, so IEC-region industry standardised on it. It's one of several reasons — but the fail-safe argument is the big one.</p>`,
// 12 NO vs NC
`<h4>Two independent axes</h4><p>NO/NC is the resting state (target absent); PNP/NPN is how it switches. They're separate, so all four combinations exist: PNP-NO, PNP-NC, NPN-NO, NPN-NC.</p>
<h4>When to pick NC</h4><p>NC (active at rest, drops on detection) is used for fail-safe and guarding logic: a broken wire or dead sensor de-energises the output, which reads as "target lost / fault." If loss-of-signal <b>should</b> be the alarm or safe condition, NC gives you that for free.</p>
<h4>Default</h4><p>NO is the everyday choice — output activates when something's there. Most general detection uses it.</p>`,
// 13 4-wire white
`<h4>Two outputs</h4><p>A 4-wire DC sensor gives outputs on <span class="bk">black (pin 4)</span> and white (pin 2). Most often they're complementary — black = NO, white = NC — so one sensor feeds two inputs or logic that needs both states.</p>
<h4>Don't assume</h4><p>It isn't universal. White can instead be a second independent output, a diagnostic/alarm line, an IO-Link/analog channel, or a light/dark-on select. The datasheet pin table is the only authority.</p>
<h4>Polarity note</h4><p>On a PNP 4-wire, <b>both</b> outputs are PNP. "Complementary" refers to NO vs NC — not to the output polarity, which stays the same across both wires.</p>`,
// 14 PNP sensor into NPN panel
`<h4>Why you can't rewire it</h4><p>PNP vs NPN is fixed by the output transistor. No swap of <span class="bn">BN</span>/<span class="bu">BU</span>/<span class="bk">BK</span> turns a sourcing output into a sinking one — the silicon decides, not the terminals.</p>
<h4>Three ways out</h4><p><b>1 · Reconfigure the input</b> — move that channel's common to 0V so it sinks. Works if the card's switchable and the group isn't shared with NPN sensors you can't move.</p>
<p><b>2 · Interpose</b> — drive a small relay or signal converter from the PNP output and take its dry contact into the NPN-expecting input.</p>
<p><b>3 · Fit the right part</b> — the correct sensor type. Cleanest, and what you'd specify going forward.</p>
<h4>Shared-common warning</h4><p>You can't run PNP and NPN sensors on the same commoned input group — the common can only sit on one rail.</p>`
  ] },

  cards:[
  { cat:"4–20 mA",
    q:`Why 4–20 mA and not 0–20 mA?`,
    a:`<b>Live zero.</b> 4 mA = 0% of scale, so <b>0 mA means a fault</b> — broken wire or dead transmitter — told apart from a genuine 0% reading.`,
    wire:"livezero",
    why:{l:"Note", t:`The offset gives you fault detection for free: any real measurement sits in 4–20 mA, so anything below that can only be a failure.`} },

  { cat:"4–20 mA",
    q:`Why a current loop instead of 0–10 V?`,
    a:`In a series loop the <b>current is identical at every point</b>, so cable resistance and length don't change the reading. A 0–10 V signal sags over distance and picks up noise.`,
    why:{l:"Why", t:`Voltage drops across long cable and terminal resistance; current doesn't. That's why 4–20 mA runs hundreds of metres on cheap cable and still reads true.`} },

  { cat:"4–20 mA",
    q:`2-wire (loop-powered) transmitter — how does it work?`,
    a:`The <b>same two wires carry power and signal</b>. The transmitter draws its supply from the loop and regulates its own current draw between <span class="bn">4</span> and <span class="bn">20 mA</span> to encode the measurement.`,
    wire:"loop",
    why:{l:"Why", t:`It's a variable current sink sitting in the loop. Only two wires to pull — the reason 2-wire transmitters dominate field instrumentation.`} },

  { cat:"4–20 mA",
    q:`How does the PLC actually read the current?`,
    a:`A precision <b>sense resistor</b> (typically 250 Ω) turns loop current into a voltage the ADC reads: 4 mA → 1 V, 20 mA → 5 V.`,
    why:{l:"Maths", t:`250 Ω is chosen because 4–20 mA across it gives a clean 1–5 V — a standard ADC input range. Some cards use 100 Ω or 500 Ω; the principle is the same.`} },

  { cat:"4–20 mA",
    q:`Convert mA to engineering units?`,
    a:`Linear: <b>value = min + (mA − 4) / 16 × (max − min)</b>.  e.g. a 0–10 bar sensor reading 12 mA → (12−4)/16 × 10 = <b>5 bar</b>.`,
    why:{l:"Method", t:`The span is 16 mA (20 minus 4). Find how far into that span you are, apply the same fraction to the engineering range. The PLC's analog scaling block does exactly this.`} },

  { cat:"4–20 mA",
    q:`NAMUR NE43 — what do ≤3.6 mA or ≥21 mA mean?`,
    a:`<b>Fault signalling.</b> Values outside 4–20 mA flag sensor failure or a wire break, kept separate from the live measurement band so the PLC can tell a fault from a real reading.`,
    why:{l:"Note", t:`NE43 carves out sub-3.6 mA and above-21 mA as diagnostic zones. A transmitter can deliberately drive there to say 'I've failed' — far better than freezing at a plausible value.`} },

  { cat:"4–20 mA",
    q:`Loop won't reach 20 mA at full scale — likely cause?`,
    a:`Too much <b>loop resistance (burden)</b>. Max load = (V_supply − transmitter dropout) / 20 mA. Long cable plus several 250 Ω drops exceeds it and the transmitter runs out of voltage to push 20 mA.`,
    why:{l:"Why", t:`The transmitter needs a minimum voltage across itself to regulate. Everything else in the loop steals from the supply; at 20 mA the drops are biggest, so the top of the range starves first.`} },

  { cat:"4–20 mA",
    q:`Fault-finding a loop with a DMM — the right method?`,
    a:`Break the loop and put the meter <b>in series</b> (mA range) to read actual current, or measure the volts across the <b>250 Ω</b> sense resistor. In V-mode across the loop you read the supply, not the signal.`,
    why:{l:"Trap", t:`A meter in mA mode is a near-short — put it across a live loop in parallel and you dump the current. Series for current, or read the sense resistor voltage and divide.`} },

  { cat:"4–20 mA",
    q:`Analog signal integrity near drives — the grounding rule?`,
    a:`Use <b>shielded cable</b>, and ground the shield at <b>one end only</b> (usually the panel/PLC end) to avoid a ground loop. 4–20 mA is robust, but analog still benefits from screening around VFDs.`,
    why:{l:"Why", t:`Grounding a shield at both ends lets circulating currents flow through it, injecting noise. One-end grounding drains interference without creating a loop.`} },

  { cat:"IO-LINK",
    q:`What is IO-Link, in one line?`,
    a:`<b>Point-to-point digital comms</b> over the standard 3-wire sensor cable (IEC 61131-9). Not a fieldbus — one device per master port.`,
    why:{l:"Note", t:`Think of it as a serial link that rides the existing sensor wiring. It sits below the fieldbus: devices talk IO-Link to a master, the master talks PROFINET/EtherNet-IP to the PLC.`} },

  { cat:"IO-LINK",
    q:`Which wire carries the IO-Link data?`,
    a:`Pin 4 / <span class="bk">black</span> — the <b>C/Q</b> line. The wire that was the switching output becomes a bidirectional serial link. <span class="bn">Brown</span> and <span class="bu">blue</span> still just power the device.`,
    wire:"iolink",
    why:{l:"Why", t:`C/Q = Communication / Qualified. In IO-Link mode it carries serial data both ways; in standard mode the same pin reverts to an ordinary switching output.`} },

  { cat:"IO-LINK",
    q:`SIO vs SDCI mode — what's the difference?`,
    a:`A port runs either <b>SIO</b> (Standard IO — pin 4 is a plain switching input) or <b>SDCI</b> (IO-Link communication). A device falls back to SIO if the master isn't speaking IO-Link.`,
    why:{l:"Note", t:`SDCI = Single-drop Digital Communication Interface, the formal name for IO-Link. Backward compatibility means an IO-Link sensor still works as a dumb switch on a normal DI.`} },

  { cat:"IO-LINK",
    q:`Cable and distance limits for IO-Link?`,
    a:`Standard <b>unshielded 3-wire</b> M12, up to <b>20 m</b>. No special shielded cable needed — a key advantage over running a fieldbus drop out to the sensor.`,
    why:{l:"Why", t:`Keeping the physical layer as ordinary sensor cable is the whole point: existing wiring, existing connectors, no new cable spec on the floor.`} },

  { cat:"IO-LINK",
    q:`What does IO-Link give you over a plain on/off sensor?`,
    a:`Remote <b>parameter read/write</b>, rich <b>diagnostics</b>, <b>digital process values</b> (no analog conversion), device identification, and <b>auto parameter restore</b> on device swap.`,
    why:{l:"Why", t:`A DIO sensor tells you one bit: present or not. IO-Link turns the same sensor into a two-way device you can configure, interrogate and monitor for health.`} },

  { cat:"IO-LINK",
    q:`Data Storage — why does maintenance love it?`,
    a:`The <b>master keeps the device's parameter set</b>. Swap a failed sensor for a compatible one and the master <b>auto-reloads its settings</b> — no laptop, no reconfiguration, minimal downtime.`,
    why:{l:"Maintenance", t:`This is the standout feature on the floor: a 2 a.m. sensor swap becomes plug-and-go instead of hunting for the config file. The new device is parameterised before the line restarts.`} },

  { cat:"IO-LINK",
    q:`What's an IODD file?`,
    a:`<b>IO Device Description</b> — the device's machine-readable datasheet for the engineering tool: parameters, process data, diagnostics and identity. You import it to configure the device.`,
    why:{l:"Note", t:`One IODD per device type, supplied by the maker. The master's tool reads it to know what settings the device exposes and how to display its process data.`} },

  { cat:"IO-LINK",
    q:`Where does the IO-Link master sit?`,
    a:`It's the <b>gateway</b>: IO-Link (point-to-point) down to each device on one side, fieldbus (<b>PROFINET / EtherNet-IP</b>) up to the PLC on the other.`,
    why:{l:"Why", t:`Devices never touch the fieldbus directly. The master aggregates several IO-Link ports and presents them to the PLC as one fieldbus node.`} },

  { cat:"IO-LINK",
    q:`Port Class A vs Class B?`,
    a:`<b>Class A</b>: pins 2/5 aren't guaranteed power (pin 2 optional DI/DO). <b>Class B</b>: adds an <b>isolated auxiliary supply</b> on pins 2/5 for power-hungry actuators. Match the port to what the device needs.`,
    why:{l:"Note", t:`Most sensors are Class A. Class B exists because some actuators draw more than the standard port can safely deliver, so they get their own isolated supply pair.`} }
  ],
  more:[
// 0 live zero
`<h4>The idea</h4><p>Scale the signal so the bottom of the measuring range starts at <b>4 mA</b>, not zero. 4 mA = 0% of the process value, 20 mA = 100%. The 0–4 mA band is deliberately left unused.</p>
<h4>Why it's clever</h4><p>Now zero current can only mean one thing: something's broken. A snapped wire, a dead transmitter or a lost supply all read <code>0 mA</code>, which is impossible for a healthy sensor. A genuine 0% still sits at a live 4 mA.</p>
<h4>On the floor</h4><p>A 0–10 V sensor reading 0 V is ambiguous — is the tank empty or the cable cut? A 4–20 mA loop answers that for you without any extra wiring.</p>`,
// 1 current vs voltage
`<h4>The physics</h4><p>In a series circuit the current is the same everywhere — Kirchhoff's current law. So whatever resistance the cable, terminals and connectors add, the loop current the PLC sees equals the current the transmitter sends.</p>
<h4>Why voltage loses</h4><p>A 0–10 V signal is divided down by cable resistance and loading. Over a long run the receiver reads low, and the high-impedance line picks up electrical noise from nearby drives and contactors.</p>
<h4>Practical upshot</h4><p>4–20 mA happily runs hundreds of metres on ordinary cable with good noise immunity. It's the default for field instrumentation for exactly this reason.</p>`,
// 2 two-wire transmitter
`<h4>Power and signal on two wires</h4><p>A 2-wire transmitter sits in the loop like a variable resistor. It takes its own supply from the loop current and regulates that current between <span class="bn">4 and 20 mA</span> to represent the measurement.</p>
<h4>The constraint</h4><p>Because it must always draw at least 4 mA to power itself, it can never fully switch off — which is also why 4 mA is the live zero. It needs a minimum voltage across it (dropout) to keep regulating.</p>
<h4>Why it's popular</h4><p>Two conductors carry everything. Less cable, fewer terminals, simpler installation — the reason 2-wire dominates pressure, level and temperature transmitters.</p>`,
// 3 sense resistor
`<h4>How current becomes a number</h4><p>The analog input can't read current directly — its ADC reads voltage. So a precision resistor in the loop converts current to voltage by Ohm's law: <code>V = I × R</code>.</p>
<h4>Why 250 Ω</h4><p>At 250 Ω, 4 mA gives 1 V and 20 mA gives 5 V — a tidy 1–5 V that suits a standard ADC range. Other values (100 Ω, 500 Ω) are used where a different voltage span is wanted.</p>
<h4>Where it lives</h4><p>On many cards the sense resistor is built in; on some you fit an external one, or select current vs voltage mode by jumper/DIP. Know which, because a missing or wrong resistor throws the scaling out.</p>`,
// 4 scaling maths
`<h4>The formula</h4><p><code>value = min + (mA − 4) / 16 × (max − min)</code>. The 16 is the span in mA (20 − 4). Work out how far into the 4–20 band you are, then apply that same fraction to the engineering range.</p>
<h4>Worked example</h4><p>0–10 bar transmitter, reading 12 mA: (12 − 4) / 16 = 0.5, so 0.5 × 10 = <b>5 bar</b>. At 4 mA you'd get 0 bar, at 20 mA, 10 bar.</p>
<h4>In the PLC</h4><p>The analog scaling block (Siemens NORM_X / SCALE_X, or equivalent) does this for you — but knowing the maths lets you sanity-check a suspicious reading by hand.</p>`,
// 5 NAMUR NE43
`<h4>Diagnostic zones</h4><p>NAMUR recommendation NE43 sets aside the current outside the measuring band for fault signalling: roughly <b>≤3.6 mA</b> (under-range/fault) and <b>≥21 mA</b> (over-range/fault), leaving 3.8–20.5 mA as the valid measurement window.</p>
<h4>Why it beats freezing</h4><p>A transmitter that fails and holds its last plausible value is dangerous — nobody knows it's lying. One that drives to a defined fault current openly declares the failure, and the PLC can alarm on it.</p>
<h4>Setup</h4><p>You configure the input card and transmitter to agree on the fault direction (downscale or upscale burnout). Get them consistent or a real fault might land inside the valid band.</p>`,
// 6 burden resistance
`<h4>The voltage budget</h4><p>The supply voltage has to cover: the transmitter's minimum operating voltage (dropout) plus the drop across everything else in the loop at full current. Max loop resistance = (V_supply − V_dropout) / 20 mA.</p>
<h4>Why the top end starves first</h4><p>Voltage drops are largest at 20 mA. If the loop resistance is too high, the transmitter can't muster the voltage to push a full 20 mA, so the signal clips or reads low at the top while the bottom looks fine.</p>
<h4>What eats the budget</h4><p>Long cable runs, multiple series loads (several 250 Ω inputs, an indicator, a barrier), and undersized supplies. Add them up before committing a long run.</p>`,
// 7 DMM loop
`<h4>Two safe methods</h4><p><b>In series:</b> break the loop, set the meter to mA, and let the loop current flow through it — that's the true current. <b>Across the sense resistor:</b> read the voltage over the known 250 Ω and divide by it to get current.</p>
<h4>The classic mistake</h4><p>Putting the meter in voltage mode across the whole loop reads the <b>supply</b>, not the signal. And putting it in mA mode <b>in parallel</b> is a near short-circuit — it dumps the loop current and skews everything.</p>
<h4>Quick reasoning</h4><p>4 mA across 250 Ω = 1 V, 20 mA = 5 V. So a healthy loop measured across the sense resistor swings 1–5 V; anything outside that points to a fault or a scaling problem.</p>`,
// 8 shielding
`<h4>Why one end only</h4><p>A shield grounded at both ends can carry circulating current if the two grounds sit at slightly different potentials — a ground loop. That current induces noise into the very signal the shield is meant to protect.</p>
<h4>The rule</h4><p>Ground the shield at a single point, normally the panel/PLC end, and leave the field end floating (insulated). The shield still drains interference to ground, but no loop can form.</p>
<h4>Around drives</h4><p>On an extrusion line the VFDs are the noise source. Keep analog runs away from motor cables, cross them at right angles if you must, and don't share glands with power. 4–20 mA is tough, but good practice keeps marginal readings clean.</p>`,
// 9 what is IO-Link
`<h4>What it is</h4><p>IO-Link (IEC 61131-9) is a short-range, point-to-point <b>digital</b> communication link that runs over ordinary 3-wire sensor cable. One device per master port — it is explicitly <i>not</i> a bus with multiple drops.</p>
<h4>Where it sits</h4><p>Below the fieldbus. Devices speak IO-Link to a master; the master speaks PROFINET, EtherNet/IP or similar up to the PLC. It extends intelligence right down to the individual sensor without pulling fieldbus cable to every one.</p>
<h4>Why it caught on</h4><p>Same wiring you already use, but the sensor becomes configurable and self-diagnosing. It's an upgrade to the last metre, not a new network to design.</p>`,
// 10 which wire
`<h4>The C/Q line</h4><p>IO-Link data rides on <span class="bk">pin 4 (black)</span> — the C/Q, or Communication/Qualified, line. In IO-Link mode it's a bidirectional serial link; in standard mode the same pin is just an on/off switching output.</p>
<h4>Power unchanged</h4><p><span class="bn">Brown</span> stays +24V and <span class="bu">blue</span> stays 0V — they simply power the device. Only the signal wire changes job.</p>
<h4>Signalling</h4><p>Communication is 24 V pulse-based at set baud rates (COM1 4.8k, COM2 38.4k, COM3 230.4k). It's robust, low-speed serial — chosen for noise immunity on factory cable, not raw throughput.</p>`,
// 11 SIO vs SDCI
`<h4>Two modes for one port</h4><p><b>SIO</b> (Standard IO): pin 4 behaves as a normal switching DI/DO — the sensor acts like any dumb 3-wire device. <b>SDCI</b> (Single-drop Digital Communication Interface, i.e. IO-Link): pin 4 carries serial comms.</p>
<h4>Graceful fallback</h4><p>Plug an IO-Link device into a port that isn't running IO-Link and it drops to SIO and still works as a switch. That backward compatibility is why you can roll IO-Link in gradually.</p>
<h4>Wake-up</h4><p>The master starts a device with a wake-up pulse to move it from SIO into communication. If the master isn't configured for IO-Link on that port, no wake-up, and the device stays a plain switch.</p>`,
// 12 cable limits
`<h4>Ordinary cable</h4><p>IO-Link runs on standard <b>unshielded 3-wire</b> sensor cable with M12 connectors — the same stuff already on the machine. No special impedance-controlled or shielded cable is required.</p>
<h4>20 metre limit</h4><p>Maximum device-to-master length is 20 m. It's a deliberately short, local link — intelligence at the last metre, not a plant-wide network. For longer distances you go up to the fieldbus at the master.</p>
<h4>Why it matters</h4><p>No new cable spec, no shielding discipline, no bus terminators to get wrong. The low physical-layer cost is a big part of why IO-Link spread so fast.</p>`,
// 13 what IO-Link gives you
`<h4>From one bit to a conversation</h4><p>A standard DIO sensor gives you a single bit: target present or not. IO-Link turns that same sensor into a two-way device.</p>
<h4>What you gain</h4><p><b>Parameters:</b> set switch points, timers, modes remotely. <b>Process data:</b> the actual measured value digitally, no 4–20 mA conversion or scaling error. <b>Diagnostics:</b> contamination, temperature, short-circuit, supply warnings. <b>Identity:</b> vendor, type, serial for stock control.</p>
<h4>Net effect</h4><p>Commissioning, monitoring and fault-finding all move onto the network. You configure and interrogate sensors from the controller instead of at the sensor with a screwdriver.</p>`,
// 14 data storage
`<h4>The feature</h4><p>The master holds a copy of each device's parameter set. Configure Data Storage on and any parameter change is mirrored up to the master.</p>
<h4>Device replacement</h4><p>Swap a failed sensor for a compatible one and the master automatically pushes the stored parameters down to the new device. It's parameterised and running before the line restarts — no laptop, no config file hunt, no specialist.</p>
<h4>Why it's the headline</h4><p>For maintenance this is the single biggest win. A middle-of-the-night sensor change stops being a reconfiguration job and becomes a plug-and-go swap — directly cutting mean time to repair.</p>`,
// 15 IODD
`<h4>The device's datasheet, for software</h4><p>The IODD (IO Device Description) is an XML file, supplied by the manufacturer, that describes everything the engineering tool needs: available parameters, the process-data structure, diagnostic events, and device identity.</p>
<h4>How it's used</h4><p>You import the IODD into the master's configuration tool. It then knows how to display and set that device's parameters and how to decode its process data — without you reading the manual for every register.</p>
<h4>One per type</h4><p>There's one IODD per device type, versioned. Keep them with the project files so a future engineer configuring a replacement has the right description to hand.</p>`,
// 16 master position
`<h4>The gateway role</h4><p>The IO-Link master has two faces. Downward: several IO-Link ports, each a point-to-point link to one device. Upward: a single fieldbus connection (PROFINET, EtherNet/IP, EtherCAT…) to the PLC.</p>
<h4>What that buys you</h4><p>Devices never sit on the fieldbus directly. The master aggregates its ports and presents them to the PLC as one node, so you add intelligent sensors without adding fieldbus addresses for each.</p>
<h4>Practical note</h4><p>Master ports are numbered; the PLC addresses process data by master + port. When you swap or move a device, mind which port it's on — that's how the controller knows who's who.</p>`,
// 17 class A vs B
`<h4>The two port classes</h4><p><b>Class A:</b> the common type. Pins 1/3/4 do power and C/Q; pins 2/5 aren't a defined power pair (pin 2 is an optional extra DI/DO). <b>Class B:</b> adds an isolated auxiliary supply on pins 2/5.</p>
<h4>Why Class B exists</h4><p>Some actuators — valves, grippers, larger outputs — draw more current than the standard port is meant to deliver. Class B gives them a separate, isolated power pair so the comms supply isn't loaded down.</p>
<h4>Wiring watch-out</h4><p>Class B needs 5-pole cable and a matching device. Put a Class A device on a Class B port and pins 2/5 may be live in ways the sensor doesn't expect — always match the device's stated class.</p>`
  ] },
{ name:"Safety Circuits", sub:"e-stops · interlocks · light curtains", ref:"ELEC-REF-018",
  cats:{
  "PRINCIPLES":{key:"PRINCIPLES", color:"#4FA96A"},
  "DEVICES":{key:"DEVICES", color:"#3B8CD1"},
  "RELAY LOGIC":{key:"RELAY LOGIC", color:"#8E6FD1"},
  "FAULT-FINDING":{key:"FAULT-FINDING", color:"#F0B429"}
