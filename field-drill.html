  cards:[
  { cat:"PRINCIPLES",
    q:`Why are safety circuits dual-channel?`,
    a:`<b>Redundancy.</b> Two independent channels carry the same safe signal, so a single fault — a welded contact, a broken wire, a channel-to-channel short — can't defeat the function. The healthy channel still trips and the relay sees the mismatch.`,
    wire:"dualchannel",
    why:{l:"Principle", t:`A single-channel stop is one fault away from useless. Two channels mean no single failure leaves the machine unable to stop — the foundation of Category 3 and 4.`} },

  { cat:"PRINCIPLES",
    q:`What is cross-fault monitoring?`,
    a:`Detecting a <b>short between the two channels</b>. Such a short could bridge past both and hide a fault, so the safety relay watches for it — often with test pulses or split routing — and won't reset or trips if it sees one.`,
    why:{l:"Why", t:`Redundancy only helps if the channels are truly independent. A channel-to-channel short quietly turns two channels back into one; cross-monitoring catches that before it bites.`} },

  { cat:"PRINCIPLES",
    q:`What does "fail-safe / de-energise to trip" mean?`,
    a:`The safe state is the <b>de-energised</b> state. Safety outputs are energised only while running; loss of supply, a broken wire or an opened contact all drop them to safe. A failure must fall toward stopped, never stuck-run.`,
    why:{l:"Principle", t:`Wiring is arranged so the likeliest faults — breaks, disconnections, power loss — produce a stop, not a phantom run. Never design a safety function that needs power applied to reach safety.`} },

  { cat:"PRINCIPLES",
    q:`Why are e-stop and interlock contacts NC with positive opening?`,
    a:`<b>NC</b> so pressing the stop <i>or</i> a broken wire both open the circuit → safe. <b>Positive (direct) opening</b> forces the contact apart mechanically, not by a spring, so it can't weld shut and stay made.`,
    why:{l:"Standard", t:`Positive opening (IEC 60947-5-1, the arrow-in-a-circle symbol) guarantees the contact is physically driven open. A NO contact would fail dangerous on a broken wire — it would just read 'not pressed'.`} },

  { cat:"PRINCIPLES",
    q:`What does Performance Level (PL) describe?`,
    a:`<b>How reliably a safety function performs</b>, from <b>PLa</b> (lowest) to <b>PLe</b> (highest). Under ISO 13849-1 it comes from the architecture (Category), component reliability (MTTFd), diagnostic coverage (DC) and common-cause failures (CCF).`,
    why:{l:"Note", t:`The required PL (PLr) falls out of the risk assessment — severity, frequency of exposure, possibility of avoidance. You then design a function that achieves at least that PL.`} },

  { cat:"PRINCIPLES",
    q:`Categories B, 1, 2, 3, 4 (ISO 13849) — what do they describe?`,
    a:`The <b>architecture</b> of the safety function. B/1: single channel (1 uses well-tried parts). 2: single channel plus periodic testing. 3: dual channel, tolerant of a single fault. 4: dual channel that also resists fault accumulation.`,
    why:{l:"Watch", t:`Category is structure; PL is reliability — related but not the same. And both differ again from the Stop Categories 0/1/2, which describe how a machine is brought to rest.`} },

  { cat:"DEVICES",
    q:`Is an e-stop a primary safeguard?`,
    a:`No — it's a <b>complementary protective measure</b>. It backs up the guards and interlocks for emergencies; it doesn't replace them. It must latch, need a deliberate reset, and never create a new hazard by stopping.`,
    why:{l:"Note", t:`You can't rely on an e-stop as the main way to make a task safe — people aren't fast enough to react. Primary safety comes from guarding; the e-stop is the last resort.`} },

  { cat:"DEVICES",
    q:`Why use a coded (RFID/magnetic) guard interlock?`,
    a:`<b>Defeat resistance.</b> A coded actuator is uniquely paired to its switch, so it can't be fooled with a spare tongue, a magnet or a cable-tie. Uncoded mechanical switches are easy to cheat, which invalidates the guard.`,
    why:{l:"Why", t:`A guard that's trivial to bypass gives no real protection — and operators will bypass an inconvenient one. Coding raises the effort to defeat it, and it's a rated property (low/high coding level).`} },

  { cat:"DEVICES",
    q:`When do you need guard locking, not just interlocking?`,
    a:`When the machine has <b>overrun</b> — it doesn't stop instantly. Guard locking holds the guard shut until the hazard has actually ceased (zero-speed sensed, or a safe time delay), then releases.`,
    why:{l:"Why", t:`A plain interlock stops the machine when the guard opens, but if the screw or flywheel is still coasting, opening the guard exposes the hazard anyway. Locking keeps people out until it's genuinely safe.`} },

  { cat:"DEVICES",
    q:`How does a safety light curtain (AOPD) work?`,
    a:`A transmitter and receiver form a grid of infrared beams. Break any beam and the <b>OSSD outputs switch off</b>, commanding a safe stop. The <b>resolution</b> (finger / hand / body) sets the smallest object it's guaranteed to detect.`,
    wire:"lightcurtain",
    why:{l:"Note", t:`Resolution drives the mounting. A curtain only protects the plane it occupies — approach from around, under or over it and it sees nothing, so position and safety distance matter as much as the device.`} },

  { cat:"DEVICES",
    q:`What are OSSD outputs, and why do they pulse?`,
    a:`<b>Output Signal Switching Devices</b> — the two safety outputs of a curtain or scanner. They fire brief <b>test pulses</b> (short off-blips) to detect shorts, cross-faults and stuck outputs. The receiving input must tolerate the pulses.`,
    why:{l:"Why", t:`The microsecond pulses prove each output can still switch off and isn't shorted to 24V or to the other channel. A non-safety input would just see them as noise — they must land on a proper safe input.`} },

  { cat:"DEVICES",
    q:`Muting vs blanking a light curtain — what's the difference?`,
    a:`<b>Muting</b>: automatically and temporarily bypassing the curtain for a valid pass (e.g. a pallet), under strict conditions — multiple sensors, correct sequence, time limits. <b>Blanking</b>: ignoring a fixed zone of the field (fixed or floating) for a permanent obstruction.`,
    why:{l:"Caution", t:`Both deliberately stop the curtain protecting part of its area, so both are tightly governed. Muting must be impossible for a person to trigger; blanking must not open a gap someone can slip through.`} },

  { cat:"RELAY LOGIC",
    q:`Monitored (manual) vs automatic reset — what's the difference?`,
    a:`<b>Monitored</b>: needs a deliberate button press, and the relay checks the button's edge so a stuck or shorted reset can't auto-start the machine. <b>Automatic</b>: resets the instant inputs are safe — only allowed where nobody can be in the danger zone.`,
    why:{l:"Why", t:`Monitored reset stops a jammed button, or a guard simply being reclosed, from restarting the machine on its own. The edge-check is the whole difference between 'reset' and 'start'.`} },

  { cat:"RELAY LOGIC",
    q:`What is the EDM / feedback loop for?`,
    a:`<b>External Device Monitoring</b> watches the feedback contacts of the downstream contactors. If a contactor <b>welds</b>, its feedback stays open and the safety relay <b>won't reset</b> — so a stuck power contact is caught before the next start.`,
    wire:"edm",
    why:{l:"Why", t:`The safety relay can drop its own outputs, but it can't see the real motor contactors unless you tell it. Routing their force-guided aux contacts back through EDM closes that gap.`} },

  { cat:"RELAY LOGIC",
    q:`Why must the monitored contactors have force-guided contacts?`,
    a:`Force-guided (mechanically linked) NO and NC contacts <b>can never be closed at the same time</b>. So the NC feedback contact truly reflects the NO power contact — if the power contact welds shut, the feedback is held open.`,
    why:{l:"Why", t:`EDM is only trustworthy if the feedback contact can't lie. Ordinary relay contacts can stick independently; force-guided (mirror) contacts are mechanically tied so the feedback always mirrors the real state.`} },

  { cat:"RELAY LOGIC",
    q:`Typical safety-relay terminal scheme (e.g. Pilz PNOZ)?`,
    a:`Supply on <b>A1/A2</b>. Channel 1 on <b>S11–S12</b>, channel 2 on <b>S21–S22</b> (your dual-channel e-stop or guard). Reset on <b>S33–S34</b>. Safety outputs <b>13–14, 23–24</b> (NO, force-guided); auxiliary <b>41–42</b>.`,
    why:{l:"Note", t:`Labels vary by maker and model, but the scheme is universal: power, two input channels, a monitored reset with EDM in the loop, and force-guided output contacts. Always work from the specific device's wiring diagram.`} },

  { cat:"RELAY LOGIC",
    q:`Stop Categories 0, 1, 2 (IEC 60204-1) — and the trap?`,
    a:`<b>0</b>: immediate removal of power — uncontrolled stop. <b>1</b>: controlled stop (ramp down) <i>then</i> remove power. <b>2</b>: controlled stop with power maintained. The trap: these are <b>not</b> the ISO 13849 Categories B/1/2/3/4.`,
    why:{l:"Watch", t:`Stop Category is how the machine comes to rest; ISO 13849 Category is the circuit's fault tolerance. Same word, different standard — a very common mix-up on drawings and in conversation.`} },

  { cat:"FAULT-FINDING",
    q:`Safety circuit won't reset — systematic first checks?`,
    a:`Walk the loop: every e-stop <b>released</b>? every guard <b>fully closed</b> (both contacts)? <b>both channels</b> made? <b>EDM/feedback</b> loop closed (no welded contactor)? reset button and wiring sound? Any one open holds the whole function off.`,
    why:{l:"Method", t:`A safety function is a series chain of 'all must be healthy'. Find the one open element rather than guessing — the relay's diagnostic LEDs usually point at the failing channel or the feedback.`} },

  { cat:"FAULT-FINDING",
    q:`What is discrepancy time, and what does a discrepancy fault mean?`,
    a:`The <b>maximum time allowed between the two channels</b> changing state. If one channel switches and the other doesn't follow within the window, the relay flags a <b>discrepancy fault</b> and locks out — pointing at a failing switch, contact or wiring on one channel.`,
    why:{l:"Why", t:`In a healthy dual-channel device both contacts move almost together. A persistent lag means one channel is sticking or worn — the relay refuses to trust a half-working input.`} },

  { cat:"FAULT-FINDING",
    q:`Why must you never "bridge out" a safety input to get running?`,
    a:`Because it <b>defeats the protective function</b> — the machine can no longer stop for that hazard. It's illegal, potentially lethal, and it hides the real fault. Find and fix the open channel instead.`,
    why:{l:"Safety", t:`A link across a safety input turns a Category 3/4 function into nothing. The pressure to 'just get it running' is exactly when someone gets hurt. Diagnose it — never bypass it.`, danger:true} }
  ],
  more:[
// 0 dual channel
`<h4>The idea</h4><p>Run the safe signal down two separate paths — two contacts, two wires, two inputs on the relay. In the run state both are made; trip the device and both open.</p>
<h4>Why two</h4><p>Any single fault — a welded contact, a severed core, a short to 24V on one channel — is survived by the other channel, which still commands the stop. The relay also compares the channels and latches out on the mismatch, so the fault gets found rather than hidden.</p>
<h4>Where it sits</h4><p>Dual-channel with monitoring is the structural heart of ISO 13849 Category 3 and 4. Single-channel (Cat B/1) has no such backup — one fault and the stop is gone.</p>`,
// 1 cross-fault
`<h4>The hidden failure</h4><p>Redundancy assumes the two channels are independent. If a fault shorts channel 1 to channel 2, pressing the device might still leave 24V looping across both — the relay sees 'healthy' when it isn't.</p>
<h4>How it's caught</h4><p>Safety relays and OSSD devices send offset test pulses down each channel. A cross-short makes one channel's pulse appear on the other; the relay spots the clash and refuses to reset. Split cable routing helps too.</p>
<h4>On the floor</h4><p>It's why you don't run both channels loose in the same crushed conduit or land them on adjacent terminals with a whisker of stray strand — you're inviting the exact short the system is built to detect.</p>`,
// 2 de-energise
`<h4>Safe = off</h4><p>Design the circuit so removing energy reaches the safe state. Safety outputs hold in only while everything is healthy; the moment supply, a wire or a contact fails, they drop and the machine stops.</p>
<h4>Why this way round</h4><p>The common failures in the field are opens: broken conductors, loose terminals, lost supply, corroded contacts. All of those must land you in 'stopped'. A circuit that needs power to become safe fails dangerous on exactly those faults.</p>
<h4>The rule of thumb</h4><p>If you ever find yourself relying on a signal being present to keep people safe, rethink it. Absence of signal is the safe default.</p>`,
// 3 NC + positive opening
`<h4>Normally closed</h4><p>The contact is held closed in the safe/run condition and opens to trip. So both the intended action (pressing the e-stop, opening the guard) and the common fault (a broken wire) do the same thing — open the circuit and stop the machine.</p>
<h4>Positive opening</h4><p>Marked with the arrow-in-a-circle symbol under IEC 60947-5-1, it guarantees the moving contact is driven apart by a rigid mechanical link, not returned by a spring. Even if the contacts weld, the mechanism prizes them open.</p>
<h4>The failure it prevents</h4><p>A NO contact reads 'not operated' when its wire breaks — dangerous. A spring-return NC can stick closed if the spring fails or the contact welds. Positive-opening NC removes both failure modes.</p>`,
// 4 PL
`<h4>What PL measures</h4><p>Performance Level rates how much you can trust a safety function to perform on demand, PLa (least) to PLe (most). It's a probabilistic measure — average frequency of a dangerous failure per hour.</p>
<h4>What feeds it</h4><p>Four things: the Category (architecture), MTTFd (how long components last before a dangerous failure), Diagnostic Coverage (how much of that the system detects), and Common-Cause Failure resistance (that one event can't take out both channels).</p>
<h4>How it's used</h4><p>The risk assessment sets a required PL (PLr) from severity, exposure and avoidability. Your design — device choice, structure, diagnostics — then has to prove it meets or beats that PLr.</p>`,
// 5 Categories
`<h4>Architecture, not reliability</h4><p>The Category describes the structure and fault behaviour of the circuit. B and 1 are single channel — one fault can lose the function (1 just uses more robust, well-tried parts). 2 adds periodic testing of that single channel.</p>
<h4>3 and 4</h4><p>Both are dual channel and survive a single fault. The difference: Category 4 also has to cope with an accumulation of faults (a second fault before the first is detected), demanding higher diagnostic coverage.</p>
<h4>Don't conflate the words</h4><p>ISO 13849 <i>Category</i> (structure) feeds into <i>PL</i> (reliability) — but neither is the IEC 60204-1 <i>Stop Category</i> (0/1/2), which is only about how power is removed. Three different 'category' ideas share the word.</p>`,
// 6 e-stop
`<h4>Complementary, not primary</h4><p>An emergency stop is there for when things have already gone wrong. It supplements the guards, interlocks and safe systems of work — it is never the primary means of preventing access to a hazard.</p>
<h4>What it must do</h4><p>Latch on operation, require a separate deliberate reset (which must not itself restart the machine), be reachable from the danger points, and bring the machine to a safe stop without generating a new hazard in doing so.</p>
<h4>Why it isn't enough alone</h4><p>Human reaction plus machine stopping time is often far too slow to prevent injury once someone's in the danger zone. Rely on stopping the hazard being reached, not on hitting a button after it is.</p>`,
// 7 coded interlock
`<h4>Defeat is the enemy</h4><p>A guard interlock is only as good as its resistance to being cheated. A plain mechanical tongue switch can be operated with a spare tongue kept in a drawer; a simple magnetic switch with any magnet.</p>
<h4>Coding</h4><p>RFID and coded-magnet switches pair a unique actuator to the switch. Uniquely coded devices learn one specific actuator; the switch ignores anything else, so a random magnet or spare actuator won't fool it. Coding level (low/high) is a rated safety attribute.</p>
<h4>Human factor</h4><p>Operators defeat guards that slow them down. Part of the design job is making the safe way the easy way, so nobody is tempted to reach for the spare tongue in the first place.</p>`,
// 8 guard locking
`<h4>The overrun problem</h4><p>Interlocking stops the machine when the guard opens. But many machines coast — screws, flywheels, rollers keep moving after the command to stop. Open the guard during that coast-down and the hazard is still live.</p>
<h4>What locking adds</h4><p>Guard locking physically holds the guard shut and only releases once the hazard has genuinely stopped — proven by a zero-speed/standstill monitor, or a time delay set longer than the worst-case run-down.</p>
<h4>Power-to-lock vs power-to-release</h4><p>Power-to-release locks fail safe (lose power, stays locked) — preferred where overrun is dangerous. Power-to-lock frees the guard on power loss, only acceptable where trapping someone is the bigger risk. Choose deliberately.</p>`,
// 9 light curtain
`<h4>How it detects</h4><p>An emitter column and receiver column create parallel infrared beams. The receiver expects every beam; interrupt one and it switches its OSSD outputs off to command a stop. It's an active opto-electronic protective device (AOPD).</p>
<h4>Resolution</h4><p>Beam spacing sets the minimum detectable object: ~14mm finger, ~30mm hand, larger for body/access detection. Finer resolution detects smaller intrusions but is used closer to the hazard; coarser is for whole-body access.</p>
<h4>Safety distance</h4><p>It must be mounted far enough back that the machine stops before a hand reaches the danger: S = K·T + C, where T is total stopping time, K the approach speed, and C a resolution-based intrusion allowance. Too close and the curtain is decorative.</p>`,
// 10 OSSD
`<h4>What they are</h4><p>OSSDs are the two solid-state safety outputs of a curtain, scanner or safety sensor. Both switch to 24V in the safe/clear state and to 0V on detection or fault — dual outputs give the redundancy.</p>
<h4>Why the pulses</h4><p>Each OSSD is driven low for microseconds on a staggered schedule. By reading its own outputs back, the device confirms each can still switch, isn't shorted to 24V, and isn't shorted to the other OSSD. It's continuous self-test.</p>
<h4>Wiring consequence</h4><p>The pulses must terminate on a safe input designed to expect them (a safety relay or safe PLC input). Feed an OSSD into an ordinary DI and the test pulses look like chatter — and you lose the diagnostics that make it safe.</p>`,
// 11 muting/blanking
`<h4>Muting</h4><p>A controlled, temporary, automatic bypass — for example letting a pallet pass out of a cell without stopping the line. It's hedged with conditions: two or four independent muting sensors, a required sequence and direction, and a time limit, so a person can't reproduce the pattern and walk through.</p>
<h4>Blanking</h4><p>Permanently ignoring part of the detection field. Fixed blanking masks a known fixture that always sits in the field; floating blanking allows a moving object (like passing material) within limits. Either reduces the protected area, so the residual gap must be safe.</p>
<h4>The shared danger</h4><p>Both switch off protection for part of the field. Misapplied, they leave a hole a person fits through. They're powerful and legitimate — but they're where a lot of unsafe compromises hide, so they get designed and validated carefully.</p>`,
// 12 reset
`<h4>Two behaviours</h4><p>Automatic reset re-enables the outputs the moment the inputs go safe again. Monitored (manual) reset additionally requires a person to press and release a reset button — and the relay watches that edge.</p>
<h4>Why the edge matters</h4><p>Checking the button's transition (and that it isn't already shorted or held) means a stuck reset, or a jumper across it, cannot silently re-enable the machine. Simply re-closing a guard must not restart it — a human has to consciously reset.</p>
<h4>When automatic is allowed</h4><p>Only where it's impossible to be in the danger zone when the guard closes — small enclosed cells you can't enter, for instance. If a body can be inside, monitored reset is mandatory.</p>`,
// 13 EDM
`<h4>Closing the blind spot</h4><p>The safety relay controls its own contacts, but the machine is actually stopped by downstream power contactors it can't directly see. EDM gives it eyes on those contactors.</p>
<h4>How it works</h4><p>Each monitored contactor has a force-guided auxiliary NC contact. Wired in series into the relay's feedback/reset path, these are closed only when the power contacts are open. Before the relay will energise its outputs, it checks this loop is closed.</p>
<h4>The catch it makes</h4><p>If a power contact welds shut, its linked NC feedback is held open, the EDM loop stays broken, and the relay refuses to reset. The welded contactor is caught at the next start attempt instead of on the day it fails to stop the machine.</p>`,
// 14 force-guided
`<h4>Mechanically linked</h4><p>Force-guided (mirror) contacts have their NO and NC sets rigidly tied so they can never be closed simultaneously. If the NO power contact is made, the NC is guaranteed open, and vice-versa, over the device's whole life.</p>
<h4>Why EDM needs it</h4><p>EDM trusts the NC feedback to report the true state of the NO power contact. An ordinary contactor can have contacts that stick or weld independently — the feedback could read 'open' while the power contact is actually welded closed. Force-guiding makes that impossible.</p>
<h4>Spec note</h4><p>Look for 'force-guided' or 'mechanically linked' contacts to EN 50205. It's the difference between a feedback signal you can build a safety function on and one that might quietly lie to you.</p>`,
// 15 PNOZ terminals
`<h4>The universal scheme</h4><p>Whatever the badge, a basic safety relay has: a supply pair, two input channels for your dual-channel device, a reset input, and force-guided output contacts. Learn the pattern and any device's manual reads easily.</p>
<h4>Pilz PNOZ example</h4><p>A1/A2 supply · S11–S12 channel 1 · S21–S22 channel 2 · S33–S34 reset (with the EDM/feedback contacts wired into the reset path) · 13–14, 23–24 the safety outputs (NO, force-guided) · 41–42 an auxiliary contact for signalling, never for safety.</p>
<h4>Always confirm</h4><p>Terminal numbers differ across models and makers, and single-channel vs dual-channel wiring changes the links. Wire from the exact device's drawing, not from memory — this card is the shape, not the gospel for your specific unit.</p>`,
// 16 stop categories
`<h4>The three stops</h4><p>IEC 60204-1 defines how a machine is brought to rest. <b>Category 0:</b> power to the actuators is cut immediately — the machine coasts to a stop uncontrolled. <b>Category 1:</b> the drive brings it to a controlled halt, then power is removed. <b>Category 2:</b> controlled stop with power left on (a normal operational stop).</p>
<h4>Choosing</h4><p>Cat 0 is simplest and certain but can be violent (coasting, dropped loads). Cat 1 stops a high-inertia machine in a controlled way before isolating — often safer for big drives. Cat 2 isn't an emergency stop; it holds position with power.</p>
<h4>The classic confusion</h4><p>'Category 3' on a drawing almost always means ISO 13849 architecture, not a stop type — there is no Stop Category 3. Keep Stop Category (how it stops) and 13849 Category (how fault-tolerant the circuit is) firmly separate.</p>`,
// 17 won't reset
`<h4>It's a series chain</h4><p>A safety function only enables when every element in the loop is healthy at once. One open contact anywhere holds the whole thing off, so the job is to find which element is open, not to try things at random.</p>
<h4>Work the loop</h4><p>Check in order: all e-stops released and latched out; all guards fully closed with both interlock contacts made; both channels present at the relay; the EDM/feedback loop closed (no welded contactor); the reset button and its wiring intact; discrepancy not exceeded.</p>
<h4>Use the diagnostics</h4><p>Modern safety relays and controllers show channel and fault LEDs (or a diagnostic display) that point straight at the offending channel or a feedback fault. Read those first — they turn a loop-walk into a targeted check.</p>`,
// 18 discrepancy
`<h4>What it is</h4><p>Discrepancy time is the window within which both channels must change state together. Operate a healthy dual-channel switch and both contacts move within a few milliseconds; the relay allows a set tolerance for that.</p>
<h4>What a fault means</h4><p>If one channel changes and the other hasn't followed when the window closes, the relay declares a discrepancy and locks out. It's telling you the two channels no longer agree — a sticking contact, a worn switch, a partly-broken wire, or a genuine short.</p>
<h4>Why lock-out, not ignore</h4><p>A half-working dual-channel input has quietly lost its redundancy. Rather than run on one good channel, the relay stops and demands attention, so the degraded device gets replaced before the second channel fails too.</p>`,
// 19 never bridge
`<h4>What bridging does</h4><p>Linking across a safety input tells the relay that input is permanently 'safe'. The guard, e-stop or curtain on that channel is now electrically invisible — the machine will never stop for it again.</p>
<h4>Why it's unforgivable</h4><p>It collapses a Category 3/4 function to nothing, it's a breach of the machine's safety design and the law, and worst of all it hides the real fault so the next person has no idea the protection is gone. Injuries from defeated guards are frequently fatal.</p>
<h4>Do this instead</h4><p>Treat 'won't reset' as a fault to diagnose, not an obstacle to remove. Find the open channel, prove it dead, replace or repair the faulty element, and restore full dual-channel function. If production pressure is pushing you to bypass, that's the moment to stop and escalate.</p>`
  ] },
{ name:"Drives", sub:"SINAMICS G120 · VFD fault-finding", ref:"ELEC-REF-019",
  cats:{
  "SUPPLY & DC BUS":{key:"SUPPLY & DC BUS", color:"#E2953C"},
  "MOTOR & OUTPUT":{key:"MOTOR & OUTPUT", color:"#E0685A"},
  "SETUP & CONTROL":{key:"SETUP & CONTROL", color:"#3B8CD1"},
  "COMMS & DIAG":{key:"COMMS & DIAG", color:"#8E6FD1"}
  },
  cards:[
  { cat:"SUPPLY & DC BUS",
    q:`What should the DC bus voltage read on a healthy drive?`,
    a:`About <b>565 VDC</b> on a 400 V three-phase supply — it's the peak of the rectified line (√2 × 400 ≈ 565). Overvoltage trips near <b>820 V</b>; undervoltage well below 565.`,
    wire:"dcbus",
    why:{l:"Note", t:`The rectifier charges the DC link to the line peak, so 400 V AC gives ~565 V DC and 480 V gives ~680 V. Know the healthy figure so an over/undervoltage fault makes sense — but treat the bus as lethal, and prove it discharged before going near it.`} },

  { cat:"SUPPLY & DC BUS",
    q:`<b>F30002</b> — DC-link overvoltage. Most likely cause?`,
    a:`<b>Regenerative energy on deceleration.</b> A fast ramp-down or an overhauling / high-inertia load pumps energy back into the bus faster than it can be dissipated. Also: braking resistor missing, failed or undersized, or a genuine supply overvoltage.`,
    why:{l:"Check", t:`Lengthen the ramp-down (p1121) or fit/repair the braking resistor and chopper. The built-in Vdc-max controller (A07400) can auto-extend the ramp to ride it out. Tripping at steady speed instead points upstream at the supply.`} },

  { cat:"SUPPLY & DC BUS",
    q:`<b>F30003</b> — DC-link undervoltage. Where do you look?`,
    a:`The <b>incoming supply</b> first: low line voltage, a brownout, or a lost phase dragging the bus down. If the supply is solid, suspect ageing DC-link capacitors or rectifier diodes in the power module.`,
    why:{l:"Check", t:`Measure all three input phases under load. Repeated undervoltage with good incoming volts points at tired electrolytics — common after years of service — losing their grip on the bus during load transients.`} },

  { cat:"SUPPLY & DC BUS",
    q:`<b>F30011</b> — line phase failure. First checks?`,
    a:`One of the three <b>mains phases is missing</b>: a blown input fuse, a loose or burnt input terminal, an open contactor pole, or an upstream trip. Confirm L1, L2 and L3 are all present and balanced at the drive input.`,
    why:{l:"Check", t:`On two phases the drive draws much higher current on the remaining two and can't make rated power. Check fuses, the incoming isolator/contactor and terminal tightness — loose input terminals cook themselves and drop a phase.`} },

  { cat:"SUPPLY & DC BUS",
    q:`What does the braking resistor and chopper actually do?`,
    a:`They <b>dump regenerative energy as heat</b>. When the motor decelerates or is driven by the load it feeds energy back to the DC bus; the braking chopper (an IGBT) switches that surplus into the resistor to hold the bus voltage down.`,
    why:{l:"Why", t:`With nowhere for regen energy to go, a quick stop or an overhauling load pushes the bus straight into F30002. High-inertia, vertical and winder loads nearly always need a braking resistor sized to the duty cycle.`} },

  { cat:"MOTOR & OUTPUT",
    q:`<b>F30001</b> — overcurrent. What causes it?`,
    a:`A <b>short or earth fault</b> on the motor cable or winding, an <b>accel ramp too short</b> for the load, wrong motor data or star/delta, a seized load, or a missing line reactor. The output shuts off instantly to protect the IGBTs.`,
    why:{l:"Check", t:`Isolate and meg the motor and cable to rule out shorts and earths (the fault value r0949 flags phase U/V/W or the DC link). Then check ramp-up (p1120), motor data and the star/delta link before powering back up.`} },

  { cat:"MOTOR & OUTPUT",
    q:`<b>F30021</b> — ground fault. What's it telling you?`,
    a:`Current is leaking <b>to earth</b> — insulation breakdown in the motor or its cable. Wet or damaged cable, a chafed core, or a failing winding are the usual culprits.`,
    why:{l:"Check", t:`Isolate, then insulation-test the motor and cable to earth separately to find which is down. A motor that megs low hot but fine cold is on its way out. Don't just reset and run — earth faults only get worse.`, danger:true} },

  { cat:"MOTOR & OUTPUT",
    q:`<b>F07011</b> — motor overtemperature. Causes?`,
    a:`The thermal model or the motor's own sensor (PTC / KTY / PT1000) says it's <b>too hot</b>: sustained overload, poor cooling (blocked fan, high torque at low speed on a self-cooled motor), high ambient — or a sensor/wiring fault reading falsely.`,
    why:{l:"Check", t:`First confirm it's real — is the motor actually hot? Check the load, the fan and cooling path, and low-speed running without forced cooling. Cold but faulting points at the temperature sensor or its wiring back to the drive.`} },

  { cat:"MOTOR & OUTPUT",
    q:`<b>F07900</b> — motor blocked. What does it mean?`,
    a:`The motor is <b>below the speed threshold while the controller is pinned at its torque limit</b> — the drive is pushing full torque but the shaft isn't turning as expected. Think mechanical jam, a brake that hasn't released, or torque limits set too low.`,
    why:{l:"Check", t:`Check the mechanics turn freely and any holding brake releases. Then the torque limits (r1538/r1539), the star/delta and U-V-W wiring, and — if fitted — encoder direction. A ramp too short for a high-inertia load can trigger it too.`} },

  { cat:"MOTOR & OUTPUT",
    q:`<b>F07902</b> — motor stalled. Usual cause?`,
    a:`The drive can't establish proper control — most often <b>wrong motor data or no motor identification done</b>, so it never magnetises correctly. Current limits set too low will also stop it developing torque.`,
    why:{l:"Check", t:`Recheck the nameplate data, run a motor data identification (p1900), and check the current limits (p0640). It shows up most often straight after a fresh commissioning where the ID run was skipped.`} },

  { cat:"MOTOR & OUTPUT",
    q:`<b>F30004</b> vs <b>F30005</b> — what's the difference?`,
    a:`<b>F30004</b> = inverter <b>overtemperature</b>: the drive itself is too hot — blocked or failed cooling fan, clogged filters, high cabinet ambient, or switching frequency set too high. <b>F30005</b> = <b>I²t overload</b>: it's delivered more than its thermal rating for too long.`,
    why:{l:"Check", t:`F30004 → clear the cooling path: fan turning? filters clean? cabinet ventilated? F30005 → the drive is undersized or the duty is too heavy; compare actual current against rated, and check the load or a mechanical drag isn't pulling more than it should.`} },

  { cat:"SETUP & CONTROL",
    q:`V/f vs vector control — when do you use each?`,
    a:`<b>V/f</b> (p1300 = 0/…): simple, holds a fixed voltage-to-frequency ratio — ideal for pumps, fans and multi-motor groups, and needs no motor ID. <b>Vector</b>: controls flux and torque for high torque at low speed and tight speed holding, but needs accurate motor data and an ID run.`,
    wire:"vfcurve",
    why:{l:"Note", t:`Use V/f when the load is well-behaved and you want it robust and simple. Use vector when you need full torque from standstill, precise speed or fast dynamics — extruder screws and haul-offs usually want vector.`} },

  { cat:"SETUP & CONTROL",
    q:`Why does the motor nameplate data matter so much?`,
    a:`The drive builds its whole control model from it. Rated <b>voltage, current, frequency, speed, power and cos φ</b> go into the motor parameters (p0304–p0311). Wrong data means poor control and nuisance overcurrent or overtemperature faults.`,
    why:{l:"Check", t:`Enter the plate exactly, and match the star/delta connection to the voltage you're feeding. A 230/400 V motor left in delta on a 400 V drive, or the wrong rated current, will fight the drive from the very first start.`} },

  { cat:"SETUP & CONTROL",
    q:`What is a motor data identification (p1900), and why run it?`,
    a:`The drive <b>measures the actual motor</b> — winding resistance and inductances — and tunes its model to match. Run it after commissioning: a stationary ID is usually enough, a rotating ID refines it further.`,
    why:{l:"Note", t:`Nameplate data gets you close; the ID run makes vector control actually work. Skip it and you get sluggish torque, stalls (F07902) or hunting. It's a couple of minutes that saves a lot of grief later.`} },

  { cat:"SETUP & CONTROL",
    q:`Ramp times p1120 / p1121 — how do they cause faults?`,
    a:`<b>p1120</b> (ramp-up) too short → the drive slams current into the load → <b>F30001 overcurrent</b>. <b>p1121</b> (ramp-down) too short → regen energy spikes the bus → <b>F30002 overvoltage</b>. Match the ramps to the load's inertia.`,
    wire:"ramps",
    why:{l:"Method", t:`Trips while accelerating → lengthen p1120 or check the load. Trips while decelerating → lengthen p1121 or fit a braking resistor. The two ramps are independent; tune the one that matches when the fault lands.`} },

  { cat:"SETUP & CONTROL",
    q:`Motor trips on overcurrent or won't pull — check what wiring?`,
    a:`The <b>star/delta link</b> in the motor terminal box. A 230/400 V motor runs in <b>star</b> on a 400 V supply and <b>delta</b> on a 230 V supply. Get it wrong and you either over-flux it (overcurrent) or starve it of torque.`,
    why:{l:"Check", t:`Read the two voltages on the nameplate (e.g. 230 Δ / 400 Y) and set the link bars to match your drive's output voltage. This bites most often after a motor swap, where the box links were left as they came.`} },

  { cat:"COMMS & DIAG",
    q:`Fault (F) vs Alarm (A) — what's the difference?`,
    a:`An <b>F</b> is a fault: the drive trips, latches, and won't run until you clear the cause and acknowledge it. An <b>A</b> is an alarm: a warning that something needs attention, but the drive keeps running.`,
    why:{l:"Note", t:`Alarms are your early warning. A07400 (Vdc-max active) or a load alarm tells you the drive is straining to avoid a trip. Read alarms before they become faults — they often name the exact condition that's building.`} },

  { cat:"COMMS & DIAG",
    q:`How do you acknowledge (reset) a SINAMICS fault?`,
    a:`<b>Clear the cause first</b>, then acknowledge — via a digital input set to acknowledge, the fieldbus control word (STW1 bit 7, on a rising edge), the operator panel, or p3981. Some faults need a full power-cycle.`,
    why:{l:"Method", t:`It won't clear while the cause is still present — that's by design. If a fault refuses to acknowledge, the condition is still there; go back and find it rather than hammering the reset button.`} },

  { cat:"COMMS & DIAG",
    q:`<b>F08501</b> — setpoint timeout. What happened?`,
    a:`The drive <b>stopped receiving cyclic data</b> from the PLC over PROFINET. A pulled or damaged cable, a failed switch, the PLC dropping to STOP, or a device name / IP mismatch after a swap will all do it.`,
    why:{l:"Check", t:`Check the PN cable and link LEDs, that the PLC is in RUN, and the network topology. After replacing a drive, the new one needs the correct PROFINET device name assigned or the controller simply won't talk to it.`} },

  { cat:"COMMS & DIAG",
    q:`Where does the drive record what actually tripped it?`,
    a:`In its <b>fault buffer</b>. The active fault code sits in <b>r0945</b> and the fault value in <b>r0949</b>, and the drive keeps a history with values and timestamps. Read the real fault number rather than guessing from symptoms.`,
    why:{l:"Method", t:`The fault value (r0949) often pinpoints the cause — which phase on an overcurrent, which detection method on a stall. Two minutes reading the buffer beats an hour chasing the wrong lead.`} }
  ],
  more:[
// 0 DC bus normal
`<h4>Where 565 V comes from</h4><p>A three-phase diode rectifier charges the DC link to the peak of the line-to-line voltage. For a 400 V supply that's 400 × √2 ≈ 565 V DC; a 480 V supply gives about 680 V. It is not a set value — it follows the incoming mains.</p>
<h4>Why the thresholds sit where they do</h4><p>The overvoltage trip (~820 V on a 400 V-class drive) leaves headroom above the normal 565 V for brief regen surges before the caps and IGBTs are at risk. Undervoltage trips well below 565 V, where the drive can no longer hold up the output.</p>
<h4>Safety</h4><p>The DC link holds a lethal charge for minutes after isolation. Prove it dead at the DC terminals before touching anything — the bus caps do not discharge instantly when you open the isolator.</p>`,
// 1 F30002
`<h4>The mechanism</h4><p>A spinning motor being slowed becomes a generator, feeding energy back into the DC link. If that energy arrives faster than it leaves, the bus voltage climbs until it hits the trip threshold and the drive shuts down to save the caps and IGBTs.</p>
<h4>The usual triggers</h4><p>Ramp-down set too short for the inertia; an overhauling load (a winder, a descending mass) driving the motor; or a braking resistor that's missing, open-circuit or too small for the duty. A genuinely high supply can do it too.</p>
<h4>Fixes in order</h4><p>Lengthen p1121, enable/verify the Vdc-max controller (it stretches the ramp automatically, flagged by A07400), then fit or repair the braking resistor and chopper if the duty demands real braking. If it trips at constant speed, measure the incoming supply.</p>`,
// 2 F30003
`<h4>What it means</h4><p>The DC link has sagged below its minimum. The inverter can't synthesise proper output volts from a low bus, so it trips rather than deliver degraded, current-heavy output to the motor.</p>
<h4>External vs internal</h4><p>External: low or unstable mains, a brownout, or a lost supply phase pulling the bus down under load. Internal: after years in service the electrolytic DC-link capacitors lose capacitance and gain ESR, so they can't hold the bus up during load steps — and rectifier diodes can fail.</p>
<h4>How to split it</h4><p>Meter all three input phases while the machine is loaded. Solid incoming volts but repeated undervoltage points inside the power module — tired caps or a failing rectifier — rather than at the supply.</p>`,
// 3 F30011
`<h4>What's happened</h4><p>The drive has detected that one of its three incoming supply phases is gone. A three-phase rectifier really wants all three; on two it ripples harder, draws more current on the survivors and can't make rated DC bus.</p>
<h4>Where to look</h4><p>An input fuse (or one pole of a three-pole fuse), a loose or heat-damaged input terminal, one welded-open pole of the supply contactor, or an upstream device that's tripped a single phase. Check each phase is present and roughly balanced at the drive terminals.</p>
<h4>The sneaky one</h4><p>A terminal that's loose but still just touching runs hot, oxidises and eventually opens under load — intermittent phase loss that clears when cool. Torque-check the input terminals; discoloured insulation is the giveaway.</p>`,
// 4 braking resistor
`<h4>The four-quadrant problem</h4><p>A standard drive can motor the load but has no way to push regenerated energy back to the mains — the diode rectifier only conducts one way. So braking energy has nowhere to go except into the DC-link capacitors, raising their voltage.</p>
<h4>How the chopper helps</h4><p>When the bus rises past a set level, the braking chopper (an IGBT across the bus) switches the braking resistor in, turning the surplus energy into heat. It pulses on and off to hold the bus just below the overvoltage trip during the whole deceleration.</p>
<h4>Sizing and duty</h4><p>The resistor is rated for both peak power and average (duty-cycle) power. Undersize it and it either can't hold the bus (F30002) or overheats and opens. High-inertia, fast-cycling and overhauling loads are the ones that genuinely need it — check the resistor's thermal overload contact is wired in, too.</p>`,
// 5 F30001
`<h4>Instant protection</h4><p>The power unit watches each output phase and, on a genuine overcurrent, shuts the IGBTs off in microseconds — far faster than any thermal trip — because an uncleared short would destroy the module. So F30001 is a hard, immediate trip.</p>
<h4>The cause list</h4><p>A short between output phases or a phase-to-earth fault in the motor or cable; an accel ramp so short the drive floods the load with current; wrong motor data or star/delta over-fluxing the motor; a mechanically seized load; or a missing line reactor allowing big inrush.</p>
<h4>Diagnose before re-powering</h4><p>Isolate and insulation-test the motor and cable — the fault value r0949 tells you which phase (U/V/W) or the DC link. Only once shorts and earths are ruled out do you look at ramp times, motor data and the connection. Never just reset into a suspected short.</p>`,
// 6 F30021
`<h4>What the drive sees</h4><p>The vector sum of the three output currents should be zero. When current escapes to earth instead of returning through the other phases, that balance breaks and the drive flags a ground fault — current is going somewhere it shouldn't.</p>
<h4>Common causes</h4><p>Insulation breakdown in the motor windings, a cable damaged by crushing, vibration or moisture ingress, or a chafed core touching the gland or frame. Damp motors after a washdown or a cold start are classic.</p>
<h4>Finding it</h4><p>Isolate, then insulation-test (megger) the cable and motor separately, each phase to earth, to localise the fault. A winding that reads healthy cold but breaks down hot is failing and will only get worse — don't reset and run an earth fault, it can become a phase-to-phase short.</p>`,
// 7 F07011
`<h4>Two ways it's sensed</h4><p>Either a real temperature sensor embedded in the windings (PTC, KTY84 or PT1000) reports back, or the drive's thermal model estimates winding temperature from load and time. Either exceeding the limit raises F07011.</p>
<h4>Why motors cook</h4><p>Sustained overload; a blocked or failed cooling fan; running high torque at low speed on a self-cooled (TEFC) motor whose shaft-mounted fan barely turns; high ambient in a hot part of the plant; or simply an undersized motor for the duty.</p>
<h4>Real or false?</h4><p>Touch-check (safely) whether the motor is actually hot. Hot → attack the cause: load, cooling, low-speed duty. Cold but still faulting → suspect the sensor, its wiring back to the drive, or the wrong sensor type parameterised. Never just raise the limit to make it go away.</p>`,
// 8 F07900
`<h4>The condition</h4><p>The speed controller has hit its torque limit (it's asking for all the torque it's allowed) yet the motor is turning below the expected speed for longer than the set delay. In short: full effort, no rotation — the drive concludes the motor is blocked.</p>
<h4>What blocks it</h4><p>A genuine mechanical jam or overload; a holding brake that hasn't released; torque limits (r1538/r1539) set too low for the starting torque needed; star/delta or U-V-W miswired so the motor can't develop torque; an encoder reading the wrong direction; or a ramp too aggressive for a high-inertia load.</p>
<h4>Order of checks</h4><p>Prove the machine turns freely by hand and the brake lifts first — that's the cheap, likely cause. Then torque limits and wiring, then encoder direction if fitted. Don't wind the limits up to force through a real mechanical fault.</p>`,
// 9 F07902
`<h4>Stall vs block</h4><p>Where 'blocked' is about full torque and no movement, 'stalled' is the drive losing its grip on the motor model — it can't keep the machine magnetised and under control, so field-oriented control collapses and it trips after the p2178 delay.</p>
<h4>Root causes</h4><p>Almost always motor data: nameplate values entered wrong, or the motor data identification (p1900) never run, so the drive's model doesn't match the real motor. Current limits (p0640) set too low can also starve it of magnetising current.</p>
<h4>The fix</h4><p>Re-enter the nameplate carefully, run the ID (stationary at least), and check the current limits. It's the classic 'ran fine on the bench, stalls on the machine' fault when commissioning was rushed — the ID run is not optional for vector control.</p>`,
// 10 F30004 / F30005
`<h4>Two different heat problems</h4><p><b>F30004</b> is the drive's own heatsink/inverter running too hot — a cooling problem. <b>F30005</b> is an I²t calculation: the drive has carried more current than its rating allows for long enough that its thermal model says 'stop before I damage myself'.</p>
<h4>F30004 — cooling</h4><p>Fan failed or blocked, filter mats clogged, cabinet ventilation poor or ambient too high, or a switching frequency set higher than needed (more switching = more IGBT loss = more heat). Clear the airflow path first; a stopped fan is the usual answer.</p>
<h4>F30005 — overload</h4><p>The drive is undersized for the duty, or the load is drawing more than expected — a partial mechanical seizure, wrong control mode, or genuinely too much work. Compare running current with the rating, and check the machine isn't dragging.</p>`,
// 11 V/f vs vector
`<h4>V/f control</h4><p>The simplest scheme: the drive holds a fixed ratio of voltage to frequency (so flux stays roughly constant) and just sets the output frequency. It needs no knowledge of the specific motor, tolerates several motors on one drive, and is rock-solid for pumps and fans.</p>
<h4>Vector control</h4><p>The drive models the motor and controls flux and torque-producing current separately, like a DC drive. That buys full torque from standstill, tight speed holding under changing load, and fast response — but it needs accurate motor data and a motor ID run to model the machine.</p>
<h4>Choosing on the floor</h4><p>Fan/pump, multi-motor, or you just want robust and simple → V/f. Needs starting torque, precise or dynamic speed (extruder screw, haul-off, winder) → vector, and budget the extra commissioning to do the ID run.</p>`,
// 12 nameplate
`<h4>Garbage in, garbage out</h4><p>Everything the drive does — its flux model, its current limits, its thermal protection — is built on the nameplate figures. Enter them wrong and every layer above is working from a false picture of the motor.</p>
<h4>What goes in</h4><p>Rated voltage, current, frequency, speed (rpm), power (kW) and power factor (cos φ), into the motor parameters around p0304–p0311. The connection you've wired (star or delta) has to match the rated voltage you're feeding.</p>
<h4>How it bites</h4><p>Wrong rated current and the overload protection is set to the wrong level; wrong voltage/connection and the motor is over- or under-fluxed, giving nuisance overcurrent, poor torque or overheating. Copy the plate exactly — don't round or assume.</p>`,
// 13 motor ID
`<h4>What it measures</h4><p>The identification routine energises the motor to measure its real electrical characteristics — stator resistance, leakage and magnetising inductance, cable resistance. The drive then corrects its model to the actual machine and cabling.</p>
<h4>Stationary vs rotating</h4><p>A stationary ID (p1900) measures the electrical values without turning the shaft — safe and usually enough. A rotating ID additionally turns the motor to refine the magnetising and speed-loop data, for the best vector performance where the load allows it to spin freely.</p>
<h4>Why it's not optional</h4><p>Nameplate data alone leaves the model approximate. Skip the ID on a vector drive and you get weak or sluggish torque, hunting, or outright stalls (F07902). Two minutes running the ID at commissioning prevents a pile of nuisance faults later.</p>`,
// 14 ramps
`<h4>Two independent slopes</h4><p>p1120 sets how fast the drive raises frequency (accelerate); p1121 sets how fast it lowers it (decelerate). They're separate parameters and they fail in opposite ways, so which one to touch depends on when the trip happens.</p>
<h4>Up too fast → F30001</h4><p>Command a big speed increase too quickly and the drive floods the motor with current to accelerate the inertia — straight into overcurrent. Ease p1120, or accept the load simply needs longer to get up to speed.</p>
<h4>Down too fast → F30002</h4><p>Decelerate too quickly and the motor regenerates hard, spiking the DC bus into overvoltage. Ease p1121, or if the process needs the fast stop, fit a braking resistor to absorb it. Match the fault timing to the ramp and you fix the right one.</p>`,
// 15 star/delta
`<h4>The dual-voltage motor</h4><p>Most small industrial motors are wound for two voltages in a 1:√3 ratio, e.g. 230/400 V. Delta connection presents the windings to the higher current/lower voltage; star connection puts √3 more volts across the effective winding. The link bars in the terminal box select which.</p>
<h4>Match to the supply</h4><p>On a 400 V drive output you wire that 230/400 V motor in <b>star</b>; on 230 V you'd wire it in <b>delta</b>. The rule: the connection must present each winding with its rated voltage.</p>
<h4>What goes wrong</h4><p>Left in delta on a 400 V feed the motor is badly over-fluxed — huge magnetising current and overcurrent trips. Wrongly in star where delta was needed and it's starved, weak and can't pull the load. It's the first thing to check after any motor swap.</p>`,
// 16 F vs A
`<h4>Two severities</h4><p>A fault (F-number) is serious enough that the drive stops the motor, latches the condition and refuses to run until it's cleared and acknowledged. An alarm (A-number) is advisory — the drive flags it but keeps running.</p>
<h4>Alarms are the early warning</h4><p>Many alarms are the drive telling you it's actively working to avoid a fault: A07400 (Vdc-max controller active) means it's stretching the ramp to dodge an overvoltage trip; a load or current-limit alarm means it's holding back. Catch these and you fix the cause before it becomes downtime.</p>
<h4>Reading them</h4><p>The panel or engineering tool shows the number and text. Note the exact code — 'it threw a fault' is useless to the next person; 'F30002 on decel' points straight at the ramp or braking resistor.</p>`,
// 17 acknowledging
`<h4>Cause first, then acknowledge</h4><p>Acknowledging only clears the latched flag — it does nothing to the underlying condition. If the cause is still present, the fault either won't clear or comes straight back. So diagnose and fix, then acknowledge.</p>
<h4>The ways to do it</h4><p>A digital input configured for fault acknowledge; the fieldbus control word STW1 bit 7 on a rising edge (how the PLC does it); the operator panel; or setting p3981. A handful of severe faults need a full power-off/on (POWER ON acknowledge) to clear.</p>
<h4>The tell</h4><p>A fault that won't acknowledge is telling you the condition is live. Resist the urge to keep pressing reset — that's the moment to go back to the fault value and the wiring, not to hammer the button.</p>`,
// 18 F08501
`<h4>What timed out</h4><p>The drive expects fresh cyclic process data from the controller every few milliseconds over PROFINET. When that data stops arriving for longer than the monitoring time, it raises F08501 and reacts (typically stopping) rather than run blind on stale setpoints.</p>
<h4>Where it breaks</h4><p>A pulled, damaged or poorly-terminated PN cable; a failed or powered-down switch; the PLC dropping to STOP or being reprogrammed; or, after a device swap, a wrong or missing PROFINET device name so the controller never establishes the connection.</p>
<h4>Checks</h4><p>Look at the PN port link LEDs, confirm the PLC is in RUN, and walk the topology for the break. A replacement drive must have the correct device name assigned (via the engineering tool or topology-based naming) before it will exchange data.</p>`,
// 19 fault buffer
`<h4>The drive keeps records</h4><p>SINAMICS stores faults in a buffer, not just the one on the screen. The active fault code is in r0945 and its fault value in r0949, with a history of recent faults held with their values and time stamps — so you can see what actually happened, and in what order.</p>
<h4>Use the fault value</h4><p>r0949 is where the detail hides: on an overcurrent it flags which phase or the DC link; on a stall it encodes the detection method. Reading it turns a vague code into a specific lead, instead of guessing from the symptom.</p>
<h4>Order matters</h4><p>The buffer's sequence tells a story — an F30002 followed by an F30003, say, suggests the overvoltage event stressed the supply side. Read the whole buffer before deciding on root cause; the first fault is often the real one and the rest are consequences.</p>`

  { cat:"PROCEDURE",
    q:`Locking off — why your own lock and the only key?`,
    a:`So <b>only you</b> can restore the supply. You fit a personal padlock at the isolator, keep the single unique key on you, and no one else can re-energise the circuit while you're working on it.`,

  { cat:"PROCEDURE",
    q:`Is a caution tag on its own enough?`,
    a:`No. A tag <b>warns</b> — who isolated, when and why — but it doesn't <b>secure</b> anything. It goes <i>with</i> a lock, never instead of one. A tag on its own can be ignored or taken off.`,

  { cat:"PROCEDURE",
    q:`Several people working on one isolation — how?`,
    a:`A <b>lock-off hasp</b>: every worker fits their <b>own personal lock</b> to it. The isolation can't be removed until the last lock comes off — so nobody restores power while anyone is still working.`,

  { cat:"PROCEDURE",
    q:`When do you need a permit to work?`,
    a:`For <b>higher-risk work</b> — HV, complex or multiple isolations, confined spaces, shared plant. It's a formal document defining the scope, the isolations, the precautions, and who signs on and off. It hands control over and takes it back.`,
    why:{l:"Note", t:`A permit forces the isolations and precautions to be written, checked and signed rather than assumed. It's the paperwork that stops two teams working at cross purposes on the same plant.`} },

  { cat:"PROVE DEAD",

    a:`<b>Prove</b> your voltage indicator works on a known source or proving unit → <b>test</b> the isolated circuit and confirm it's dead → <b>prove</b> the indicator again. Three steps, every time.`,

  { cat:"PROVE DEAD",
    q:`Why prove the tester again after testing?`,
    a:`To catch a tester that <b>failed during the test</b>. If it died between proving and testing — flat battery, blown fuse, damaged lead — a "dead" reading could be a lethal false negative. Proving after confirms it still worked.`,

  { cat:"PROVE DEAD",
    q:`Single-phase circuit — what do you test?`,
    a:`Every combination: <b>L–N, L–E and N–E</b>. Don't assume the neutral is dead or that you know which conductor is which — prove all of them against each other and against earth.`,

    wire:"testpoints",
    why:{l:"Method", t:`Prove every phase dead to every other phase, to neutral and to earth. It's methodical because a single missed combination is exactly the one that catches you out.`} },

  { cat:"PROVE DEAD",

  { cat:"TEST GEAR",

  { cat:"TEST GEAR",
    q:`Why a two-pole voltage indicator over a multimeter for proving dead?`,

  more:[
// 0 sequence
`<h4>The safe system of work</h4><p>Safe isolation isn't a single action, it's an ordered procedure — each step protects against a specific way of getting caught out. Done in order it leaves you certain the thing you're about to touch is dead and will stay dead.</p>
<h4>The steps</h4><p>Identify exactly what you're isolating; get the authority to do it; isolate at a point that truly removes the supply; secure that isolation with a lock and a caution tag; prove the circuit dead with the prove–test–prove routine; only then start work.</p>
<h4>Why order matters</h4><p>Prove dead before you secure and someone could re-energise between the test and the work. Secure without proving dead and you're trusting a switch you never checked. The value is in doing every step, in sequence, every time — familiarity is exactly when people start skipping steps.</p>`,
// 1 lock off
`<h4>Personal lock, single key</h4><p>You fit your own padlock to the isolator (via a lock-off device if the isolator isn't natively lockable) and keep the one and only key on your person. Not on a hook, not in the panel — on you.</p>
<h4>Why it has to be yours</h4><p>An isolator that's merely switched off invites someone who doesn't know you're working to switch it back — for a test, to 'just check something', or by mistake. A lock with the key in your pocket makes that impossible, not just unlikely.</p>
<h4>Discipline</h4><p>Your lock goes on when you isolate and comes off only when you personally have finished and are clear. Never lend your key, never leave the lock on for someone else to remove — the whole system rests on one person controlling one lock.</p>`,
// 2 tag
`<h4>Warn versus secure</h4><p>A caution tag communicates: this is isolated, by whom, when and why. That's genuinely useful — but it is information, not a barrier. Anyone can read it and still operate the switch.</p>
<h4>Always with a lock</h4><p>The tag rides alongside the lock, never instead of it. The lock physically prevents re-energising; the tag explains the situation so nobody is tempted to cut the lock off or hunt for another way to restore supply.</p>
<h4>What goes on it</h4><p>Your name, the date and time, and enough about the work that someone finding it understands why it must stay off. A blank or vague tag invites someone to assume it's stale and remove it.</p>`,
// 3 hasp / multiple workers
`<h4>The group problem</h4><p>When several people work on the same isolated plant, a single lock can't represent all of them — whoever holds it might remove it while others are still inside or on the tools.</p>
<h4>The hasp solution</h4><p>A lock-off hasp (a scissor/multi-hole clasp) accepts many padlocks at once. Each worker fits their own personal lock. Because the hasp can't be opened until the last padlock is removed, the supply cannot be restored while anyone's lock is still on.</p>
<h4>Own your lock</h4><p>Each person applies and removes only their own lock, when they personally are clear. Nobody removes another's lock. It turns a group isolation into a set of individual guarantees.</p>`,
// 4 permit to work
`<h4>What it is</h4><p>A permit to work is a formal, documented authorisation for defined higher-risk work. It records exactly what may be worked on, what has been isolated and secured, the precautions required, and the time limits — and it's signed as it's issued, accepted, and handed back.</p>
<h4>When you need one</h4><p>HV work, complex or multiple isolations, confined spaces, work on shared or interlinked plant, or anywhere the consequences of a mistake are severe. It formalises the control that a simple lock-off can't fully capture on its own.</p>
<h4>Why it works</h4><p>It forces the isolations and precautions to be thought through, written down, checked and signed — and it makes crystal clear who is in control of the plant at any moment, so two teams can't unknowingly work against each other.</p>`,
// 5 prove test prove
`<h4>Three steps, one purpose</h4><p>Prove the voltage indicator on a known source or proving unit so you know it works. Test the isolated circuit — it should read dead. Prove the indicator again to confirm it was still working when it told you 'dead'.</p>
<h4>The middle step is the weak one</h4><p>A dead reading is meaningless on its own — a broken tester reads dead too. It's the two proves either side that turn a blank reading into a trustworthy 'this is safe'. Never test without both.</p>
<h4>Every time</h4><p>Not once at the start of the job — every isolation, every set of conductors, right before you touch them. The routine is quick precisely so there's no excuse to skip it.</p>`,
// 6 prove twice
`<h4>The failure it guards against</h4><p>Test equipment can die silently: a fuse blows, a lead breaks internally, a battery goes flat. If that happens after you proved the tester but before or during the test, the circuit could be live and your tester would still read 'dead'.</p>
<h4>Why the after-prove closes it</h4><p>Proving the tester again on a known source straight after testing confirms it was still functioning at the moment it read dead. Now a dead reading can only mean the circuit really is dead — not that the tester quit.</p>
<h4>No shortcuts</h4><p>This is the single step people are most tempted to drop, and it's the one that has killed. Prove after, always, before you put a hand near a conductor.</p>`,
// 7 single phase test
`<h4>Test every pair</h4><p>On a single-phase circuit that's line, neutral and earth — so the tests are L–N, L–E and N–E. Three quick checks that leave no conductor unproven.</p>
<h4>Why neutral isn't a free pass</h4><p>Neutral is not automatically dead. A shared or borrowed neutral from another circuit, a wiring error, or a backfeed can leave it live even when 'the' line is isolated. Prove it like any other conductor.</p>
<h4>Don't assume identity</h4><p>Colours get reused, cables get re-terminated, mistakes happen. Testing every combination means you don't have to trust that the conductor labelled neutral actually is one.</p>`,
// 8 three phase test
`<h4>All ten</h4><p>Three phases, neutral and earth give ten combinations: L1–L2, L2–L3, L1–L3, then L1–N, L2–N, L3–N, then L1–E, L2–E, L3–E, and finally N–E. Prove each one dead.</p>
<h4>Why be exhaustive</h4><p>You're proving that no conductor holds a voltage relative to any other or to earth. A single skipped pair — say you tested phase-to-phase but not phase-to-earth — is precisely where a backfed or crossed conductor hides.</p>
<h4>Method beats memory</h4><p>Work a consistent pattern every time (phases together, then each to neutral, then each to earth, then neutral to earth) so you never lose your place and never leave one out.</p>`,
// 9 proving unit / known source
`<h4>The reference problem</h4><p>Prove–test–prove needs something you know is live to prove the tester against. If you use a 'known live' source that has quietly gone dead, your working tester reads nothing and you'll conclude it's faulty — undermining the whole check.</p>
<h4>Why a proving unit wins</h4><p>A proving unit generates its own voltage on demand, so it's a reliable, self-contained reference you carry with you. No hunting for a live socket, no doubt about whether the source was really live.</p>
<h4>If you must use a live source</h4><p>Only one you're certain is live and safe to prove on. But the proving unit is there precisely so you don't have to make that judgement in the field — use it.</p>`,
// 10 GS38
`<h4>What it covers</h4><p>GS38 is HSE guidance on the test equipment used by people working on or near low-voltage systems — voltage indicators, probes, leads and accessories. Its whole aim is to reduce the risk that the act of testing itself causes a shock or an arc flash.</p>
<h4>Why it exists</h4><p>Poor test gear has hurt and killed people: long exposed probe tips shorting terminals, unfused leads feeding an arc, meters not rated for the fault energy present. GS38 sets out what good equipment looks like.</p>
<h4>How you meet it</h4><p>Use voltage indicators and leads described as 'to GS38' — shrouded fused probes, finger barriers, current-limited leads — and use them within their category and voltage rating. It's the practical baseline for the proving you do every day.</p>`,
// 11 two-pole vs multimeter
`<h4>Purpose-built vs general-purpose</h4><p>A two-pole voltage indicator does one job: show, clearly, whether voltage is present. There's no range dial, no AC/DC selector, no continuity mode to be caught in — fewer settings means fewer ways to be misled.</p>
<h4>How a multimeter fools you</h4><p>Left on the wrong range or function, on resistance instead of volts, or with a flat battery, a multimeter can read zero on a live circuit. It's a superb measuring instrument and a poor proving-dead tool for exactly that reason.</p>
<h4>The right tool</h4><p>For proving dead, reach for the two-pole tester to GS38 and prove it before and after. Save the multimeter for when you actually need a number, not a life-or-death yes/no.</p>`,
// 12 proving unit deep
`<h4>What it is</h4><p>A small device that outputs a voltage sufficient to light up (or trigger) your voltage indicator, so you can confirm the tester works on demand — no external supply required.</p>
<h4>Why it matters</h4><p>It makes the two 'proves' in prove–test–prove trivial and reliable. You're no longer dependent on finding a live source you trust, which removes a real source of error and hesitation from the routine.</p>
<h4>Use it right</h4><p>Prove the tester on it immediately before testing the circuit and immediately after. Keep it with the tester so the whole prove–test–prove kit lives together — the routine only works if the proving reference is always to hand.</p>`,
// 13 probe requirements
`<h4>The tip</h4><p>Exposed metal at the probe tip is kept to a minimum — shrouded or spring-loaded so only a millimetre or two protrudes. Long bare tips bridge adjacent terminals and cause the flashover they're meant to help you avoid.</p>
<h4>The leads</h4><p>Insulated, and fused or current-limited with HRC (high rupturing capacity) fuses, so that if the probes do short something the lead can't feed a large fault current into an arc. Finger barriers keep your hands back from the tips.</p>
<h4>Why so fussy</h4><p>At the energies present in real installations, a slip with poor test gear can produce an arc flash, not just a spark. Every one of these features exists because the alternative has burned or electrocuted someone.</p>`,
// 14 CAT ratings
`<h4>What the category means</h4><p>Measurement categories rate how much transient over-voltage (a spike from a fault or switching event) the instrument can survive at a given location. Higher category = closer to the source = bigger potential transients to withstand.</p>
<h4>III vs IV</h4><p>CAT III covers the fixed installation and distribution — sub-boards, fixed loads, motors. CAT IV covers the origin of the installation — the service entrance, main incomer, metering, where the available fault energy is greatest.</p>
<h4>Get it right</h4><p>Use gear rated for both the category of the location and the voltage. A CAT III-rated meter taken to a CAT IV position can be overwhelmed by a transient and flash over internally — with your hands on it. When in doubt, rate up.</p>`,
// 15 stored charge
`<h4>Off isn't discharged</h4><p>Drives, switch-mode power supplies and capacitor banks store energy in their DC-link capacitors. Opening the isolator removes the supply but leaves that charge sitting on the terminals — often at a lethal voltage — for minutes afterward.</p>
<h4>Wait, then prove</h4><p>Respect the manufacturer's stated discharge time before opening the unit, and then prove dead at the actual DC terminals with a suitable tester. Don't rely on bleed resistors having done their job — they fail, and rushing kills.</p>
<h4>Treat every drive this way</h4><p>Assume any drive or capacitive equipment holds a charge until you've proved otherwise at the terminals. This is one of the most common ways experienced people get caught — 'it's been off for ages' is not proof.</p>`,
// 16 backfeed
`<h4>Dead here, live from there</h4><p>A conductor can read dead at the main isolator yet be energised from somewhere else — a UPS or inverter, a standby generator, a control supply fed from another panel, or a shared neutral carrying current from an adjacent circuit.</p>
<h4>Isolate all sources</h4><p>Trace and isolate every source that can feed the point you're working on, not just the obvious incomer. Interlinked machines and automatic standby supplies are the usual surprises.</p>
<h4>Prove dead catches it</h4><p>This is one big reason the prove-dead step is non-negotiable: it's your last line of defence against a backfeed you didn't know existed. If a conductor you expected dead reads live, stop and find out why before going further.</p>`,
// 17 multiple supplies
`<h4>Rarely just one feed</h4><p>Modern machines commonly have more than one supply: a main power incomer, a separate control transformer (sometimes fed from a different board), an independent 24 V supply, or panels interlocked with neighbours. Killing one doesn't kill them all.</p>
<h4>Find them first</h4><p>Read the schematics and trace the supplies before you isolate, so you know every point that needs locking off. A machine that's 'dead' on its main isolator can still have a live control circuit or a second incomer.</p>
<h4>Lock every one</h4><p>Each identified source gets isolated, locked and tagged. Then prove dead at the point of work to confirm you found them all — the drawings might be out of date, but a proven dead reading isn't.</p>`,
// 18 non-electrical energy
`<h4>Electrical isolation is only half of it</h4><p>Cutting the power leaves plenty of other energy stored and ready to release: compressed air in a receiver or cylinder, hydraulic pressure in an accumulator, a compressed or extended spring, a raised or suspended load under gravity, and the inertia of anything still spinning.</p>
<h4>Make it all safe</h4><p>Vent and lock off pneumatics and hydraulics, block or support raised loads, release or restrain springs, and let rotating masses come to a genuine stop (or lock them). Each of these can move a guard, a ram or a tool with the power fully off.</p>
<h4>Think 'all energy'</h4><p>A complete isolation addresses every energy source that could cause harm, not just the electrical one. Ask what could still move, fall, spring or spin — then make each of those safe before you commit your hands.</p>`,
// 19 never assume
`<h4>Trust nothing you didn't prove</h4><p>Someone telling you it's isolated is not proof. Isolations get reversed, the wrong breaker gets locked, tags get moved, drawings mislead. The gap between 'it should be dead' and 'it is dead' is exactly where people are hurt.</p>
<h4>Dead working is the default</h4><p>Work on it dead unless there's a rare, specifically justified and controlled reason to work live. And 'dead' means you proved it — with your own tester, using prove–test–prove, at the point you're about to touch, just before you touch it.</p>
<h4>Own the check</h4><p>The only isolation you can rely on is the one you verified yourself, now. It takes a minute and it's the minute that keeps you alive — no deadline, no colleague's assurance and no production pressure is worth skipping it.</p>`
