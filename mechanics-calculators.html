<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16181D">
<title>Field Tools · Simple Machines Calculators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16181D; --panel:#1E2128; --panel-2:#232730;
    --line:#31353F; --line-soft:#282C34;
    --ink:#E9E7E2; --muted:#8B929C; --faint:#5A616B;
    --amber:#F0B429; --green:#4FA96A; --blue:#3B8CD1; --red:#E05646; --violet:#8E6FD1;
    --shadow:0 18px 40px -18px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #1b1e25 0%, var(--bg) 55%);
    color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;
    padding:max(14px,env(safe-area-inset-top)) 14px max(20px,env(safe-area-inset-bottom));
    min-height:100dvh;
  }
  .app{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px}

  /* header */
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.22em;color:var(--amber);text-transform:uppercase;margin-bottom:11px}
  .backlink{display:inline-flex;align-items:center;gap:5px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.1em;color:var(--muted);text-decoration:none;margin-bottom:11px;transition:.15s}
  .backlink:hover{color:var(--amber)}
  .titlerow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:13px}
  h1{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:23px;letter-spacing:.02em;text-transform:uppercase;line-height:1}
  .docref{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:5px 8px;letter-spacing:.08em;white-space:nowrap;text-align:center}

  .tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x proximity}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;scroll-snap-align:center;font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:13px;letter-spacing:.01em;text-transform:uppercase;color:var(--muted);background:transparent;border:none;border-radius:8px;padding:11px 15px;cursor:pointer;transition:.15s;white-space:nowrap}
  .tab[aria-selected="true"]{color:var(--bg);background:var(--amber)}
  .tab:not([aria-selected="true"]):hover{color:var(--ink)}
  .tab:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}

  .subline{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.05em;color:var(--faint);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .unitseg{display:flex;gap:3px;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:3px}
  .unitbtn{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--muted);background:transparent;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;transition:.15s}
  .unitbtn[aria-selected="true"]{color:var(--bg);background:var(--blue)}
  .unitbtn:focus-visible{outline:2px solid var(--amber);outline-offset:1px}

  /* card */
  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .figwrap{padding:16px 14px 6px;display:flex;justify-content:center;background:rgba(0,0,0,.14);border-bottom:1px solid var(--line-soft)}
  .figwrap svg{width:100%;max-width:420px;height:auto;display:block}
  .figwrap text{font-family:"IBM Plex Mono",monospace}

  .body{padding:16px 15px 17px}

  /* class / preset chips */
  .chiprow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:15px}
  .chiprow::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:8px 12px;border-radius:20px;cursor:pointer;transition:.15s;white-space:nowrap}
  .chip:hover{color:var(--ink);border-color:var(--faint)}
  .chip[aria-pressed="true"]{color:var(--bg);background:var(--violet);border-color:var(--violet)}
  .chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

  /* inputs */
  .field{margin-bottom:15px}
  .flabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:10px}
  .fname{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .fval{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--amber);font-weight:600;white-space:nowrap}
  .fval input{width:78px;background:var(--panel);border:1px solid var(--line);color:var(--amber);font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;border-radius:5px;padding:4px 6px;text-align:right;-moz-appearance:textfield}
  .fval input::-webkit-outer-spin-button,.fval input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .fval input:focus{outline:none;border-color:var(--amber)}
  .fval .u{color:var(--faint);font-weight:400;margin-left:4px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--line);border-radius:3px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--amber);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--amber)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--amber);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--amber)}
  input[type=range]:focus-visible{box-shadow:0 0 0 2px var(--amber)}
  .hint{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--faint);margin-top:5px;letter-spacing:.02em}

  /* result */
  .result{background:rgba(240,180,41,.08);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:0 9px 9px 0;padding:13px 15px;margin:4px 0 14px}
  .rlabel{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
  .rvalue{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:30px;line-height:1;letter-spacing:.01em}
  .rvalue .u{font-size:15px;color:var(--muted);font-weight:500;margin-left:5px}
  .rsub{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);margin-top:7px}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin-bottom:15px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px}
  .mlabel{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
  .mvalue{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:16px}
  .mvalue small{font-size:10px;color:var(--muted);font-weight:400;margin-left:2px}

  .warn{background:rgba(224,86,70,.09);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:14px}
  .warn .wl{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:4px}
  .warn p{font-size:13px;line-height:1.5;color:#D7D4CD}
  .warn.good{border-left-color:var(--green);background:rgba(79,169,106,.08)}
  .warn.good .wl{color:var(--green)}

  /* working */
  details.work{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel)}
  details.work summary{list-style:none;cursor:pointer;padding:12px 14px;font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center;transition:.15s}
  details.work summary::-webkit-details-marker{display:none}
  details.work summary:hover{color:var(--ink)}
  details.work summary .caret{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--faint)}
  details.work[open] summary{border-bottom:1px solid var(--line-soft);color:var(--amber)}
  details.work[open] summary .caret{transform:rotate(90deg)}
  .workbody{padding:13px 14px 15px;font-family:"IBM Plex Mono",monospace;font-size:12px;line-height:1.75;color:#D7D4CD;overflow-x:auto}
  .workbody .wl{color:var(--faint)}
  .workbody .hl{color:var(--amber);font-weight:600}
  .workbody .sec{color:var(--blue);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin:11px 0 4px}
  .workbody .sec:first-child{margin-top:0}

  .footnote{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--faint);line-height:1.6;letter-spacing:.02em;text-align:center;padding:0 4px}

  @media (max-width:400px){
    .rvalue{font-size:26px}
    .body{padding:14px 12px 15px}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="backlink" href="index.html">← Toolbench</a>
    <div class="eyebrow">Field Tools · Mechanics</div>
    <div class="titlerow">
      <h1>Simple Machines</h1>
      <div class="docref">MECH-REF-001<br>REV&nbsp;A</div>
    </div>
    <nav class="tabs" id="tabs" role="tablist" aria-label="Choose calculator"></nav>
  </header>

  <div class="subline">
    <span id="subtitle"></span>
    <span class="unitseg" role="group" aria-label="Force units">
      <button class="unitbtn" id="uN"  aria-selected="true">N</button>
      <button class="unitbtn" id="uKg" aria-selected="false">kg</button>
    </span>
  </div>

  <div class="card">
    <div class="figwrap" id="fig"></div>
    <div class="body">
      <div class="chiprow" id="chips"></div>
      <div id="inputs"></div>
      <div id="result"></div>
      <div class="metrics" id="metrics"></div>
      <div id="note"></div>
      <details class="work" id="workBox">
        <summary>Show the working <span class="caret">›</span></summary>
        <div class="workbody" id="work"></div>
      </details>
    </div>
  </div>

  <p class="footnote" id="foot"></p>
</div>

<script>
/* ============================================================
   Simple Machines Calculators
   Add a calculator by pushing an object onto CALCS:
     { id, name, sub, foot, inputs[], presets[], compute(v), diagram(v,r) }
   compute() returns { primary, metrics[], note?, work[] }
   Forces are handled internally in NEWTONS; the unit toggle
   only affects display and force-input entry.
   ============================================================ */

const G = 9.81;               // m/s^2
let unit = "N";               // "N" | "kg"
let active = 0;

const $ = id => document.getElementById(id);
const rad = d => d * Math.PI / 180;

/* number formatting that stays readable across magnitudes */
function fmt(n, dp){
  if(!isFinite(n)) return "–";
  if(dp !== undefined) return n.toFixed(dp);
  const a = Math.abs(n);
  if(a === 0)   return "0";
  if(a >= 1000) return n.toFixed(0);
  if(a >= 100)  return n.toFixed(1);
  if(a >= 10)   return n.toFixed(2);
  return n.toFixed(3).replace(/0+$/,"").replace(/\.$/,"");
}
/* force display: convert N -> chosen unit */
const fDisp  = n => unit === "kg" ? n / G : n;
const fLabel = () => unit === "kg" ? "kg" : "N";
const fFmt   = n => fmt(fDisp(n));

/* ---------------- calculators ---------------- */
const CALCS = [];

/* ---------- 1. LEVER ---------- */
CALCS.push({
  id:"lever",
  name:"Lever",
  sub:"moments · three classes",
  foot:"Law of the lever: effort × effort arm = load × load arm. Force gained is distance lost.",
  inputs:[
    {key:"load", label:"Load",        unit:"N",  min:10,  max:5000, step:10, def:800, force:true},
    {key:"a",    label:"Effort arm",  unit:"mm", min:20,  max:2000, step:10, def:600},
    {key:"b",    label:"Load arm",    unit:"mm", min:20,  max:2000, step:10, def:150},
    {key:"eff",  label:"Efficiency",  unit:"%",  min:40,  max:100,  step:1,  def:100}
  ],
  presets:[
    {name:"Class 1 · crowbar",   v:{cls:1, load:800,  a:600, b:150}},
    {name:"Class 2 · barrow",    v:{cls:2, load:1200, a:1400, b:450}},
    {name:"Class 3 · forearm",   v:{cls:3, load:50,   a:45,  b:350}}
  ],
  /* lever class is an extra bit of state, defaulted here */
  extra:{cls:1},
  compute(v){
    const cls = v.cls || 1;
    let a = v.a, b = v.b;
    /* class 2: load sits between fulcrum and effort  -> a > b
       class 3: effort sits between fulcrum and load  -> a < b */
    if(cls === 2 && b >= a) b = Math.max(20, a - 10);
    if(cls === 3 && a >= b) a = Math.max(20, b - 10);
    v.a = a; v.b = b;

    const eta   = v.eff / 100;
    const ima   = a / b;                 // ideal MA = velocity ratio
    const ideal = v.load / ima;
    const eff   = ideal / eta;           // real effort once losses included
    const ma    = v.load / eff;

    const note = cls === 3
      ? {kind:"warn", label:"Class 3", text:"Effort arm is shorter than the load arm, so MA is always less than 1 — you trade force for speed and range of movement, not for advantage."}
      : (ima < 1
          ? {kind:"warn", label:"No advantage", text:"The load arm is longer than the effort arm, so this arrangement multiplies distance, not force."}
          : null);

    return {
      primary:{ label:"Effort required", value:fFmt(eff), unit:fLabel(),
                sub:`to lift ${fFmt(v.load)} ${fLabel()}  ·  class ${cls} lever` },
      raw:{ effort:eff, ima:ima },
      metrics:[
        {label:"Ideal MA",     value:fmt(ima,2)+":1"},
        {label:"Actual MA",    value:fmt(ma,2)+":1"},
        {label:"Velocity ratio",value:fmt(ima,2)},
        {label:"Effort moves", value:fmt(ima,2)+"×", small:"load dist"}
      ],
      note,
      work:[
        {sec:"Mechanical advantage"},
        `MA = effort arm ÷ load arm`,
        `   = ${fmt(a,0)} ÷ ${fmt(b,0)}`,
        `   = <span class="hl">${fmt(ima,2)}</span>`,
        {sec:"Effort (ideal)"},
        `E = load ÷ MA`,
        `  = ${fFmt(v.load)} ÷ ${fmt(ima,2)}`,
        `  = ${fFmt(ideal)} ${fLabel()}`,
        {sec:"Effort (at "+v.eff+"% efficiency)"},
        `E = ideal ÷ η`,
        `  = ${fFmt(ideal)} ÷ ${fmt(eta,2)}`,
        `  = <span class="hl">${fFmt(eff)} ${fLabel()}</span>`,
        {sec:"The trade-off"},
        `lift the load 100 mm`,
        `→ effort end moves ${fmt(100*ima,0)} mm`
      ]
    };
  },
  diagram(v,res){
    const cls = v.cls || 1, a = v.a, b = v.b;
    const W=420,H=190, cy=112;
    /* scale beam so the longest arm fits */
    const span = cls===1 ? (a+b) : Math.max(a,b);
    const px   = 150 / Math.max(span,1) * (span>0?1:1);
    const s    = Math.min(1.55, 340/Math.max(span,1));  // mm -> px
    let fx, ex, lx;
    if(cls===1){ fx = 60 + a*s;      ex = 60;            lx = fx + b*s; }
    if(cls===2){ fx = 60;            ex = fx + a*s;      lx = fx + b*s; }
    if(cls===3){ fx = 60;            ex = fx + a*s;      lx = fx + b*s; }
    const beamL = Math.min(fx,ex,lx) - 14, beamR = Math.max(fx,ex,lx) + 14;
    return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="class ${cls} lever diagram">
      <defs>
        <marker id="lvA" markerWidth="9" markerHeight="9" refX="4" refY="8" orient="auto">
          <path d="M4,9 L0,2 L8,2 Z" fill="var(--amber)"/></marker>
        <marker id="lvG" markerWidth="9" markerHeight="9" refX="4" refY="8" orient="auto">
          <path d="M4,9 L0,2 L8,2 Z" fill="var(--green)"/></marker>
      </defs>
      <line x1="${beamL}" y1="${cy}" x2="${beamR}" y2="${cy}" stroke="#C9CDD4" stroke-width="7" stroke-linecap="round"/>
      <path d="M${fx-15},${cy+34} L${fx},${cy+5} L${fx+15},${cy+34} Z" fill="#3B8CD1" opacity="0.9"/>
      <text x="${fx}" y="${cy+48}" fill="#3B8CD1" font-size="10" text-anchor="middle">fulcrum</text>
      <line x1="${ex}" y1="${cy-58}" x2="${ex}" y2="${cy-11}" stroke="var(--amber)" stroke-width="3" marker-end="url(#lvA)"/>
      <text x="${ex}" y="${cy-66}" fill="var(--amber)" font-size="11" text-anchor="middle">EFFORT</text>
      <text x="${ex}" y="${cy-78}" fill="var(--amber)" font-size="10" text-anchor="middle">${fFmt(res.raw.effort)} ${fLabel()}</text>
      <line x1="${lx}" y1="${cy-58}" x2="${lx}" y2="${cy-11}" stroke="var(--green)" stroke-width="3" marker-end="url(#lvG)"/>
      <text x="${lx}" y="${cy-66}" fill="var(--green)" font-size="11" text-anchor="middle">LOAD</text>
      <text x="${lx}" y="${cy-78}" fill="var(--green)" font-size="10" text-anchor="middle">${fFmt(v.load)} ${fLabel()}</text>
      <line x1="${fx}" y1="${cy+62}" x2="${ex}" y2="${cy+62}" stroke="var(--amber)" stroke-width="1" opacity="0.6"/>
      <text x="${(fx+ex)/2}" y="${cy+76}" fill="var(--amber)" font-size="9" text-anchor="middle">a = ${fmt(v.a,0)} mm</text>
      <line x1="${fx}" y1="${cy+84}" x2="${lx}" y2="${cy+84}" stroke="var(--green)" stroke-width="1" opacity="0.6"/>
      <text x="${(fx+lx)/2}" y="${cy+98}" fill="var(--green)" font-size="9" text-anchor="middle">b = ${fmt(v.b,0)} mm</text>
    </svg>`;
  }
});

/* ---------- 2. INCLINED PLANE ---------- */
CALCS.push({
  id:"incline",
  name:"Incline",
  sub:"ramps · friction · self-locking",
  foot:"A ramp trades distance for force: the shallower the slope, the less effort — but the further you push.",
  inputs:[
    {key:"w",     label:"Weight",       unit:"N",  min:50, max:10000, step:50, def:1000, force:true},
    {key:"ang",   label:"Slope angle",  unit:"°",  min:1,  max:60,    step:0.5,def:20},
    {key:"mu",    label:"Friction µ",   unit:"",   min:0,  max:0.8,   step:0.01,def:0.15},
    {key:"h",     label:"Rise height",  unit:"mm", min:50, max:5000,  step:50, def:1000}
  ],
  presets:[
    {name:"Loading ramp",   v:{w:1000, ang:12, mu:0.15, h:600}},
    {name:"Steel on steel", v:{w:2000, ang:20, mu:0.20, h:1000}},
    {name:"Frictionless",   v:{w:1000, ang:20, mu:0,    h:1000}}
  ],
  compute(v){
    const th   = rad(v.ang);
    const sin  = Math.sin(th), cos = Math.cos(th);
    const ima  = 1/sin;                       // = slope length / height
    const N    = v.w * cos;                   // normal force
    const fric = v.mu * N;
    const ideal= v.w * sin;                   // frictionless, push parallel to slope
    const push = v.w * (sin + v.mu*cos);      // push up the slope
    const hold = v.w * (sin - v.mu*cos);      // force needed to stop it sliding back
    const eta  = ideal/push;
    const ma   = v.w/push;
    const len  = v.h / sin;                   // slope length for the given rise
    const selfLock = v.mu >= Math.tan(th);

    const note = selfLock
      ? {kind:"good", label:"Self-locking", text:`µ (${fmt(v.mu,2)}) ≥ tan θ (${fmt(Math.tan(th),2)}), so the load will not slide back on its own. Friction holds it.`}
      : {kind:"warn", label:"Will slide back", text:`µ (${fmt(v.mu,2)}) < tan θ (${fmt(Math.tan(th),2)}). Left alone it runs away — ${fFmt(hold)} ${fLabel()} is needed just to hold it.`};

    return {
      primary:{ label:"Effort to push up", value:fFmt(push), unit:fLabel(),
                sub:`${fFmt(v.w)} ${fLabel()} up a ${fmt(v.ang,1)}° slope  ·  µ = ${fmt(v.mu,2)}` },
      raw:{ push:push, ideal:ideal, N:N, fric:fric, ima:ima, len:len, hold:hold },
      metrics:[
        {label:"Ideal MA",       value:fmt(ima,2)+":1"},
        {label:"Actual MA",      value:fmt(ma,2)+":1"},
        {label:"Efficiency",     value:fmt(eta*100,0)+"%"},
        {label:"Normal force",   value:fFmt(N), small:fLabel()},
        {label:"Friction",       value:fFmt(fric), small:fLabel()},
        {label:"Slope length",   value:fmt(len,0), small:"mm"}
      ],
      note,
      work:[
        {sec:"Geometry"},
        `IMA = 1 ÷ sin θ  =  slope ÷ rise`,
        `    = 1 ÷ sin ${fmt(v.ang,1)}°`,
        `    = <span class="hl">${fmt(ima,2)}</span>`,
        `slope length = rise ÷ sin θ = ${fmt(len,0)} mm`,
        {sec:"Forces on the slope"},
        `N     = W cos θ = ${fFmt(N)} ${fLabel()}`,
        `F_fric = µ N     = ${fFmt(fric)} ${fLabel()}`,
        {sec:"Effort to push up"},
        `F = W (sin θ + µ cos θ)`,
        `  = ${fFmt(v.w)} × (${fmt(sin,3)} + ${fmt(v.mu,2)}×${fmt(cos,3)})`,
        `  = <span class="hl">${fFmt(push)} ${fLabel()}</span>`,
        {sec:"Frictionless comparison"},
        `F = W sin θ = ${fFmt(ideal)} ${fLabel()}`,
        `friction is costing ${fFmt(push-ideal)} ${fLabel()}`,
        {sec:"Self-locking check"},

/* ---------- 5. BELT DRIVE (drive pulleys, not lifting) ---------- */
CALCS.push({
  id:"belt",
  name:"Belt Drive",
  sub:"speed & torque ratios",
  foot:"Drive pulleys trade speed for torque. Small driving big = slower and stronger.",
  inputs:[
    {key:"d1", label:"Driver dia",   unit:"mm",  min:20, max:1000, step:5,  def:100},
    {key:"d2", label:"Driven dia",   unit:"mm",  min:20, max:1000, step:5,  def:300},
    {key:"n1", label:"Driver speed", unit:"rpm", min:50, max:3000, step:10, def:1450},
    {key:"kw", label:"Motor power",  unit:"kW",  min:0.1,max:75,   step:0.1,def:4},
    {key:"eff",label:"Efficiency",   unit:"%",   min:70, max:100,  step:1,  def:96}
  ],
  presets:[
    {name:"Reduction 3:1", v:{d1:100, d2:300, n1:1450, kw:4,  eff:96}},
    {name:"1:1 direct",    v:{d1:200, d2:200, n1:1450, kw:4,  eff:97}},
    {name:"Overdrive",     v:{d1:300, d2:100, n1:1450, kw:4,  eff:96}}
  ],
  compute(v){
    const eta   = v.eff/100;
    const ratio = v.d2/v.d1;                  // reduction ratio
    const n2    = v.n1 * v.d1 / v.d2;         // driven speed, rpm
    const belt  = Math.PI * (v.d1/1000) * v.n1 / 60;   // m/s
    const t1    = 9550 * v.kw / v.n1;         // N·m at driver
    const t2    = t1 * ratio * eta;           // N·m at driven
    const kind  = ratio > 1.001 ? "reduction" : (ratio < 0.999 ? "overdrive" : "1:1 direct");
    const note  = belt > 30
      ? {kind:"warn", label:"High belt speed", text:`${fmt(belt,1)} m/s is above the usual comfortable range for standard V-belts (~30 m/s). Check the belt specification.`}
      : null;
    return {
      primary:{ label:"Driven speed", value:fmt(n2,0), unit:"rpm",
                sub:`${fmt(ratio,3)} : 1 ${kind}  ·  driver ${fmt(v.n1,0)} rpm` },
      raw:{ n2:n2, ratio:ratio, belt:belt, t1:t1, t2:t2 },
      metrics:[
        {label:"Ratio",        value:fmt(ratio,3)+":1"},
        {label:"Driven speed", value:fmt(n2,0), small:"rpm"},
        {label:"Belt speed",   value:fmt(belt,2), small:"m/s"},
        {label:"Driver torque",value:fmt(t1,1), small:"N·m"},
        {label:"Driven torque",value:fmt(t2,1), small:"N·m"},
        {label:"Efficiency",   value:v.eff+"%"}
      ],
      note,
      work:[
        {sec:"Speed"},
        `N₁ D₁ = N₂ D₂`,
        `N₂ = N₁ × D₁ ÷ D₂`,
        `   = ${fmt(v.n1,0)} × ${fmt(v.d1,0)} ÷ ${fmt(v.d2,0)}`,
        `   = <span class="hl">${fmt(n2,0)} rpm</span>`,
        {sec:"Ratio"},
        `ratio = D₂ ÷ D₁ = ${fmt(ratio,3)} : 1  (${kind})`,
        {sec:"Belt speed"},
        `v = π D₁ N₁ ÷ 60`,
        `  = π × ${fmt(v.d1/1000,3)} × ${fmt(v.n1,0)} ÷ 60`,
        `  = ${fmt(belt,2)} m/s`,
        {sec:"Torque"},
        `T = 9550 × kW ÷ rpm`,
        `T₁ = 9550 × ${fmt(v.kw,1)} ÷ ${fmt(v.n1,0)} = ${fmt(t1,1)} N·m`,
        `T₂ = T₁ × ratio × η = <span class="hl">${fmt(t2,1)} N·m</span>`,
        {sec:"The trade"},
        `speed ÷ ${fmt(ratio,2)}  →  torque × ${fmt(ratio,2)}`
      ]
    };
  },
  diagram(v,res){
    const W=420,H=190, cy=95;
    const maxR=62;
    const big=Math.max(v.d1,v.d2);
    const r1=Math.max(13, maxR*v.d1/big), r2=Math.max(13, maxR*v.d2/big);
    const c1x=110, c2x=300;
    /* open belt tangents (equal-ish radii approximation is fine visually) */
    const dx=c2x-c1x, dy=0, dist=Math.hypot(dx,dy);
    const alpha=Math.asin(Math.max(-1,Math.min(1,(r2-r1)/dist)));
    const t1y=cy-r1*Math.cos(alpha), t2y=cy-r2*Math.cos(alpha);
    const b1y=cy+r1*Math.cos(alpha), b2y=cy+r2*Math.cos(alpha);
    const t1x=c1x+r1*Math.sin(alpha), t2x=c2x+r2*Math.sin(alpha);
    const n2=v.n1*v.d1/v.d2;
    return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="belt drive between two pulleys">
      <line x1="${t1x}" y1="${t1y}" x2="${t2x}" y2="${t2y}" stroke="var(--amber)" stroke-width="3"/>
      <line x1="${t1x}" y1="${b1y}" x2="${t2x}" y2="${b2y}" stroke="var(--amber)" stroke-width="3"/>
      <circle cx="${c1x}" cy="${cy}" r="${r1}" fill="#232730" stroke="#C9CDD4" stroke-width="2.5"/>
      <circle cx="${c2x}" cy="${cy}" r="${r2}" fill="#232730" stroke="#3B8CD1" stroke-width="2.5"/>
      <circle cx="${c1x}" cy="${cy}" r="3" fill="#8B929C"/>
      <circle cx="${c2x}" cy="${cy}" r="3" fill="#8B929C"/>
      <text x="${c1x}" y="${cy+4}" fill="#C9CDD4" font-size="10" text-anchor="middle" dy="-14">DRIVER</text>
      <text x="${c1x}" y="${cy+16}" fill="#8B929C" font-size="9" text-anchor="middle">Ø${fmt(v.d1,0)}</text>
      <text x="${c2x}" y="${cy+4}" fill="#3B8CD1" font-size="10" text-anchor="middle" dy="-14">DRIVEN</text>
      <text x="${c2x}" y="${cy+16}" fill="#8B929C" font-size="9" text-anchor="middle">Ø${fmt(v.d2,0)}</text>
      <text x="${c1x}" y="${cy+r1+22}" fill="var(--amber)" font-size="10" text-anchor="middle">${fmt(v.n1,0)} rpm</text>
      <text x="${c2x}" y="${cy+r2+22}" fill="var(--green)" font-size="10" text-anchor="middle">${fmt(n2,0)} rpm</text>
      <text x="${(c1x+c2x)/2}" y="${H-12}" fill="#8B929C" font-size="9" text-anchor="middle">ratio ${fmt(v.d2/v.d1,3)} : 1</text>
    </svg>`;
  }
});

/* ---------------- build tabs ---------------- */
(function(){
  const wrap=$("tabs");
  CALCS.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="tab"; b.textContent=c.name; b.setAttribute("role","tab");
    b.setAttribute("aria-selected", i===active);
    b.onclick=()=>{ active=i; renderAll(); };

/* ---------------- rendering ---------------- */
function renderTabs(){
  document.querySelectorAll(".tab").forEach((b,i)=>{
    b.setAttribute("aria-selected", i===active);
    if(i===active && b.scrollIntoView) b.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
  });
}

function renderChips(){
  const c=CALCS[active], wrap=$("chips");
  wrap.innerHTML="";
  /* lever gets class selectors instead of presets-only */
  if(c.id==="lever"){
    [1,2,3].forEach(k=>{
      const b=document.createElement("button");
      b.className="chip"; b.textContent="Class "+k;
      b.setAttribute("aria-pressed", (state[active].cls||1)===k);
      b.onclick=()=>{ state[active].cls=k; renderAll(); };
      wrap.appendChild(b);
    });
  }
  (c.presets||[]).forEach(p=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=p.name;
    b.setAttribute("aria-pressed","false");
    b.onclick=()=>{ Object.assign(state[active], p.v); renderAll(); };
    wrap.appendChild(b);
  });
}

function renderInputs(){
  const c=CALCS[active], v=state[active], wrap=$("inputs");
  wrap.innerHTML="";
  c.inputs.forEach(inp=>{
    const isForce = !!inp.force;
    const shownUnit = isForce ? fLabel() : inp.unit;
    const shownVal  = isForce ? fDisp(v[inp.key]) : v[inp.key];
    const shownMin  = isForce ? fDisp(inp.min) : inp.min;
    const shownMax  = isForce ? fDisp(inp.max) : inp.max;

    const f=document.createElement("div"); f.className="field";
    const dec = inp.step < 1 ? (inp.step<0.05?2:1) : 0;
    f.innerHTML=`
      <div class="flabel">
        <span class="fname">${inp.label}</span>
        <span class="fval"><input type="number" id="num_${inp.key}"
              value="${(+shownVal).toFixed(isForce?(unit==="kg"?1:0):dec)}"
              step="${isForce?"any":inp.step}"><span class="u">${shownUnit}</span></span>
      </div>
      <input type="range" id="rng_${inp.key}" min="${inp.min}" max="${inp.max}"
             step="${inp.step}" value="${v[inp.key]}" aria-label="${inp.label}">
      <div class="hint">${fmt(shownMin)} – ${fmt(shownMax)} ${shownUnit}</div>`;
    wrap.appendChild(f);

    const rng=f.querySelector("#rng_"+inp.key);
    const num=f.querySelector("#num_"+inp.key);
    rng.addEventListener("input", e=>{
      v[inp.key]=parseFloat(e.target.value);
      renderOutputs(); syncNumber(inp, v);
    });
    num.addEventListener("change", e=>{
      let val=parseFloat(e.target.value);
      if(!isFinite(val)) { renderInputs(); renderOutputs(); return; }
      if(isForce && unit==="kg") val = val*G;          // entered kg -> store N
      val = Math.max(inp.min, Math.min(inp.max, val));
      v[inp.key]=val;
      renderAll();
    });
  });
}
function syncNumber(inp,v){
  const num=$("num_"+inp.key); if(!num) return;
  const isForce=!!inp.force;
  const shown = isForce ? fDisp(v[inp.key]) : v[inp.key];
  const dec = isForce ? (unit==="kg"?1:0) : (inp.step<1?(inp.step<0.05?2:1):0);
  num.value = (+shown).toFixed(dec);
}

function renderOutputs(){
  const c=CALCS[active], v=state[active];
  const r=c.compute(v);

  $("fig").innerHTML = c.diagram(v, r);

  $("result").innerHTML = `
    <div class="result">
      <div class="rlabel">${r.primary.label}</div>
      <div class="rvalue">${r.primary.value}<span class="u">${r.primary.unit}</span></div>
      <div class="rsub">${r.primary.sub}</div>
    </div>`;

  $("metrics").innerHTML = r.metrics.map(m=>`
    <div class="metric">
      <div class="mlabel">${m.label}</div>
      <div class="mvalue">${m.value}${m.small?`<small>${m.small}</small>`:""}</div>
    </div>`).join("");

  $("note").innerHTML = r.note
    ? `<div class="warn ${r.note.kind==="good"?"good":""}">
         <div class="wl">${r.note.label}</div><p>${r.note.text}</p></div>`
    : "";

  $("work").innerHTML = r.work.map(l =>
    typeof l === "object"
      ? `<span class="sec">${l.sec}</span>`
      : `<div>${l.replace(/^(\s+)/, m=>"&nbsp;".repeat(m.length))}</div>`
  ).join("");

  /* re-sync inputs that compute() may have clamped */
  c.inputs.forEach(inp=>{
    const rng=$("rng_"+inp.key);
    if(rng && parseFloat(rng.value)!==v[inp.key]) rng.value=v[inp.key];
    syncNumber(inp,v);
  });
}

function renderAll(){
  const c=CALCS[active];
  renderTabs();
  $("subtitle").textContent = c.sub;
  $("foot").textContent = c.foot;
  renderChips();
  renderInputs();
  renderOutputs();
}

/* unit toggle */
$("uN").onclick  = ()=>{ unit="N";  $("uN").setAttribute("aria-selected","true");  $("uKg").setAttribute("aria-selected","false"); renderAll(); };
$("uKg").onclick = ()=>{ unit="kg"; $("uKg").setAttribute("aria-selected","true"); $("uN").setAttribute("aria-selected","false");  renderAll(); };

renderAll();
</script>
</body>
</html>
