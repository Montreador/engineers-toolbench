          <text class="vd-tick" x="${cx - 34}" y="30" fill="${col(states.Vin)}" text-anchor="end">${val("Vin", "V")}</text>
          <text class="vd-cap" x="${cx + 26}" y="76">R1</text>
          <text class="vd-tick" x="${cx + 26}" y="90" fill="${col(states.R1)}">${val("R1", "\u03A9")}</text>
          <text class="vd-cap" x="${cx + 26}" y="160">R2</text>
          <text class="vd-tick" x="${cx + 26}" y="174" fill="${col(states.R2)}">${val("R2", "\u03A9")}</text>
          <text class="vd-cap" x="192" y="118">Vout</text>
          <text class="vd-tick" x="192" y="132" fill="${col(states.Vout)}">${val("Vout", "V")}</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        inputOrder = []; Q.forEach(q => { raw[q.key] = ""; chEmpty(chans[q.key]); });
        [chans.I, chans.P1, chans.P2].forEach(chPending);
        statusEl.className = "status-msg"; statusEl.textContent = "Enter any three values.";
        drawDivider(currentVals(), currentStates());
        chans.Vin.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 6 — RESISTOR COLOUR CODES
     ============================================================ */
  const ResistorCodes = {
    id: "rcode",
    discipline: "ELECTRICAL",
    title: "Resistor colour codes",
    subtitle: "Click the bands to read a resistor, or type a value (even 4k7 shorthand) to set them. Works with 4, 5, and 6-band schemes.",

    mount(root) {
      const SUP = { "-": "\u207B", 0: "\u2070", 1: "\u00B9", 2: "\u00B2", 3: "\u00B3", 4: "\u2074", 5: "\u2075", 6: "\u2076", 7: "\u2077", 8: "\u2078", 9: "\u2079" };
      const sup = (n) => String(n).split("").map(c => SUP[c] || c).join("");

      const COLORS = {
        black:  { hex: "#1d1d1d", digit: 0, mult: 1e0, temp: 250 },
        brown:  { hex: "#7a4a1e", digit: 1, mult: 1e1, tol: 1, temp: 100 },
        red:    { hex: "#c62828", digit: 2, mult: 1e2, tol: 2, temp: 50 },
        orange: { hex: "#e8720c", digit: 3, mult: 1e3, temp: 15 },
        yellow: { hex: "#f2c200", digit: 4, mult: 1e4, temp: 25 },
        green:  { hex: "#2e9e4f", digit: 5, mult: 1e5, tol: 0.5, temp: 20 },
        blue:   { hex: "#2f6fd6", digit: 6, mult: 1e6, tol: 0.25, temp: 10 },
        violet: { hex: "#8e5bd0", digit: 7, mult: 1e7, tol: 0.1, temp: 5 },
        grey:   { hex: "#8a8a8a", digit: 8, mult: 1e8, tol: 0.05, temp: 1 },
        white:  { hex: "#e6e6e6", digit: 9, mult: 1e9 },
        gold:   { hex: "#c9a233", mult: 0.1, tol: 5 },
        silver: { hex: "#c2c2cc", mult: 0.01, tol: 10 },
      };
      const ORDER = ["black", "brown", "red", "orange", "yellow", "green", "blue", "violet", "grey", "white", "gold", "silver"];
      const withProp = (p) => ORDER.filter(c => COLORS[c][p] !== undefined);

      const state = { count: 4, d1: "yellow", d2: "violet", d3: "black", mult: "red", tol: "gold", temp: "brown" };

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>COLOUR CODE</h2>
          <div class="legend"><span><i class="dot set"></i> BAND</span><span><i class="dot meas"></i> VALUE</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">BANDS</span>
            <div class="seg" data-group="count">
              <button data-v="4" class="on">4</button><button data-v="5">5</button><button data-v="6">6</button>
            </div>
          </div>
        </div>
        <div class="rc-layout">
          <div class="rc-stage">
            <div class="rc-viz"></div>
            <div class="rc-readout"><div class="rc-val">\u2014</div><div class="rc-sub"></div></div>
          </div>
          <div class="rc-inputs">
            <div class="rc-reverse">
              <label>SET FROM VALUE (\u03A9)</label>
              <input class="rc-value" inputmode="text" placeholder="e.g. 4700, 4k7, 2M2" />
            </div>
            <div class="rc-bands"></div>
          </div>
        </div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">RESET</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>The tolerance band sits apart from the value bands on a real resistor, so it's drawn with a gap here too. Temperature-coefficient values (6th band) follow the common EIA set and can vary slightly by manufacturer.</span>`));

      const vizEl = panel.querySelector(".rc-viz");
      const valEl = panel.querySelector(".rc-val");
      const subEl = panel.querySelector(".rc-sub");
      const bandsEl = panel.querySelector(".rc-bands");
      const revEl = panel.querySelector(".rc-value");
      const statusEl = panel.querySelector(".status-msg");

      function slots() {
        const s = [
          { slot: "d1", kind: "digit", label: "BAND 1 \u00B7 1st digit" },
          { slot: "d2", kind: "digit", label: "BAND 2 \u00B7 2nd digit" },
        ];
        if (state.count >= 5) s.push({ slot: "d3", kind: "digit", label: "BAND 3 \u00B7 3rd digit" });
        s.push({ slot: "mult", kind: "mult", label: "MULTIPLIER" });
        s.push({ slot: "tol", kind: "tol", label: "TOLERANCE" });
        if (state.count === 6) s.push({ slot: "temp", kind: "temp", label: "TEMP. COEFF." });
        return s;
      }
      const validColors = (kind) => kind === "digit" ? withProp("digit") : kind === "mult" ? withProp("mult") : kind === "tol" ? withProp("tol") : withProp("temp");

      const rows = {};
      function buildBands() {
        bandsEl.innerHTML = ""; Object.keys(rows).forEach(k => delete rows[k]);
        slots().forEach(def => {
          const group = el("div", "band-group");
          group.innerHTML = `<div class="band-head"><span class="band-label">${def.label}</span><span class="band-sel"></span></div><div class="swatch-row"></div>`;
          const rowEl = group.querySelector(".swatch-row");
          validColors(def.kind).forEach(cname => {
            const sw = el("button", "swatch");
            sw.style.background = COLORS[cname].hex;
            sw.dataset.color = cname; sw.title = cname;
            sw.setAttribute("aria-label", cname);
            sw.addEventListener("click", () => { state[def.slot] = cname; revEl.value = ""; recompute(); });
            rowEl.appendChild(sw);
          });
          bandsEl.appendChild(group);
          rows[def.slot] = { row: rowEl, caption: group.querySelector(".band-sel"), kind: def.kind };
        });
      }

      function capFor(kind, cname) {
        const c = COLORS[cname], name = cname[0].toUpperCase() + cname.slice(1);
        if (kind === "digit") return `${name} \u00B7 ${c.digit}`;
        if (kind === "mult") return `${name} \u00B7 \u00D710${sup(Math.round(Math.log10(c.mult)))}`;
        if (kind === "tol") return `${name} \u00B7 \u00B1${c.tol}%`;
        return `${name} \u00B7 ${c.temp} ppm/K`;
      }

      function recompute() {
        const digitsN = state.count >= 5 ? 3 : 2;
        const digitCols = digitsN === 3 ? [state.d1, state.d2, state.d3] : [state.d1, state.d2];
        const D = digitCols.reduce((acc, c) => acc * 10 + COLORS[c].digit, 0);
        const m = COLORS[state.mult].mult;
        const R = D * m;
        const tol = COLORS[state.tol].tol;

        valEl.textContent = formatSI(R, "\u03A9");
        let sub = `\u00B1${tol}%`;
        if (state.count === 6) sub += `  \u00B7  ${COLORS[state.temp].temp} ppm/K`;
        subEl.innerHTML = sub;

        statusEl.className = "status-msg";
        statusEl.textContent = `${D} \u00D7 10${sup(Math.round(Math.log10(m)))} = ${formatSI(R, "\u03A9")}`;

        // refresh highlights + captions
        slots().forEach(def => {
          const r = rows[def.slot]; if (!r) return;
          r.row.querySelectorAll(".swatch").forEach(sw => sw.classList.toggle("sel", sw.dataset.color === state[def.slot]));
          r.caption.textContent = capFor(def.kind, state[def.slot]);
        });

        drawResistor();
      }

      function drawResistor() {
        const W = 300, H = 120, bx0 = 72, bx1 = 228, by0 = 38, by1 = 82, bh = by1 - by0, bw = 11, step = 19;
        const order = slots();
        const left = order.filter(o => o.kind === "digit" || o.kind === "mult");
        const right = order.filter(o => o.kind === "tol" || o.kind === "temp");
        const bandRect = (cx, cname) => `<rect x="${(cx - bw / 2).toFixed(1)}" y="${by0}" width="${bw}" height="${bh}" fill="${COLORS[cname].hex}" stroke="#00000040" stroke-width="0.6"/>`;
        let bands = "";
        left.forEach((o, i) => { bands += bandRect(bx0 + 16 + i * step, state[o.slot]); });
        right.forEach((o, k) => { bands += bandRect(bx1 - 16 - (right.length - 1 - k) * step, state[o.slot]); });

        vizEl.innerHTML = `<svg class="rc-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Resistor with coloured bands, value ${valEl.textContent}">
          <defs>
            <linearGradient id="rcBody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e7d0a2"/><stop offset="50%" stop-color="#d8bd8e"/><stop offset="100%" stop-color="#c2a675"/>
            </linearGradient>
            <linearGradient id="rcShade" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="26%" stop-color="#ffffff" stop-opacity="0.04"/>
              <stop offset="60%" stop-color="#000000" stop-opacity="0"/><stop offset="100%" stop-color="#000000" stop-opacity="0.34"/>
            </linearGradient>
            <clipPath id="rcClip"><rect x="${bx0}" y="${by0}" width="${bx1 - bx0}" height="${bh}" rx="11"/></clipPath>
          </defs>
          <line class="rc-lead" x1="6" y1="60" x2="${bx0 + 6}" y2="60"/>
          <line class="rc-lead" x1="${bx1 - 6}" y1="60" x2="294" y2="60"/>
          <rect x="${bx0}" y="${by0}" width="${bx1 - bx0}" height="${bh}" rx="11" fill="url(#rcBody)" stroke="#9c855c" stroke-width="1"/>
          <g clip-path="url(#rcClip)">
            ${bands}
            <rect x="${bx0}" y="${by0}" width="${bx1 - bx0}" height="${bh}" fill="url(#rcShade)"/>
          </g>
          <rect x="${bx0}" y="${by0}" width="${bx1 - bx0}" height="${bh}" rx="11" fill="none" stroke="#00000030" stroke-width="1"/>
        </svg>`;
      }

      // reverse: value -> bands
      function parseR(str) {
        let s = str.trim().toLowerCase().replace(/ohm[s]?|\u03A9/g, "").replace(/\s/g, "");
        if (!s) return NaN;
        const suf = { r: 1, k: 1e3, m: 1e6, g: 1e9 };
        let mm = s.match(/^(\d*)\.?(\d*)([rkmg])(\d+)$/); // 4k7, r22, 2m2
        if (mm && !mm[2]) { const v = parseFloat(`${mm[1] || 0}.${mm[4]}`); return v * suf[mm[3]]; }
        mm = s.match(/^([\d.]+)([rkmg])?$/);
        if (mm) { const v = parseFloat(mm[1]); return isNaN(v) ? NaN : v * (mm[2] ? suf[mm[2]] : 1); }
        return NaN;
      }
      const nameByDigit = (d) => ORDER.find(c => COLORS[c].digit === d);
      const nameByMult = (m) => ORDER.find(c => COLORS[c].mult === m);

      function setFromValue(R) {
        const n = state.count >= 5 ? 3 : 2;
        if (!(R > 0)) return "Enter a positive resistance.";
        let e = Math.floor(Math.log10(R));
        let D = Math.round(R / Math.pow(10, e - (n - 1)));
        let multExp = e - (n - 1);
        if (D >= Math.pow(10, n)) { D = Math.round(D / 10); multExp += 1; } // rounding overflow (e.g. 99.6 -> 100)
        if (multExp < -2 || multExp > 9) return "That value is outside the standard band range.";
        const digits = String(D).padStart(n, "0").split("").map(Number);
        state.d1 = nameByDigit(digits[0]); state.d2 = nameByDigit(digits[1]);
        if (n === 3) state.d3 = nameByDigit(digits[2]);
        state.mult = nameByMult(Math.pow(10, multExp));
        recompute();
        const coded = D * Math.pow(10, multExp);
        return Math.abs(coded - R) / R > 1e-9 ? `Nearest code shown: ${formatSI(coded, "\u03A9")}` : "";
      }

      // wiring
      panel.querySelectorAll(".seg[data-group='count'] button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.count = +btn.dataset.v;
          panel.querySelectorAll(".seg[data-group='count'] button").forEach(b => b.classList.toggle("on", b === btn));
          buildBands(); recompute();
        });
      });
      revEl.addEventListener("input", e => {
        const R = parseR(e.target.value);
        if (e.target.value.trim() === "") { statusEl.className = "status-msg"; recompute(); return; }
        if (isNaN(R)) { statusEl.className = "status-msg error"; statusEl.textContent = "Couldn't read that value."; return; }
        const msg = setFromValue(R);
        if (msg) { statusEl.className = "status-msg"; statusEl.textContent = msg; }
      });
      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(state, { count: 4, d1: "yellow", d2: "violet", d3: "black", mult: "red", tol: "gold", temp: "brown" });
        panel.querySelectorAll(".seg[data-group='count'] button").forEach(b => b.classList.toggle("on", b.dataset.v === "4"));
        revEl.value = ""; buildBands(); recompute();
      });

      buildBands();
      recompute();
    },
  };

  /* ============================================================
     TOOL 7 — REYNOLDS NUMBER
     ============================================================ */
  const ReynoldsNumber = {
    id: "reynolds",
    discipline: "FLUIDS & THERMAL",
    title: "Reynolds number calculator",
    subtitle: "Pick a fluid, set the pipe diameter and flow velocity, and read the Reynolds number and flow regime \u2014 the pipe shows the pattern, from smooth laminar streamlines to turbulent eddies.",

    mount(root) {
      const SUP = { "-": "\u207B", 0: "\u2070", 1: "\u00B9", 2: "\u00B2", 3: "\u00B3", 4: "\u2074", 5: "\u2075", 6: "\u2076", 7: "\u2077", 8: "\u2078", 9: "\u2079" };
      const sup = (n) => String(n).split("").map(c => SUP[c] || c).join("");
      const LAM = "#45D4C4", TRA = "#FFB020", TUR = "#ff7a45";

      // fluids at ~20 C.  rho kg/m^3,  mu in mPa.s (= cP)
      const FLUIDS = [
        { name: "Water", rho: 998, mu: 1.002 }, { name: "Air", rho: 1.204, mu: 0.0182 },
        { name: "Seawater", rho: 1025, mu: 1.07 }, { name: "Ethylene glycol", rho: 1113, mu: 16.2 },
        { name: "Engine oil (SAE 30)", rho: 891, mu: 290 }, { name: "Glycerin", rho: 1260, mu: 1412 },
        { name: "Mercury", rho: 13534, mu: 1.526 }, { name: "Custom", rho: null, mu: null },
      ];
      const raw = { V: "1", D: "50", rho: "998", mu: "1.002" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>PIPE FLOW</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">FLUID</span><select class="mat-select"></select></div>
        </div>
        <div class="re-layout">
          <div class="re-stage">
            <div class="re-viz"></div>
            <div class="re-badge"><div class="re-cap">REYNOLDS NUMBER</div><div class="re-num">\u2014</div><div class="re-regime"></div></div>
          </div>
          <div class="channels cols-2 re-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 re-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Regime thresholds are the standard values for full pipe flow: laminar below 2300, turbulent above 4000, transitional between. Fluid properties are given at about 20\u00B0C and shift with temperature. Flow rate assumes a full circular pipe.</span>`));

      const vizEl = panel.querySelector(".re-viz");
      const numEl = panel.querySelector(".re-num");
      const regEl = panel.querySelector(".re-regime");
      const inputsEl = panel.querySelector(".re-inputs");
      const outsEl = panel.querySelector(".re-outputs");
      const statusEl = panel.querySelector(".status-msg");
      const fluidSel = panel.querySelector(".mat-select");

      FLUIDS.forEach((f, i) => { const o = el("option"); o.value = i; o.textContent = f.name; fluidSel.appendChild(o); });
      fluidSel.value = "0";
      fluidSel.addEventListener("change", () => {
        const f = FLUIDS[+fluidSel.value];
        if (f.rho != null) { raw.rho = String(f.rho); raw.mu = String(f.mu); if (chans.rho) chans.rho.input.value = raw.rho; if (chans.mu) chans.mu.input.value = raw.mu; }
        recompute();
      });

      const inDefs = [
        { key: "V", sym: "V", name: "Flow velocity", unit: "m/s" },
        { key: "D", sym: "D", name: "Pipe diameter", unit: "mm" },
        { key: "rho", sym: "\u03C1", name: "Density", unit: "kg/m\u00B3" },
        { key: "mu", sym: "\u03BC", name: "Viscosity", unit: "mPa\u00B7s" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        chInput(c, raw[d.key]);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "nu", sym: "\u03BD", name: "Kinematic visc.", unit: "mm\u00B2/s" },
        { key: "Q", sym: "Q", name: "Volumetric flow", unit: "L/s" },
        { key: "mdot", sym: "\u1E41", name: "Mass flow", unit: "kg/s" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const fmtNum = (v) => String(parseFloat(v.toPrecision(4)));
      const reFmt = (Re) => Re < 1e5 ? Math.round(Re).toLocaleString("en-US") : (Re / Math.pow(10, Math.floor(Math.log10(Re)))).toFixed(2) + "\u00D710" + sup(Math.floor(Math.log10(Re)));

      function regimeOf(Re) {
        if (Re < 2300) return { name: "LAMINAR", color: LAM, key: "laminar" };
        if (Re < 4000) return { name: "TRANSITIONAL", color: TRA, key: "transitional" };
        return { name: "TURBULENT", color: TUR, key: "turbulent" };
      }

      function recompute() {
        inDefs.forEach(d => chInput(chans[d.key], raw[d.key]));
        const V = num("V"), D = num("D"), rho = num("rho"), mu = num("mu");
        const missing = [];
        if (!(V > 0)) missing.push("velocity");
        if (!(D > 0)) missing.push("diameter");
        if (!(rho > 0)) missing.push("density");
        if (!(mu > 0)) missing.push("viscosity");

        if (missing.length) {
          [chans.nu, chans.Q, chans.mdot].forEach(chPending);
          numEl.textContent = "\u2014"; numEl.style.color = "#5a6270"; regEl.textContent = "";
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + missing.join(", ") + " to solve.";
          drawFlow(null);
          return;
        }

        // D in mm and mu in mPa.s -> the 1e-3 factors cancel in Re = rho*V*D/mu
        const Re = rho * V * D / mu;
        const reg = regimeOf(Re);
        numEl.textContent = reFmt(Re); numEl.style.color = reg.color;
        regEl.textContent = reg.name; regEl.style.color = reg.color;

        const nu = mu * 1000 / rho;                 // mm^2/s (cSt)
        const Dm = D * 1e-3, Qm3 = V * Math.PI * Dm * Dm / 4;
        chMeasured(chans.nu, `${fmtNum(nu)} mm\u00B2/s`);
        chMeasured(chans.Q, `${fmtNum(Qm3 * 1000)} L/s`);
        chMeasured(chans.mdot, `${fmtNum(rho * Qm3)} kg/s`);

        statusEl.className = "status-msg";
        statusEl.textContent = `Re = \u03C1VD/\u03BC = ${reFmt(Re)} \u00B7 ${reg.name.toLowerCase()}`;
        drawFlow(reg.key);
      }

      function drawFlow(regime) {
        const W = 300, H = 150, x0 = 16, x1 = 284, yTop = 26, yBot = 124;
        const wall = `<line class="pipe-wall" x1="${x0}" y1="${yTop}" x2="${x1}" y2="${yTop}"/><line class="pipe-wall" x1="${x0}" y1="${yBot}" x2="${x1}" y2="${yBot}"/>`;

        if (!regime) {
          let ghost = "";
          for (let i = 0; i < 5; i++) { const y = 40 + i * 17; ghost += `<line x1="${x0 + 6}" y1="${y}" x2="${x1 - 6}" y2="${y}" stroke="#3a4150" stroke-width="2" stroke-dasharray="4 6"/>`; }
          vizEl.innerHTML = `<svg class="re-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Pipe, no flow yet">${wall}${ghost}</svg>`;
          return;
        }

        const cfg = {
          laminar:      { n: 5, amp: 0,  freq: 0,    dur: 1.7, color: LAM },
          transitional: { n: 6, amp: 4,  freq: 0.06, dur: 1.2, color: TRA },
          turbulent:    { n: 8, amp: 9,  freq: 0.11, dur: 0.7, color: TUR },
        }[regime];

        let lines = "";
        for (let i = 0; i < cfg.n; i++) {
          const yc = 36 + i * ((yBot - 12 - 36) / (cfg.n - 1));
          const ph = i * 0.9;
          let d = "";
          for (let x = x0 + 6; x <= x1 - 6; x += 6) {
            let y = yc;
            if (cfg.amp) y += cfg.amp * Math.sin(cfg.freq * x + ph) + (regime === "turbulent" ? cfg.amp * 0.4 * Math.sin(cfg.freq * 2.3 * x + ph * 1.7) : 0);
            d += (x === x0 + 6 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1) + " ";
          }
          lines += `<path class="streamline" d="${d}" stroke="${cfg.color}" style="animation-duration:${cfg.dur}s"/>`;
        }
        let eddies = "";
        if (regime === "turbulent") {
          [[90, 58], [170, 92], [230, 60]].forEach(([ex, ey], k) => {
            eddies += `<circle class="eddy" cx="${ex}" cy="${ey}" r="${9 + k}" stroke="${TUR}"/>`;
          });
        }
        vizEl.innerHTML = `<svg class="re-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${regime} flow in pipe">${wall}${lines}${eddies}</svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { V: "", D: "", rho: "", mu: "" });
        fluidSel.value = FLUIDS.length - 1; // Custom
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.V.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 8 — VOLTAGE DROP / WIRE GAUGE
     ============================================================ */
  const VoltageDrop = {
    id: "vdrop",
    discipline: "ELECTRICAL",
    title: "Voltage drop calculator",
    subtitle: "Size a run of wire. Choose a gauge, material, and system, then set current, length, and source voltage \u2014 the tool returns the drop, the voltage at the load, and whether it stays inside the 3% rule of thumb.",

    mount(root) {
      const GOOD = "#45D4C4", CAUT = "#FFB020", HIGH = "#ff7a45";
      const RHO = { cu: 1.724e-8, al: 2.826e-8 };      // ohm-m at 20 C
      const WIRE_COL = { cu: "#c98a3a", al: "#b9bec7" };

      // AWG sizes (n value drives the area formula)
      const AWG = [
        { label: "4/0 AWG", n: -3 }, { label: "3/0 AWG", n: -2 }, { label: "2/0 AWG", n: -1 },
        { label: "1/0 AWG", n: 0 }, { label: "1 AWG", n: 1 }, { label: "2 AWG", n: 2 },
        { label: "4 AWG", n: 4 }, { label: "6 AWG", n: 6 }, { label: "8 AWG", n: 8 },
        { label: "10 AWG", n: 10 }, { label: "12 AWG", n: 12 }, { label: "14 AWG", n: 14 },
        { label: "16 AWG", n: 16 }, { label: "18 AWG", n: 18 }, { label: "20 AWG", n: 20 },
        { label: "22 AWG", n: 22 }, { label: "24 AWG", n: 24 },
      ];
      const awgArea = (n) => { const d = 0.127 * Math.pow(92, (36 - n) / 39); return Math.PI / 4 * d * d; }; // mm^2

      const st = { mat: "cu", sys: "1ph", gauge: 10 };  // gauge = index into AWG (10 -> 12 AWG)
      const raw = { I: "15", L: "20", Vs: "120", area: "" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>WIRE RUN</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">MATERIAL</span>
            <div class="seg" data-group="mat"><button data-v="cu" class="on">Copper</button><button data-v="al">Aluminium</button></div>
          </div>
          <div class="seg-field"><span class="seg-label">SYSTEM</span>
            <div class="seg" data-group="sys"><button data-v="1ph" class="on">1\u03C6 / DC</button><button data-v="3ph">3\u03C6</button></div>
          </div>
          <div class="seg-field"><span class="seg-label">GAUGE</span><select class="mat-select"></select></div>
        </div>
        <div class="wd-layout">
          <div class="wd-stage">
            <div class="wd-viz"></div>
            <div class="re-badge"><div class="re-cap">VOLTAGE DROP</div><div class="re-num">\u2014</div><div class="re-regime"></div></div>
          </div>
          <div class="channels cols-2 wd-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 wd-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Length is the one-way run; the round trip is counted for you (single-phase uses 2\u00D7, three-phase uses \u221A3). The 3% / 5% marks are common design guidance, not a substitute for local wiring codes.</span>`));

      const vizEl = panel.querySelector(".wd-viz");
      const numEl = panel.querySelector(".re-num");
      const regEl = panel.querySelector(".re-regime");
      const capEl = panel.querySelector(".re-cap");
      const inputsEl = panel.querySelector(".wd-inputs");
      const outsEl = panel.querySelector(".wd-outputs");
      const statusEl = panel.querySelector(".status-msg");
      const gaugeSel = panel.querySelector(".mat-select");

      AWG.forEach((g, i) => { const o = el("option"); o.value = i; o.textContent = g.label; gaugeSel.appendChild(o); });
      const customOpt = el("option"); customOpt.value = "custom"; customOpt.textContent = "Custom (mm\u00B2)"; gaugeSel.appendChild(customOpt);
      gaugeSel.value = String(st.gauge);
      gaugeSel.addEventListener("change", () => {
        if (gaugeSel.value === "custom") { if (!raw.area) raw.area = fmtNum(awgArea(AWG[st.gauge].n)); st.gauge = "custom"; }
        else st.gauge = +gaugeSel.value;
        recompute();
      });

      const inDefs = [
        { key: "I", sym: "I", name: "Current", unit: "A" },
        { key: "L", sym: "L", name: "Run length", unit: "m" },
        { key: "Vs", sym: "Vs", name: "Source voltage", unit: "V" },
        { key: "area", sym: "A", name: "Conductor area", unit: "mm\u00B2" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "vd", sym: "\u0394V", name: "Voltage drop", unit: "V" },
        { key: "vl", sym: "V\u2097", name: "Voltage at load", unit: "V" },
        { key: "pl", sym: "P", name: "Power lost", unit: "W" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      function fmtNum(v) { return String(parseFloat(v.toPrecision(3))); }

      panel.querySelectorAll(".seg").forEach(seg => {
        const group = seg.dataset.group;
        seg.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
          st[group] = btn.dataset.v;
          seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b === btn));
          recompute();
        }));
      });

      function recompute() {
        chInput(chans.I, raw.I); chInput(chans.L, raw.L); chInput(chans.Vs, raw.Vs);

        // area: measured for a standard gauge, editable for custom
        let areaMM;
        if (st.gauge === "custom") { chInput(chans.area, raw.area); areaMM = num("area"); }
        else { areaMM = awgArea(AWG[st.gauge].n); chMeasured(chans.area, `${fmtNum(areaMM)} mm\u00B2`); }

        const I = num("I"), L = num("L"), Vs = num("Vs");
        const A = areaMM > 0 ? areaMM * 1e-6 : undefined; // m^2
        const k = st.sys === "3ph" ? Math.sqrt(3) : 2;

        const need = [];
        if (!(I > 0)) need.push("current");
        if (!(L > 0)) need.push("length");
        if (!(A > 0)) need.push("conductor area");

        if (need.length) {
          [chans.vd, chans.vl, chans.pl].forEach(chPending);
          numEl.textContent = "\u2014"; numEl.style.color = "#5a6270"; regEl.textContent = ""; capEl.textContent = "VOLTAGE DROP";
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawWire(null, areaMM);
          return;
        }

        const Vdrop = k * I * RHO[st.mat] * L / A;
        const Ploss = (st.sys === "3ph" ? Math.sqrt(3) : 1) * Vdrop * I;
        chMeasured(chans.vd, formatSI(Vdrop, "V"));
        chMeasured(chans.pl, formatSI(Ploss, "W"));

        let pct;
        if (Vs > 0) {
          pct = Vdrop / Vs * 100;
          chMeasured(chans.vl, formatSI(Vs - Vdrop, "V"));
          const band = pct <= 3 ? { c: GOOD, t: "WITHIN 3%" } : pct <= 5 ? { c: CAUT, t: "3\u20135% \u00B7 CAUTION" } : { c: HIGH, t: "OVER 5%" };
          capEl.textContent = "VOLTAGE DROP";
          numEl.textContent = `${fmtNum(pct)}%`; numEl.style.color = band.c;
          regEl.textContent = band.t; regEl.style.color = band.c;
          statusEl.className = "status-msg";
          statusEl.textContent = `\u0394V = ${formatSI(Vdrop, "V")} over ${fmtNum(L)} m \u00B7 ${fmtNum(pct)}% of source`;
          drawWire(pct, areaMM, Vs, Vs - Vdrop);
        } else {
          chPending(chans.vl);
          capEl.textContent = "DROP (SET SOURCE V FOR %)";
          numEl.textContent = formatSI(Vdrop, "V"); numEl.style.color = GOOD; regEl.textContent = "";
          statusEl.className = "status-msg";
          statusEl.textContent = `\u0394V = ${formatSI(Vdrop, "V")} over ${fmtNum(L)} m`;
          drawWire(0, areaMM, undefined, undefined);
        }
      }

      // ---- wire visual: thickness tracks the gauge ----
      function zigV(x, y1, y2, amp) {
        const n = 6, h = y2 - y1, pts = [[x, y1]];
        for (let i = 0; i < n; i++) pts.push([x + (i % 2 === 0 ? amp : -amp), y1 + h * ((i + 0.5) / n)]);
        pts.push([x, y2]);
        return pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
      }
      function drawWire(pct, areaMM, Vs, Vl) {
        const W = 300, H = 150, sx = 46, lx = 250, topY = 52, botY = 108;
        const tw = areaMM > 0 ? Math.min(15, Math.max(2.5, 1.4 + Math.sqrt(areaMM) * 1.5)) : 3;
        const col = WIRE_COL[st.mat];
        const has = pct !== null;
        const rail = (y) => `<line x1="${sx}" y1="${y}" x2="${lx}" y2="${y}" stroke="${col}" stroke-width="${tw.toFixed(1)}" stroke-linecap="round"/>`;
        const flow = has ? `<line class="wd-flow" x1="${sx}" y1="${topY}" x2="${lx}" y2="${topY}" stroke-width="${Math.max(1.5, tw - 1.5).toFixed(1)}"/>
          <line class="wd-flow" x1="${lx}" y1="${botY}" x2="${sx}" y2="${botY}" stroke-width="${Math.max(1.5, tw - 1.5).toFixed(1)}"/>` : "";

        // source (battery) on the left, load (resistor) on the right
        const src = `<line class="wd-sym" x1="${sx}" y1="${topY}" x2="${sx}" y2="70"/><line class="wd-sym" x1="${sx}" y1="90" x2="${sx}" y2="${botY}"/>
          <line class="wd-sym" x1="${sx - 11}" y1="72" x2="${sx + 11}" y2="72" stroke-width="2.5"/><line class="wd-sym" x1="${sx - 6}" y1="79" x2="${sx + 6}" y2="79"/>
          <line class="wd-sym" x1="${sx - 11}" y1="86" x2="${sx + 11}" y2="86" stroke-width="2.5"/>`;
        const load = `<path class="wd-sym" d="${zigV(lx, topY, botY, 7)}"/>`;

        const labels = has ? `<text x="${sx}" y="40" class="vd-tick" fill="${GOOD}" text-anchor="middle">${Vs !== undefined ? formatSI(Vs, "V") : ""}</text>
          <text x="${lx}" y="40" class="vd-tick" fill="${GOOD}" text-anchor="middle">${Vl !== undefined ? formatSI(Vl, "V") : ""}</text>` : "";
        const gaugeLbl = `<text x="${(sx + lx) / 2}" y="${topY - 8}" class="vd-cap" text-anchor="middle">${st.gauge === "custom" ? fmtNum(areaMM) + " mm\u00B2" : AWG[st.gauge].label}</text>`;

        vizEl.innerHTML = `<svg class="wd-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Wire run, ${st.gauge === "custom" ? "custom" : AWG[st.gauge].label} ${st.mat}">
          ${rail(topY)}${rail(botY)}${flow}${src}${load}${gaugeLbl}${labels}
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { I: "", L: "", Vs: "", area: "" });
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.I.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 9 — RC/RL FILTER
     ============================================================ */
  const RCFilter = {
    id: "filter",
    discipline: "CONTROLS",
    title: "RC/RL filter calculator",
    subtitle: "Pick a passive R–C or R–L network and its response. Set the component values — and, optionally, a signal frequency — to get the time constant, cutoff frequency, and the gain and phase at that frequency, with the real roll-off drawn as a Bode magnitude plot.",

    mount(root) {
      const st = { comp: "rc", resp: "lp" };
      const raw = { R: "1000", C: "0.1", L: "10", f: "" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>FILTER RESPONSE</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">NETWORK</span>
            <div class="seg" data-group="comp"><button data-v="rc" class="on">R–C</button><button data-v="rl">R–L</button></div>
          </div>
          <div class="seg-field"><span class="seg-label">RESPONSE</span>
            <div class="seg" data-group="resp"><button data-v="lp" class="on">Low-pass</button><button data-v="hp">High-pass</button></div>
          </div>
        </div>
        <div class="filter-layout">
          <div class="filter-stage"><div class="filter-viz"></div></div>
          <div class="channels cols-2 filter-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-4 filter-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Cutoff is the -3 dB / 45° point, where ω = 1/τ. Gain and phase only appear once a signal frequency is set — they describe a single-pole roll-off of 20 dB/decade beyond cutoff.</span>`));

      const vizEl = panel.querySelector(".filter-viz");
      const inputsEl = panel.querySelector(".filter-inputs");
      const outsEl = panel.querySelector(".filter-outputs");
      const statusEl = panel.querySelector(".status-msg");

      function buildInputs() {
        inputsEl.innerHTML = "";
        const list = [{ key: "R", sym: "R", name: "Resistance", unit: "Ω" }];
        list.push(st.comp === "rc"
          ? { key: "C", sym: "C", name: "Capacitance", unit: "µF" }
          : { key: "L", sym: "L", name: "Inductance", unit: "mH" });
        list.push({ key: "f", sym: "f", name: "Signal frequency", unit: "Hz" });

        list.forEach(def => {
          const c = makeChannel(def); chans[def.key] = c;
          inputsEl.appendChild(c.el);
          if (raw[def.key]) chInput(c, raw[def.key]); else chEmpty(c);
          c.input.addEventListener("input", e => { raw[def.key] = e.target.value; recompute(); });
        });
      }

      const outDefs = [
        { key: "tau", sym: "τ", name: "Time constant", unit: "s" },
        { key: "fc", sym: "fₑ", name: "Cutoff frequency", unit: "Hz" },
        { key: "gain", sym: "|H|", name: "Gain at f", unit: "dB" },
        { key: "phase", sym: "∠H", name: "Phase at f", unit: "°" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      panel.querySelectorAll(".seg").forEach(seg => {
        const group = seg.dataset.group;
        seg.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            st[group] = btn.dataset.v;
            seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b === btn));
            if (group === "comp") buildInputs();
            recompute();
          });
        });
      });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function magDB(fHz, fc) {
        const ratio = fHz / fc;
        const magLP = 1 / Math.sqrt(1 + ratio * ratio);
        const mag = st.resp === "lp" ? magLP : ratio * magLP;
        return 20 * Math.log10(mag);
      }

      function recompute() {
        const R = num("R");
        const reactive = st.comp === "rc" ? num("C") : num("L");
        const f = num("f");

        const need = [];
        if (!(R > 0)) need.push("resistance");
        if (!(reactive > 0)) need.push(st.comp === "rc" ? "capacitance" : "inductance");

        if (need.length) {
          outDefs.forEach(d => chPending(chans[d.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawBode(null);
          return;
        }

        const tau = st.comp === "rc" ? R * (reactive * 1e-6) : (reactive * 1e-3) / R;
        const fc = 1 / (2 * Math.PI * tau);
        chMeasured(chans.tau, formatSI(tau, "s"));
        chMeasured(chans.fc, formatSI(fc, "Hz"));

        if (f > 0) {
          const gainDB = magDB(f, fc);
          const ratio = f / fc;
          const phase = st.resp === "lp" ? -Math.atan(ratio) * 180 / Math.PI : 90 - Math.atan(ratio) * 180 / Math.PI;
          chMeasured(chans.gain, `${fmt(gainDB)} dB`);
          chMeasured(chans.phase, `${fmt(phase)}°`);
          statusEl.className = "status-msg";
          statusEl.textContent = `τ = ${formatSI(tau, "s")} · fₑ = ${formatSI(fc, "Hz")} · ${fmt(gainDB)} dB at ${formatSI(f, "Hz")}`;
        } else {
          chPending(chans.gain); chPending(chans.phase);
          statusEl.className = "status-msg";
          statusEl.textContent = `τ = ${formatSI(tau, "s")} · fₑ = ${formatSI(fc, "Hz")}. Add a signal frequency for gain and phase.`;
        }

        drawBode(fc, f);
      }

      function drawBode(fc, fSig) {
        const W = 320, H = 200, x0 = 40, x1 = 300, y0 = 20, y1 = 156;
        if (!fc) {
          vizEl.innerHTML = `<svg class="filter-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No filter set yet">
            <line class="filter-grid" x1="${x0}" y1="${y1}" x2="${x1}" y2="${y1}"/>
            <line class="filter-grid" x1="${x0}" y1="${y0}" x2="${x0}" y2="${y1}"/>
            <text class="filter-axis-label" x="${(x0 + x1) / 2}" y="${y1 + 18}" text-anchor="middle">FREQUENCY (log)</text>
          </svg>`;
          return;
        }

        const fLo = fc * 1e-2, fHi = fc * 1e2;
        const xOf = (fHz) => x0 + (Math.log10(fHz) - Math.log10(fLo)) / (Math.log10(fHi) - Math.log10(fLo)) * (x1 - x0);
        const dBmin = -40, dBmax = 5;
        const yOf = (db) => y1 - (Math.max(dBmin, Math.min(dBmax, db)) - dBmin) / (dBmax - dBmin) * (y1 - y0);

        let curve = "";
        const N = 120;
        for (let i = 0; i <= N; i++) {
          const fHz = fLo * Math.pow(fHi / fLo, i / N);
          curve += (i ? "L" : "M") + xOf(fHz).toFixed(1) + " " + yOf(magDB(fHz, fc)).toFixed(1) + " ";
        }

        let grid = "";
        for (let d = -2; d <= 2; d++) { const gx = xOf(fc * Math.pow(10, d)); grid += `<line class="filter-grid" x1="${gx.toFixed(1)}" y1="${y0}" x2="${gx.toFixed(1)}" y2="${y1}"/>`; }
        [0, -10, -20, -30, -40].forEach(db => { const gy = yOf(db); grid += `<line class="filter-grid" x1="${x0}" y1="${gy.toFixed(1)}" x2="${x1}" y2="${gy.toFixed(1)}"/>`; });

        const xfc = xOf(fc), y3 = yOf(-3);
        let op = "";
        if (fSig > 0) {
          const cf = Math.max(fLo, Math.min(fHi, fSig));
          const ox = xOf(cf), oy = yOf(magDB(fSig, fc));
          op = `<line class="filter-cutoff" x1="${ox.toFixed(1)}" y1="${oy.toFixed(1)}" x2="${ox.toFixed(1)}" y2="${y1}"/><circle class="filter-op" cx="${ox.toFixed(1)}" cy="${oy.toFixed(1)}" r="4"/>`;
        }

        vizEl.innerHTML = `<svg class="filter-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Bode magnitude plot, cutoff ${formatSI(fc, 'Hz')}">
          ${grid}
          <line class="filter-cutoff" x1="${xfc.toFixed(1)}" y1="${y0}" x2="${xfc.toFixed(1)}" y2="${y1}"/>
          <line class="filter-cutoff" x1="${x0}" y1="${y3.toFixed(1)}" x2="${x1}" y2="${y3.toFixed(1)}"/>
          <path class="filter-curve" d="${curve}"/>
          ${op}
          <text class="filter-tick-label" x="${xfc.toFixed(1)}" y="${(y0 - 6).toFixed(1)}" text-anchor="middle">fₑ</text>
          <text class="filter-tick-label" x="${(x0 - 6).toFixed(1)}" y="${(y3 + 3).toFixed(1)}" text-anchor="end">-3dB</text>
          <line class="filter-grid" x1="${x0}" y1="${y1}" x2="${x1}" y2="${y1}"/>
          <line class="filter-grid" x1="${x0}" y1="${y0}" x2="${x0}" y2="${y1}"/>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { R: "", C: "", L: "", f: "" });
        buildInputs(); recompute();
      });

      buildInputs();
      recompute();
    },
  };

  /* ============================================================
     TOOL 10 — 555 TIMER
     ============================================================ */
  const Timer555 = {
    id: "timer555",
    discipline: "CONTROLS",
    title: "555 timer calculator",
    subtitle: "Astable mode free-runs a square wave from R1, R2, and C; monostable mode fires one pulse per trigger from R and C. Both follow the standard 1/3–2/3 Vcc threshold design.",

    mount(root) {
      const st = { mode: "astable" };
      const raw = { R1: "10", R2: "10", C: "10", R: "100" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>TIMING</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">MODE</span>
            <div class="seg" data-group="mode"><button data-v="astable" class="on">Astable</button><button data-v="mono">Monostable</button></div>
          </div>
        </div>
        <div class="timer-layout">
          <div class="timer-stage"><div class="timer-viz"></div></div>
          <div class="channels cols-2 timer-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 timer-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Formulas assume the standard 1/3–2/3 Vcc threshold design with no diode across R2. Adding a diode lets astable duty cycle drop below 50%, which isn't modelled here.</span>`));

      const vizEl = panel.querySelector(".timer-viz");
      const inputsEl = panel.querySelector(".timer-inputs");
      const outsEl = panel.querySelector(".timer-outputs");
      const statusEl = panel.querySelector(".status-msg");

      function buildInputs() {
        inputsEl.innerHTML = "";
        const list = st.mode === "astable"
          ? [{ key: "R1", sym: "R1", name: "Resistor 1", unit: "kΩ" }, { key: "R2", sym: "R2", name: "Resistor 2", unit: "kΩ" }, { key: "C", sym: "C", name: "Timing cap", unit: "µF" }]
          : [{ key: "R", sym: "R", name: "Resistor", unit: "kΩ" }, { key: "C", sym: "C", name: "Timing cap", unit: "µF" }];
        list.forEach(def => {
          const c = makeChannel(def); chans[def.key] = c;
          inputsEl.appendChild(c.el);
          if (raw[def.key]) chInput(c, raw[def.key]); else chEmpty(c);
          c.input.addEventListener("input", e => { raw[def.key] = e.target.value; recompute(); });
        });
      }

      function buildOutputs() {
        outsEl.innerHTML = "";
        const list = st.mode === "astable"
          ? [
              { key: "freq", sym: "f", name: "Frequency", unit: "Hz" },
              { key: "T", sym: "T", name: "Period", unit: "s" },
              { key: "duty", sym: "D", name: "Duty cycle", unit: "%" },
              { key: "th", sym: "tₕᵢ", name: "High time", unit: "s" },
              { key: "tl", sym: "tₗₒ", name: "Low time", unit: "s" },
            ]
          : [{ key: "pulse", sym: "t", name: "Pulse width", unit: "s" }];
        list.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });
        return list;
      }
      let outList = buildOutputs();

      panel.querySelectorAll(".seg").forEach(seg => {
        const group = seg.dataset.group;
        seg.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            st[group] = btn.dataset.v;
            seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b === btn));
            buildInputs(); outList = buildOutputs(); recompute();
          });
        });
      });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        if (st.mode === "astable") {
          const R1 = num("R1"), R2 = num("R2"), C = num("C");
          const need = [];
          if (!(R1 > 0)) need.push("R1");
          if (!(R2 > 0)) need.push("R2");
          if (!(C > 0)) need.push("capacitance");
          if (need.length) {
            outList.forEach(d => chPending(chans[d.key]));
            statusEl.className = "status-msg";
            statusEl.textContent = "Add " + need.join(", ") + " to solve.";
            drawScope(null);
            return;
          }
          const r1 = R1 * 1e3, r2 = R2 * 1e3, c = C * 1e-6;
          const th = 0.693 * (r1 + r2) * c, tl = 0.693 * r2 * c, T = th + tl, f = 1 / T, duty = th / T * 100;
          chMeasured(chans.freq, formatSI(f, "Hz"));
          chMeasured(chans.T, formatSI(T, "s"));
          chMeasured(chans.duty, `${fmt(duty)}%`);
          chMeasured(chans.th, formatSI(th, "s"));
          chMeasured(chans.tl, formatSI(tl, "s"));
          statusEl.className = "status-msg";
          statusEl.textContent = `f = 1.44 / (R1+2R2)C = ${formatSI(f, "Hz")} · ${fmt(duty)}% duty`;
          drawScope({ mode: "astable", duty });
        } else {
          const R = num("R"), C = num("C");
          const need = [];
          if (!(R > 0)) need.push("resistance");
          if (!(C > 0)) need.push("capacitance");
          if (need.length) {
            outList.forEach(d => chPending(chans[d.key]));
            statusEl.className = "status-msg";
            statusEl.textContent = "Add " + need.join(", ") + " to solve.";
            drawScope(null);
            return;
          }
          const pulse = 1.1 * (R * 1e3) * (C * 1e-6);
          chMeasured(chans.pulse, formatSI(pulse, "s"));
          statusEl.className = "status-msg";
          statusEl.textContent = `t = 1.1RC = ${formatSI(pulse, "s")} per trigger`;
          drawScope({ mode: "mono", pulse });
        }
      }

      function drawScope(cfg) {
        const W = 320, H = 190, x0 = 20, x1 = 300;
        const capY0 = 34, capY1 = 78, outY0 = 100, outY1 = 150;
        if (!cfg) {
          vizEl.innerHTML = `<svg class="timer-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No timing set yet">
            <line class="timer-axis" x1="${x0}" y1="${capY1}" x2="${x1}" y2="${capY1}"/>
            <line class="timer-axis" x1="${x0}" y1="${outY1}" x2="${x1}" y2="${outY1}"/>
          </svg>`;
          return;
        }

        let capPath, outPath, dim, labels;
        if (cfg.mode === "astable") {
          const dutyF = cfg.duty / 100;
          const cycles = 2, cw = (x1 - x0) / cycles;
          let cp = `M${x0} ${capY1.toFixed(1)} `, op = `M${x0} ${outY1.toFixed(1)} `;
          for (let i = 0; i < cycles; i++) {
            const xs = x0 + i * cw, xm = xs + cw * dutyF, xe = xs + cw;
            cp += `C ${(xs + cw * dutyF * 0.4).toFixed(1)} ${capY0.toFixed(1)} ${(xm - cw * 0.15).toFixed(1)} ${capY0.toFixed(1)} ${xm.toFixed(1)} ${capY0.toFixed(1)} `;
            cp += `C ${(xm + cw * (1 - dutyF) * 0.5).toFixed(1)} ${capY1.toFixed(1)} ${(xe - cw * (1 - dutyF) * 0.15).toFixed(1)} ${capY1.toFixed(1)} ${xe.toFixed(1)} ${capY1.toFixed(1)} `;
            op += `L ${xs.toFixed(1)} ${outY0.toFixed(1)} L ${xm.toFixed(1)} ${outY0.toFixed(1)} L ${xm.toFixed(1)} ${outY1.toFixed(1)} L ${xe.toFixed(1)} ${outY1.toFixed(1)} `;
          }
          capPath = cp; outPath = op;
          const xm0 = x0 + cw * dutyF;
          dim = `<line class="timer-dim" x1="${x0}" y1="${outY0 - 10}" x2="${xm0.toFixed(1)}" y2="${outY0 - 10}"/><line class="timer-dim" x1="${xm0.toFixed(1)}" y1="${outY0 - 16}" x2="${xm0.toFixed(1)}" y2="${outY1 + 6}"/>`;
          labels = `<text class="timer-lbl" x="${((x0 + xm0) / 2).toFixed(1)}" y="${outY0 - 14}" text-anchor="middle">tₕᵢ</text>
                    <text class="timer-lbl" x="${((xm0 + (x0 + cw)) / 2).toFixed(1)}" y="${outY0 - 14}" text-anchor="middle">tₗₒ</text>`;
        } else {
          const trigX = x0 + 20, riseX = trigX + 6, pulseW = (x1 - x0) * 0.55;
          const capPeak = riseX + pulseW;
          capPath = `M${x0} ${capY1.toFixed(1)} L${riseX} ${capY1.toFixed(1)} C ${(riseX + pulseW * 0.5).toFixed(1)} ${capY0.toFixed(1)} ${(capPeak - pulseW * 0.1).toFixed(1)} ${capY0.toFixed(1)} ${capPeak.toFixed(1)} ${capY0.toFixed(1)} L${(capPeak + 10).toFixed(1)} ${capY1.toFixed(1)} L${x1} ${capY1.toFixed(1)}`;
          outPath = `M${x0} ${outY1.toFixed(1)} L${riseX} ${outY1.toFixed(1)} L${riseX} ${outY0.toFixed(1)} L${capPeak.toFixed(1)} ${outY0.toFixed(1)} L${capPeak.toFixed(1)} ${outY1.toFixed(1)} L${x1} ${outY1.toFixed(1)}`;
          dim = `<line class="timer-dim" x1="${riseX}" y1="${outY0 - 10}" x2="${capPeak.toFixed(1)}" y2="${outY0 - 10}"/><line class="timer-trig" x1="${trigX}" y1="${outY1}" x2="${trigX}" y2="${(outY1 + 10).toFixed(1)}"/>`;
          labels = `<text class="timer-lbl" x="${((riseX + capPeak) / 2).toFixed(1)}" y="${outY0 - 14}" text-anchor="middle">t</text>
                    <text class="timer-lbl" x="${trigX}" y="${(outY1 + 22).toFixed(1)}" text-anchor="middle">TRIG</text>`;
        }

        vizEl.innerHTML = `<svg class="timer-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${cfg.mode} timing diagram">
          <text class="timer-axis-label" x="${x0}" y="18">Vᴄ (CAP)</text>
          <path class="timer-cap-wave" d="${capPath}"/>
          <line class="timer-axis" x1="${x0}" y1="${capY1}" x2="${x1}" y2="${capY1}"/>
          <text class="timer-axis-label" x="${x0}" y="${outY0 - 26}">OUT</text>
          <path class="timer-out-wave" d="${outPath}"/>
          <line class="timer-axis" x1="${x0}" y1="${outY1}" x2="${x1}" y2="${outY1}"/>
          ${dim}${labels}
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { R1: "", R2: "", C: "", R: "" });
        buildInputs(); recompute();
      });

      buildInputs();
      recompute();
    },
  };

  /* ============================================================
     TOOL 11 — OP-AMP GAIN

  const OpAmpGain = {
    id: "opamp",
    discipline: "CONTROLS",
    title: "Op-amp gain calculator",
    subtitle: "Pick an inverting or non-inverting configuration and set the feedback network. Add an input voltage and supply rails to see the output swing — and whether it clips.",

    mount(root) {
      const st = { mode: "inv" };
      const raw = { Rin: "10", Rf: "47", Vin: "0.5", Vs: "15" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">

        </div>
        <div class="opamp-layout">
          <div class="opamp-stage">
            <div class="opamp-viz"></div>
            <div class="ratio-badge"><div class="r empty">——</div><div class="lbl">GAIN</div></div>

      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Gain assumes an ideal op-amp — infinite open-loop gain, no input bias current. Supply rails are optional; add them to check whether the swing clips.</span>`));

      const vizEl = panel.querySelector(".opamp-viz");
      const chansEl = panel.querySelector(".channels");
      const ratioEl = panel.querySelector(".ratio-badge .r");
      const ratioLbl = panel.querySelector(".ratio-badge .lbl");

      const defs = [
        { key: "Rin", sym: "Rin", name: "Input resistor", unit: "kΩ", role: "in" },
        { key: "Rf", sym: "Rf", name: "Feedback resistor", unit: "kΩ", role: "in" },
        { key: "Vin", sym: "Vin", name: "Input voltage", unit: "V", role: "in" },
        { key: "Vout", sym: "Vout", name: "Output voltage", unit: "V", role: "out" },
        { key: "Vs", sym: "±Vs", name: "Supply rails", unit: "V", role: "in" },
      ];
      defs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; chansEl.appendChild(c.el);
        if (d.role === "in") { chInput(c, raw[d.key]); c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); }); }
      });

      panel.querySelectorAll(".seg").forEach(seg => {
        seg.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            st.mode = btn.dataset.v;

            recompute();
          });
        });
      });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        const Rin = num("Rin"), Rf = num("Rf");
        if (!(Rin > 0 && Rf > 0)) {
          ratioEl.textContent = "——"; ratioEl.classList.add("empty"); ratioLbl.textContent = "GAIN";
          chPending(chans.Vout);
          statusEl.className = "status-msg";
          statusEl.textContent = (Rin !== undefined && Rin <= 0) || (Rf !== undefined && Rf <= 0) ? "Resistances must be greater than 0." : "Enter Rin and Rf.";
          drawSchematic(null);
          return;
        }

        const gain = st.mode === "inv" ? -(Rf / Rin) : 1 + Rf / Rin;
        ratioEl.textContent = `${fmt(gain)}×`; ratioEl.classList.remove("empty");
        ratioLbl.textContent = st.mode === "inv" ? "INVERTING · 180°" : "NON-INVERTING · IN PHASE";

        const Vin = num("Vin"), Vs = num("Vs");
        let Vout, clipping = false;
        if (Vin !== undefined) {
          Vout = gain * Vin;
          chMeasured(chans.Vout, formatSI(Vout, "V"));
          if (Vs !== undefined && Vs > 0) {
            clipping = Math.abs(Vout) > Vs;
            if (clipping) {
              statusEl.className = "status-msg error";
              statusEl.textContent = `Clips — needs ±${fmt(Math.abs(Vout))} V but the supply only gives ±${fmt(Vs)} V.`;
            } else {
              statusEl.className = "status-msg";
              statusEl.textContent = `Solved. ${fmt(Vs - Math.abs(Vout))} V of headroom before clipping.`;
            }
          } else {
            statusEl.className = "status-msg";
            statusEl.textContent = "Solved. Add supply rails to check for clipping.";
          }
        } else {
          chPending(chans.Vout);
          statusEl.className = "status-msg";
          statusEl.textContent = "Gain solved. Add an input voltage for the output.";
        }

        drawSchematic({ mode: st.mode, Vin, Vout, clipping });
      }

      function zigSeg(x1, y1, x2, y2, n, amp) {
        const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
        const ux = dx / len, uy = dy / len, px = -uy, py = ux;
        let d = "";
        for (let i = 0; i < n; i++) {
          const t = (i + 0.5) / n, bx = x1 + dx * t, by = y1 + dy * t, s = (i % 2 === 0 ? amp : -amp);
          d += `L${(bx + px * s).toFixed(1)} ${(by + py * s).toFixed(1)} `;
        }
        return d + `L${x2.toFixed(1)} ${y2.toFixed(1)} `;
      }

      function gnd(x, y) {
        return `<line class="opamp-wire" x1="${x}" y1="${y}" x2="${x}" y2="${y + 12}"/>
          <line class="opamp-gnd" x1="${x - 8}" y1="${y + 12}" x2="${x + 8}" y2="${y + 12}"/>
          <line class="opamp-gnd" x1="${x - 5}" y1="${y + 16}" x2="${x + 5}" y2="${y + 16}"/>

            ${tri}${pm}${supplyStubs}
          </svg>`;
          return;
        }

        const rfPath = `M225 105 L225 35 ` + zigSeg(225, 35, 130, 35, 6, 5) + `L130 80`;
        let rinPath, gndEl, plusEl, rinLbl;
        if (cfg.mode === "inv") {
          rinPath = `M30 80 ` + zigSeg(30, 80, 110, 80, 6, 5) + `L130 80`;
          gndEl = gnd(130, 130);
          plusEl = "";
          rinLbl = `<text class="opamp-lbl" x="55" y="70">Rin</text>`;
        } else {
          rinPath = `M130 80 ` + zigSeg(130, 80, 130, 128, 6, 5);
          gndEl = gnd(130, 128);
          plusEl = `<line class="opamp-wire" x1="20" y1="130" x2="130" y2="130"/>`;
          rinLbl = `<text class="opamp-lbl" x="140" y="107">Rin</text>`;
        }

        const vinX = cfg.mode === "inv" ? 18 : 10;
        const vinY = cfg.mode === "inv" ? 70 : 120;
        const vinTxt = cfg.Vin !== undefined ? formatSI(cfg.Vin, "V") : "Vin";
        const voutTxt = cfg.Vout !== undefined ? formatSI(cfg.Vout, "V") : "Vout";
        const voutColor = cfg.clipping ? "var(--danger)" : (cfg.Vout !== undefined ? "var(--cyan)" : "var(--muted)");

        vizEl.innerHTML = `<svg class="opamp-svg" viewBox="0 0 300 210" role="img" aria-label="${cfg.mode === "inv" ? "Inverting" : "Non-inverting"} op-amp stage">
          ${tri}${pm}${supplyStubs}
          <path class="opamp-res" d="${rinPath}"/>
          <path class="opamp-res" d="${rfPath}"/>
          ${plusEl}
          ${gndEl}
          <line class="opamp-out" x1="195" y1="105" x2="245" y2="105"/>
          ${rinLbl}
          <text class="opamp-lbl" x="165" y="28">Rf</text>
          <text class="opamp-lbl" x="${vinX}" y="${vinY}" fill="var(--amber)">${vinTxt}</text>
          <text class="opamp-lbl" x="250" y="98" fill="${voutColor}">${voutTxt}</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        defs.forEach(d => { if (d.role === "in") { raw[d.key] = ""; chEmpty(chans[d.key]); } });
        recompute(); chans.Rin.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 12 — UNIT CONVERTER
     ============================================================ */
  const UnitConverter = {
    id: "units",
    discipline: "REFERENCE",
    title: "Unit converter",
    subtitle: "Pick a category and type a value into any unit — every other unit in the category updates instantly.",

    mount(root) {
      const SUP = { "-": "⁻", 0: "⁰", 1: "¹", 2: "²", 3: "³", 4: "⁴", 5: "⁵", 6: "⁶", 7: "⁷", 8: "⁸", 9: "⁹" };
      const sup = (n) => String(n).split("").map(c => SUP[c] || c).join("");
      const lin = (key, sym, name, factor) => ({ key, sym, name, toBase: v => v * factor, fromBase: v => v / factor });

      const CATS = [
        { name: "Length", units: [
          lin("mm", "mm", "Millimetre", 0.001), lin("cm", "cm", "Centimetre", 0.01), lin("m", "m", "Metre", 1),
          lin("km", "km", "Kilometre", 1000), lin("in", "in", "Inch", 0.0254), lin("ft", "ft", "Foot", 0.3048),

        { name: "Force", units: [
          lin("N", "N", "Newton", 1), lin("kN", "kN", "Kilonewton", 1000), lin("lbf", "lbf", "Pound-force", 4.4482216153),
          lin("kgf", "kgf", "Kilogram-force", 9.80665), lin("dyn", "dyn", "Dyne", 1e-5),

        { name: "Pressure", units: [

        ]},
        { name: "Power", units: [
          lin("W", "W", "Watt", 1), lin("kW", "kW", "Kilowatt", 1000), lin("MW", "MW", "Megawatt", 1e6),
          lin("hp", "hp", "Horsepower", 745.6998716), lin("BTUh", "BTU/h", "BTU per hour", 0.29307107),
        ]},
        { name: "Torque", units: [
          lin("Nm", "N·m", "Newton-metre", 1), lin("kNm", "kN·m", "Kilonewton-metre", 1000),

          lin("kn", "kn", "Knot", 0.5144444444),
        ]},
        { name: "Angle", units: [
          lin("rad", "rad", "Radian", 1), lin("deg", "deg", "Degree", Math.PI / 180),
          lin("grad", "grad", "Gradian", Math.PI / 200), lin("rev", "rev", "Revolution", 2 * Math.PI),
        ]},
        { name: "Temperature", units: [
          { key: "K", sym: "K", name: "Kelvin", toBase: v => v, fromBase: v => v },
          { key: "C", sym: "°C", name: "Celsius", toBase: v => v + 273.15, fromBase: v => v - 273.15 },
          { key: "F", sym: "°F", name: "Fahrenheit", toBase: v => (v - 32) * 5 / 9 + 273.15, fromBase: v => (v - 273.15) * 9 / 5 + 32 },
        ]},
      ];

      let catIdx = 0, activeKey = null;
      const raw = {}, chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>CONVERTER</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">CATEGORY</span><select class="mat-select"></select></div>
        </div>
        <div class="channels cols-4 units-grid"></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Conversions use fixed SI-derived factors (exact where a standard defines one). Temperature uses the correct affine formulas rather than a simple multiplier.</span>`));

      const catSel = panel.querySelector(".mat-select");
      const gridEl = panel.querySelector(".units-grid");
      const statusEl = panel.querySelector(".status-msg");

      CATS.forEach((c, i) => { const o = el("option"); o.value = i; o.textContent = c.name; catSel.appendChild(o); });
      catSel.addEventListener("change", () => { catIdx = +catSel.value; buildGrid(); });

      function fmtNum(v) {
        if (!isFinite(v)) return "—";
        if (v === 0) return "0";
        const av = Math.abs(v);
        if (av >= 1e6 || av < 1e-4) {
          const e = Math.floor(Math.log10(av));
          const mant = v / Math.pow(10, e);
          return `${parseFloat(mant.toFixed(4))}×10${sup(e)}`;
        }
        return String(parseFloat(v.toPrecision(6)));
      }

      function buildGrid() {
        gridEl.innerHTML = "";
        Object.keys(chans).forEach(k => delete chans[k]);
        Object.keys(raw).forEach(k => delete raw[k]);
        const cat = CATS[catIdx];
        cat.units.forEach(u => {
          const c = makeChannel({ sym: u.sym, name: u.name, unit: u.sym });
          chans[u.key] = c; gridEl.appendChild(c.el);
          raw[u.key] = "";
          c.input.addEventListener("input", e => { activeKey = u.key; raw[u.key] = e.target.value; recompute(); });
          c.value.addEventListener("click", () => {
            activeKey = u.key; chInput(c, raw[u.key] || ""); c.input.focus(); c.input.select(); recompute();
          });
        });
        activeKey = cat.units[0].key;
        raw[activeKey] = "1";
        recompute();
      }

      function recompute() {
        const cat = CATS[catIdx];
        if (activeKey == null || raw[activeKey].trim() === "") {
          cat.units.forEach(u => chEmpty(chans[u.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = "Type a value into any unit.";
          return;
        }
        const v = parseFloat(raw[activeKey]);
        if (Number.isNaN(v)) {
          cat.units.forEach(u => u.key === activeKey ? chInput(chans[u.key], raw[u.key]) : chPending(chans[u.key]));
          statusEl.className = "status-msg error";
          statusEl.textContent = "Enter a numeric value.";
          return;
        }
        const activeUnit = cat.units.find(u => u.key === activeKey);
        const base = activeUnit.toBase(v);
        cat.units.forEach(u => {
          if (u.key === activeKey) chInput(chans[u.key], raw[u.key]);
          else {
            const out = u.fromBase(base);
            chMeasured(chans[u.key], fmtNum(out));
            raw[u.key] = trimNumber(out);
          }
        });
        statusEl.className = "status-msg";
        statusEl.textContent = "Solved.";
      }

      panel.querySelector(".btn-reset").addEventListener("click", buildGrid);

      buildGrid();
    },
  };

  /* ============================================================
     TOOL 13 — DIMENSIONAL ANALYSIS
     ============================================================ */
  const DimensionalAnalysis = {
    id: "dimensional",
    discipline: "REFERENCE",
    title: "Dimensional analysis",
    subtitle: "Verify a candidate formula against SI base dimensions, or hand the tool a list of variables and let Buckingham π find the dimensionless groups.",

    mount(root) {
      const SUP = { "-": "⁻", 0: "⁰", 1: "¹", 2: "²", 3: "³", 4: "⁴", 5: "⁵", 6: "⁶", 7: "⁷", 8: "⁸", 9: "⁹" };
      const sup = (n) => String(n).split("").map(c => SUP[c] || c).join("");

      const DIMS = ["M", "L", "T", "TH", "I"];
      const dimLabel = { M: "M", L: "L", T: "T", TH: "Θ", I: "I" };
      const PRESETS = [
        { name: "Custom", M: 0, L: 0, T: 0, TH: 0, I: 0 },
        { name: "Length", M: 0, L: 1, T: 0, TH: 0, I: 0 },
        { name: "Mass", M: 1, L: 0, T: 0, TH: 0, I: 0 },
        { name: "Time", M: 0, L: 0, T: 1, TH: 0, I: 0 },
        { name: "Temperature", M: 0, L: 0, T: 0, TH: 1, I: 0 },
        { name: "Current", M: 0, L: 0, T: 0, TH: 0, I: 1 },
        { name: "Velocity", M: 0, L: 1, T: -1, TH: 0, I: 0 },
        { name: "Acceleration", M: 0, L: 1, T: -2, TH: 0, I: 0 },
        { name: "Force", M: 1, L: 1, T: -2, TH: 0, I: 0 },
        { name: "Pressure / stress", M: 1, L: -1, T: -2, TH: 0, I: 0 },
        { name: "Density", M: 1, L: -3, T: 0, TH: 0, I: 0 },
        { name: "Energy / torque", M: 1, L: 2, T: -2, TH: 0, I: 0 },
        { name: "Power", M: 1, L: 2, T: -3, TH: 0, I: 0 },
        { name: "Dynamic viscosity", M: 1, L: -1, T: -1, TH: 0, I: 0 },
        { name: "Kinematic viscosity", M: 0, L: 2, T: -1, TH: 0, I: 0 },
        { name: "Frequency / ang. velocity", M: 0, L: 0, T: -1, TH: 0, I: 0 },
        { name: "Momentum", M: 1, L: 1, T: -1, TH: 0, I: 0 },
        { name: "Surface tension", M: 1, L: 0, T: -2, TH: 0, I: 0 },
        { name: "Charge", M: 0, L: 0, T: 1, TH: 0, I: 1 },
        { name: "Voltage", M: 1, L: 2, T: -3, TH: 0, I: -1 },
        { name: "Resistance", M: 1, L: 2, T: -3, TH: 0, I: -2 },
        { name: "Capacitance", M: -1, L: -2, T: 4, TH: 0, I: 2 },
      ];
      const presetIdx = name => PRESETS.findIndex(p => p.name === name);

      function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; }
      function Frac(n, d = 1) {
        if (d < 0) { n = -n; d = -d; }
        const g = gcd(n, d) || 1;
        return {
          n: n / g, d: d / g,
          add(o) { return Frac(this.n * o.d + o.n * this.d, this.d * o.d); },
          sub(o) { return Frac(this.n * o.d - o.n * this.d, this.d * o.d); },
          mul(o) { return Frac(this.n * o.n, this.d * o.d); },
          div(o) { return Frac(this.n * o.d, this.d * o.n); },
          neg() { return Frac(-this.n, this.d); },
          isZero() { return this.n === 0; },
        };
      }
      function rref(M) {
        const rows = M.length, cols = M[0].length;
        let lead = 0, r = 0;
        const pivotCols = [];
        while (r < rows && lead < cols) {
          let i = r;
          while (i < rows && M[i][lead].isZero()) i++;
          if (i === rows) { lead++; continue; }
          const tmp = M[i]; M[i] = M[r]; M[r] = tmp;
          const lv = M[r][lead];
          M[r] = M[r].map(v => v.div(lv));
          for (let i2 = 0; i2 < rows; i2++) {
            if (i2 !== r) {
              const f = M[i2][lead];
              if (!f.isZero()) M[i2] = M[i2].map((v, c) => v.sub(f.mul(M[r][c])));
            }
          }
          pivotCols.push(lead);
          lead++; r++;
        }
        return { pivotCols };
      }

      function freshVerifyVars() {
        return [
          { sym: "m", presetIdx: presetIdx("Mass"), M: 1, L: 0, T: 0, TH: 0, I: 0, power: 1 },
          { sym: "a", presetIdx: presetIdx("Acceleration"), M: 0, L: 1, T: -2, TH: 0, I: 0, power: 1 },
        ];
      }
      function freshDeriveVars() {
        return [
          { sym: "ρ", presetIdx: presetIdx("Density"), M: 1, L: -3, T: 0, TH: 0, I: 0, power: 1 },
          { sym: "V", presetIdx: presetIdx("Velocity"), M: 0, L: 1, T: -1, TH: 0, I: 0, power: 1 },
          { sym: "D", presetIdx: presetIdx("Length"), M: 0, L: 1, T: 0, TH: 0, I: 0, power: 1 },
          { sym: "μ", presetIdx: presetIdx("Dynamic viscosity"), M: 1, L: -1, T: -1, TH: 0, I: 0, power: 1 },
        ];
      }
      function freshTarget() {
        const p = PRESETS[presetIdx("Force")];
        return { presetIdx: presetIdx("Force"), M: p.M, L: p.L, T: p.T, TH: p.TH, I: p.I };
      }

      const st = { mode: "verify" };
      const varsByMode = { verify: freshVerifyVars(), derive: freshDeriveVars() };
      let target = freshTarget();
      const curVars = () => varsByMode[st.mode];

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>DIMENSIONAL ANALYSIS</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">MODE</span>
            <div class="seg" data-group="mode"><button data-v="verify" class="on">Verify formula</button><button data-v="derive">Derive groups</button></div>
          </div>
        </div>
        <div class="dim-body">
          <div class="dim-target"></div>
          <div class="dim-table-wrap"></div>
          <div class="dim-result">
            <div class="ratio-badge"><div class="r empty">——</div><div class="lbl">RESULT</div></div>
            <div class="dim-breakdown"></div>
          </div>
        </div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Uses SI base dimensions: mass (M), length (L), time (T), temperature (Θ), and current (I). Derived π groups are one valid basis — their reciprocals, products, and powers are equally valid dimensionless combinations.</span>`));

      const targetWrap = panel.querySelector(".dim-target");
      const tableWrap = panel.querySelector(".dim-table-wrap");
      const badgeEl = panel.querySelector(".ratio-badge .r");
      const badgeLbl = panel.querySelector(".ratio-badge .lbl");
      const breakdownEl = panel.querySelector(".dim-breakdown");
      const statusEl = panel.querySelector(".status-msg");
      let tbody;

      function renderTarget() {
        targetWrap.innerHTML = `
          <span class="dim-target-label">TARGET QUANTITY</span>
          <select class="dim-preset dim-target-preset">${PRESETS.map((p, i) => `<option value="${i}" ${i === target.presetIdx ? "selected" : ""}>${p.name}</option>`).join("")}</select>
          ${DIMS.map(d => `<span class="dim-exp-lbl">${dimLabel[d]}</span><input class="dim-exp dim-target-exp" data-d="${d}" type="number" step="any" value="${target[d]}"/>`).join("")}`;
        targetWrap.querySelector(".dim-target-preset").addEventListener("change", e => {
          target.presetIdx = +e.target.value;
          const p = PRESETS[target.presetIdx];
          DIMS.forEach(d => { target[d] = p[d]; targetWrap.querySelector(`.dim-target-exp[data-d="${d}"]`).value = p[d]; });
          recompute();
        });
        targetWrap.querySelectorAll(".dim-target-exp").forEach(inp => {
          inp.addEventListener("input", e => {
            target[e.target.dataset.d] = parseFloat(e.target.value) || 0;
            target.presetIdx = 0;
            targetWrap.querySelector(".dim-target-preset").value = "0";
            recompute();
          });
        });
      }

      function makeVarRow(v) {
        const isVerify = st.mode === "verify";
        const tr = el("tr", "dim-row");
        const dimCells = DIMS.map(d => `<td><input class="dim-exp" data-d="${d}" type="number" step="any" value="${v[d]}"/></td>`).join("");
        tr.innerHTML = `
          <td><input class="dim-sym" type="text" maxlength="5" value="${v.sym}"/></td>
          <td><select class="dim-preset">${PRESETS.map((p, i) => `<option value="${i}" ${i === v.presetIdx ? "selected" : ""}>${p.name}</option>`).join("")}</select></td>
          ${dimCells}
          ${isVerify ? `<td><input class="dim-power" type="number" step="any" value="${v.power}"/></td>` : ""}
          <td><button class="dim-remove" type="button" aria-label="Remove variable">✕</button></td>`;

        tr.querySelector(".dim-sym").addEventListener("input", e => { v.sym = e.target.value || "x"; recompute(); });
        tr.querySelector(".dim-preset").addEventListener("change", e => {
          v.presetIdx = +e.target.value;
          const p = PRESETS[v.presetIdx];
          DIMS.forEach(d => { v[d] = p[d]; tr.querySelector(`.dim-exp[data-d="${d}"]`).value = p[d]; });
          recompute();
        });
        tr.querySelectorAll(".dim-exp").forEach(inp => {
          inp.addEventListener("input", e => {
            v[e.target.dataset.d] = parseFloat(e.target.value) || 0;
            v.presetIdx = 0;
            tr.querySelector(".dim-preset").value = "0";
            recompute();
          });
        });
        if (isVerify) {
          tr.querySelector(".dim-power").addEventListener("input", e => {
            v.power = parseFloat(e.target.value); if (Number.isNaN(v.power)) v.power = 0;
            recompute();
          });
        }
        tr.querySelector(".dim-remove").addEventListener("click", () => {
          const arr = curVars(); const i = arr.indexOf(v); if (i >= 0) arr.splice(i, 1);
          renderTable(); recompute();
        });
        return tr;
      }

      function renderTable() {
        tbody.innerHTML = "";
        curVars().forEach(v => tbody.appendChild(makeVarRow(v)));
      }

      function buildTable() {
        const isVerify = st.mode === "verify";
        tableWrap.innerHTML = `
          <table class="dim-table">
            <thead><tr>
              <th>SYM</th><th>QUANTITY</th><th>M</th><th>L</th><th>T</th><th>Θ</th><th>I</th>${isVerify ? "<th>POWER</th>" : ""}<th></th>
            </tr></thead>
            <tbody class="dim-rows"></tbody>
          </table>
          <button type="button" class="dim-add-row">+ ADD VARIABLE</button>`;
        tbody = tableWrap.querySelector(".dim-rows");
        tableWrap.querySelector(".dim-add-row").addEventListener("click", () => {
          curVars().push({ sym: "x" + (curVars().length + 1), presetIdx: 0, M: 0, L: 0, T: 0, TH: 0, I: 0, power: 1 });
          renderTable(); recompute();
        });
        renderTable();
      }

      function dimString(vec) {
        const parts = DIMS.filter(d => vec[d] !== 0).map(d => vec[d] === 1 ? dimLabel[d] : `${dimLabel[d]}${sup(vec[d])}`);
        return parts.length ? parts.join("") : "dimensionless";
      }

      function formatPi(nullVec, vars) {
        const numTerms = [], denTerms = [];
        nullVec.forEach((f, i) => {
          if (f.isZero()) return;
          const sym = vars[i].sym || `x${i + 1}`;
          const av = Frac(Math.abs(f.n), f.d);
          const label = av.d === 1 ? (av.n === 1 ? sym : `${sym}${sup(av.n)}`) : `${sym}^(${av.n}/${av.d})`;
          (f.n < 0 ? denTerms : numTerms).push(label);
        });
        const numStr = numTerms.length ? numTerms.join("·") : "1";
        return denTerms.length ? `${numStr} / ${denTerms.join("·")}` : numStr;
      }

      function setBadge(text, color, label, empty) {
        badgeEl.textContent = text;
        badgeEl.classList.toggle("empty", !!empty);
        badgeEl.style.color = empty ? "" : color;
        badgeLbl.textContent = label;
      }

      function verifyRecompute() {
        const vars = curVars();
        if (vars.length === 0) {
          setBadge("——", "", "RESULT", true);
          breakdownEl.innerHTML = "";
          statusEl.className = "status-msg";
          statusEl.textContent = "Add at least one variable.";
          return;
        }
        const sum = { M: 0, L: 0, T: 0, TH: 0, I: 0 };
        vars.forEach(v => { const p = v.power || 0; DIMS.forEach(d => sum[d] += v[d] * p); });
        const round6 = x => Math.round(x * 1e6) / 1e6;
        const diff = {}; DIMS.forEach(d => diff[d] = round6(sum[d] - target[d]));
        const pass = DIMS.every(d => diff[d] === 0);

        setBadge(pass ? "PASS" : "FAIL", pass ? "var(--cyan)" : "var(--danger)", "DIMENSIONAL CHECK", false);
        breakdownEl.innerHTML = `Formula: <b style="color:var(--cyan)">${dimString(sum)}</b> &nbsp;vs&nbsp; Target: <b style="color:var(--amber)">${dimString(target)}</b>` +
          (!pass ? `<br/>Mismatch: ${dimString(diff)}` : "");
        statusEl.className = pass ? "status-msg" : "status-msg error";
        statusEl.textContent = pass ? "Dimensionally consistent." : "Dimensions don't match — see mismatch above.";
      }

      function deriveRecompute() {
        const vars = curVars();
        if (vars.length === 0) {
          setBadge("——", "", "π GROUPS", true);
          breakdownEl.innerHTML = "";
          statusEl.className = "status-msg";
          statusEl.textContent = "Add at least one variable.";
          return;
        }
        const A = DIMS.map(d => vars.map(v => Frac(v[d] || 0)));
        const { pivotCols } = rref(A);
        const rank = pivotCols.length;
        const freeCols = [];
        for (let c = 0; c < vars.length; c++) if (!pivotCols.includes(c)) freeCols.push(c);
        const k = freeCols.length;

        setBadge(String(k), k > 0 ? "var(--cyan)" : "var(--muted)", "INDEPENDENT π GROUPS", false);

        if (k === 0) {
          breakdownEl.innerHTML = `Rank ${rank} equals the variable count — no dimensionless combination exists.`;
        } else {
          const groups = freeCols.map(fc => {
            const nullVec = vars.map(() => Frac(0));
            nullVec[fc] = Frac(1);
            pivotCols.forEach((pc, r) => { nullVec[pc] = A[r][fc].neg(); });
            return nullVec;
          });
          breakdownEl.innerHTML = groups.map((g, i) => `π<sub>${i + 1}</sub> = ${formatPi(g, vars)}`).join("<br/>");
        }
