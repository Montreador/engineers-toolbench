<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toolbench — Engineer's Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DESIGN TOKENS — "instrument bench"
     amber = a value you SET · cyan = a value the tool MEASURES
     ============================================================ */
  :root {
    --bg: #14171C;
    --panel: #1C2029;
    --well: #232834;
    --line: #2E3440;
    --line-hi: #3A4150;
    --text: #E6E9EF;
    --muted: #838B99;
    --amber: #FFB020;
    --amber-dim: #5c4a20;
    --cyan: #45D4C4;
    --cyan-dim: #234a47;
    --danger: #FF6B6B;
    --radius: 10px;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 80% -10%, #1b2029 0%, transparent 60%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; transition: grid-template-columns .2s ease; }
  .app.sidebar-collapsed { grid-template-columns: 0px 1fr; }

  /* ---------------- SIDEBAR ---------------- */
  .sidebar {
    border-right: 1px solid var(--line);
    background: linear-gradient(180deg, #171b21, #14171c);
    padding: 22px 16px;
    display: flex; flex-direction: column; gap: 26px;
    overflow: hidden; white-space: nowrap;
    transition: padding .2s ease, opacity .15s ease;
  }
  .app.sidebar-collapsed .sidebar { padding-left: 0; padding-right: 0; opacity: 0; }
  .sidebar-toggle {
    position: fixed; top: 18px; left: 258px; z-index: 20;
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    background: var(--panel); border: 1px solid var(--line-hi); border-radius: 6px;
    color: var(--muted); cursor: pointer; transition: left .2s ease, color .15s, border-color .15s;
  }
  .sidebar-toggle:hover { color: var(--text); border-color: #4a5262; }
  .sidebar-toggle .icon { display: inline-block; transition: transform .2s ease; font-size: 12px; line-height: 1; }
  .app.sidebar-collapsed .sidebar-toggle { left: 10px; }
  .app.sidebar-collapsed .sidebar-toggle .icon { transform: rotate(180deg); }
  .brand { display: flex; align-items: center; gap: 11px; padding: 0 6px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 7px;
    background: linear-gradient(135deg, var(--amber), #c77f10);
    display: grid; place-items: center;
    color: #14171C; font-family: var(--mono); font-weight: 600; font-size: 15px;
    box-shadow: 0 0 0 1px #00000040, 0 6px 14px -6px var(--amber);
    flex-shrink: 0;
  }
  .brand-name { font-weight: 700; letter-spacing: -0.01em; font-size: 16px; }
  .brand-sub  { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.14em; }

  .nav-group { display: flex; flex-direction: column; gap: 3px; }
  .nav-label {
    display: flex; align-items: center; justify-content: space-between; gap: 6px; width: 100%;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; color: var(--muted);
    padding: 4px 8px; margin-bottom: 2px;
    background: none; border: none; cursor: pointer; text-align: left;
    transition: color .15s;
  }
  .nav-label:hover { color: #C4CAD4; }
  .nav-chevron { flex-shrink: 0; transition: transform .2s ease; font-size: 9px; }
  .nav-group.expanded .nav-chevron { transform: rotate(90deg); }
  .nav-group-items {
    display: flex; flex-direction: column; gap: 3px;
    max-height: 0; overflow: hidden; transition: max-height .25s ease;
  }
  .nav-group.expanded .nav-group-items { max-height: 800px; }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 8px 10px; border-radius: 8px; font-size: 13.5px; color: #C4CAD4;
    cursor: pointer; border: 1px solid transparent; background: none; text-align: left;
    width: 100%; font-family: var(--sans);
    transition: background .15s, color .15s, border-color .15s;
  }
  .nav-item:hover { background: #20252e; color: var(--text); }
  .nav-item.active { background: #20262f; color: var(--text); border-color: var(--line-hi); }
  .nav-item.active::before {
    content: ""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--amber); box-shadow: 0 0 8px var(--amber); margin-right: -2px;
  }
  .nav-item.soon { color: #5a6270; cursor: default; }
  .nav-item.soon:hover { background: none; color: #5a6270; }
  .tag {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: #6b7280;
    border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px;
  }

  /* ---------------- MAIN ---------------- */
  .main { padding: 34px 40px 48px; max-width: 900px; }
  .crumb { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }
  .crumb b { color: var(--amber); font-weight: 500; }
  .title { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
  .subtitle { color: var(--muted); font-size: 14.5px; max-width: 56ch; margin: 0 0 30px; line-height: 1.5; }

  /* ---------------- PANEL ---------------- */
  .panel {
    background: linear-gradient(180deg, var(--panel), #181c23);
    border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 20px 50px -30px #000, inset 0 1px 0 #ffffff08; overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px; border-bottom: 1px solid var(--line); background: #181c22;
  }
  .panel-head h2 { margin: 0; font-size: 12px; letter-spacing: 0.14em; font-family: var(--mono); color: var(--muted); font-weight: 500; }
  .legend { display: flex; gap: 16px; }
  .legend span { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.set { background: var(--amber); box-shadow: 0 0 7px var(--amber); }
  .dot.meas { background: var(--cyan); box-shadow: 0 0 7px var(--cyan); }

  /* channels */
  .channels { display: grid; gap: 1px; background: var(--line); }
  .channels.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .channels.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .channels.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .channel {
    background: var(--well); padding: 18px 16px 16px;
    display: flex; flex-direction: column; gap: 4px; position: relative; min-height: 132px;
  }
  .ch-sym { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.1em; display: flex; align-items: center; gap: 7px; }
  .ch-sym .state {
    font-size: 9px; letter-spacing: 0.14em; padding: 1px 5px; border-radius: 4px;
    border: 1px solid var(--line-hi); color: #6b7280; opacity: 0; transition: opacity .15s;
  }
  .channel[data-state="input"]    .state { opacity: 1; color: var(--amber); border-color: var(--amber-dim); }
  .channel[data-state="measured"] .state { opacity: 1; color: var(--cyan);  border-color: var(--cyan-dim); }
  .channel[data-state="pending"]  .state { opacity: 0; }

  .ch-value { font-family: var(--mono); font-weight: 500; font-size: 26px; letter-spacing: -0.01em; line-height: 1.2; margin-top: auto; }
  .ch-input {
    width: 100%; background: none; border: none; outline: none; color: var(--amber);
    font-family: var(--mono); font-weight: 500; font-size: 26px; letter-spacing: -0.01em;
    padding: 0; margin-top: auto; -moz-appearance: textfield;
  }
  .ch-input::-webkit-outer-spin-button, .ch-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .ch-input::placeholder { color: #454c58; }
  .channel[data-state="measured"] .ch-value { color: var(--cyan); text-shadow: 0 0 16px var(--cyan-dim); cursor: text; }
  .channel[data-state="pending"]  .ch-value { color: #454c58; }

  .ch-unit { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
  .ch-unit b { color: #aeb6c2; font-weight: 500; }

  .channel::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 2px; background: transparent; transition: background .15s; }
  .channel[data-state="input"]::after    { background: var(--amber); box-shadow: 0 0 12px var(--amber); }
  .channel[data-state="measured"]::after { background: var(--cyan);  box-shadow: 0 0 12px var(--cyan); }

  /* status strip */
  .status {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 12px 18px; border-top: 1px solid var(--line); background: #181c22;
    min-height: 46px; flex-wrap: wrap;
  }
  .status-msg { font-size: 13px; color: var(--muted); }
  .status-msg.error { color: var(--danger); }
  .formulae { display: flex; gap: 18px; font-family: var(--mono); font-size: 12px; color: #9aa3b0; }
  .formulae span b { color: var(--cyan); font-weight: 500; }
  .btn-reset {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted);
    background: none; border: 1px solid var(--line-hi); border-radius: 6px; padding: 6px 11px;
    cursor: pointer; transition: color .15s, border-color .15s;
  }
  .btn-reset:hover { color: var(--text); border-color: #4a5262; }

  .note { margin-top: 20px; font-size: 13px; color: var(--muted); line-height: 1.6; display: flex; gap: 10px; align-items: flex-start; }
  .note .k { color: var(--amber); font-family: var(--mono); font-size: 12px; }

  /* ---------------- GEAR TOOL ---------------- */
  .gear-layout { display: grid; grid-template-columns: minmax(240px, 44%) 1fr; }
  .gear-stage {
    background: var(--well); border-right: 1px solid var(--line); padding: 22px 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .gear-svg { width: 100%; height: auto; max-height: 200px; display: block; }
  .ratio-badge { text-align: center; }
  .ratio-badge .r { font-family: var(--mono); font-size: 34px; font-weight: 600; color: var(--cyan); letter-spacing: -0.01em; text-shadow: 0 0 22px var(--cyan-dim); }
  .ratio-badge .r.empty { color: #454c58; text-shadow: none; }
  .ratio-badge .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: var(--muted); margin-top: 4px; }

  .gear-rot { animation-name: gspin; animation-timing-function: linear; animation-iteration-count: infinite; transform-box: fill-box; transform-origin: center; }
  @keyframes gspin { to { transform: rotate(360deg); } }
  .gear-body { stroke: #3a4150; stroke-width: 1.5; }
  .gear-hub  { fill: #2c3240; stroke: #3a4150; stroke-width: 1; }
  .gear-hole { fill: var(--bg); }
  .gear-tooth.driver { fill: var(--amber); opacity: .82; }
  .gear-tooth.driven { fill: var(--cyan);  opacity: .82; }
  .gear-cap.driver { stroke: var(--amber-dim); }
  .gear-cap.driven { stroke: var(--cyan-dim); }

  /* ---------------- BEAM TOOL ---------------- */
  .selectors { display: flex; gap: 22px; padding: 14px 18px; border-bottom: 1px solid var(--line); background: #181c22; flex-wrap: wrap; align-items: flex-end; }
  .seg-field { display: flex; flex-direction: column; gap: 6px; }
  .seg-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--muted); }
  .seg { display: inline-flex; border: 1px solid var(--line-hi); border-radius: 7px; overflow: hidden; background: #1b2029; }
  .seg button { font-family: var(--sans); font-size: 12.5px; padding: 6px 13px; background: none; border: none; color: #c4cad4; cursor: pointer; border-right: 1px solid var(--line-hi); transition: background .12s, color .12s; }
  .seg button:last-child { border-right: none; }
  .seg button:hover { background: #232a34; }
  .seg button.on { background: var(--amber); color: #14171c; font-weight: 600; }
  .mat-select { background: #1b2029; color: var(--text); border: 1px solid var(--line-hi); border-radius: 7px; padding: 7px 10px; font-family: var(--sans); font-size: 13px; cursor: pointer; }

  .beam-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .beam-stage {
    background: var(--well); border-right: 1px solid var(--line); padding: 22px 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .beam-svg { width: 100%; height: auto; max-height: 230px; display: block; }
  .outputs-wrap { border-top: 1px solid var(--line); }

  .beam-orig  { stroke: #4a5262; stroke-width: 2; stroke-dasharray: 3 5; fill: none; }
  .beam-curve { stroke: var(--cyan); stroke-width: 3; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 6px var(--cyan-dim)); }
  .beam-fix   { stroke: var(--amber); stroke-width: 2.5; }
  .beam-hatch { stroke: var(--amber); stroke-width: 1.5; opacity: .7; }
  .beam-supp  { fill: none; stroke: var(--amber); stroke-width: 2; }
  .beam-supp-fill { fill: #2c2415; stroke: var(--amber); stroke-width: 2; }
  .beam-load  { stroke: var(--amber); stroke-width: 2; }
  .beam-load-head { fill: var(--amber); }
  .beam-label { font-family: var(--mono); font-size: 13px; fill: var(--amber); }
  .beam-dim   { stroke: var(--cyan); stroke-width: 1.2; stroke-dasharray: 2 3; }
  .beam-dim-label { font-family: var(--mono); font-size: 12px; fill: var(--cyan); }

  /* ---------------- CHAIN TOOL ---------------- */
  .chain-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .chain-stage {
    background: var(--well); border-right: 1px solid var(--line); padding: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .chain-svg { width: 100%; height: auto; max-height: 240px; display: block; }
  .sprocket-body { stroke: #3a4150; stroke-width: 1.5; }
  .sprocket-hub  { fill: #2c3240; stroke: #3a4150; stroke-width: 1; }
  .sprocket-hole { fill: var(--bg); }
  .sprocket-tooth.driver { fill: var(--amber); opacity: .82; }
  .sprocket-tooth.driven { fill: var(--cyan);  opacity: .82; }
  .chain-guide { fill: none; stroke: #363d49; stroke-width: 8; stroke-linejoin: round; }
  .chain-roller { fill: none; stroke: #c9d0dc; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 2.5 6; animation: chainmove 1.3s linear infinite; }
  .chain-ghost { fill: none; stroke: #3a4150; stroke-width: 2; stroke-dasharray: 4 6; }
  @keyframes chainmove { to { stroke-dashoffset: -85; } }

  /* ---------------- VOLTAGE DIVIDER TOOL ---------------- */
  .vd-layout { display: grid; grid-template-columns: minmax(230px, 42%) 1fr; }
  .vd-stage {
    background: var(--well); border-right: 1px solid var(--line); padding: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .vd-svg { width: 100%; height: auto; max-height: 250px; display: block; }
  .vd-conductor { fill: none; stroke: #aeb6c2; stroke-width: 2.4; stroke-linejoin: round; stroke-linecap: round; }
  .vd-flow { fill: none; stroke: var(--amber); stroke-width: 2.6; stroke-linecap: round; stroke-dasharray: 1 8; animation: chainmove 1s linear infinite; }
  .vd-tap { fill: none; stroke: #aeb6c2; stroke-width: 2; }
  .vd-node { fill: var(--amber); }
  .vd-term { fill: #181c22; stroke: var(--cyan); stroke-width: 2; }
  .vd-gnd { stroke: #aeb6c2; stroke-width: 2; stroke-linecap: round; }
  .vd-tick { font-family: var(--mono); font-size: 12px; }
  .vd-cap { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; fill: var(--muted); }

  /* ---------------- RESISTOR CODE TOOL ---------------- */
  .rc-layout { display: grid; grid-template-columns: minmax(240px, 44%) 1fr; }
  .rc-stage { background: var(--well); border-right: 1px solid var(--line); padding: 24px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  .rc-svg { width: 100%; height: auto; max-height: 150px; display: block; }
  .rc-readout { text-align: center; }
  .rc-val { font-family: var(--mono); font-size: 32px; font-weight: 600; color: var(--cyan); letter-spacing: -0.01em; text-shadow: 0 0 22px var(--cyan-dim); }
  .rc-sub { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .06em; margin-top: 5px; }
  .rc-sub b { color: #aeb6c2; font-weight: 500; }
  .rc-inputs { padding: 18px; display: flex; flex-direction: column; gap: 15px; }
  .rc-reverse { display: flex; flex-direction: column; gap: 6px; }
  .rc-reverse label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--muted); }
  .rc-reverse input { background: #1b2029; border: 1px solid var(--line-hi); border-radius: 7px; padding: 9px 11px; color: var(--amber); font-family: var(--mono); font-size: 15px; outline: none; }
  .rc-reverse input::placeholder { color: #454c58; }
  .band-group { display: flex; flex-direction: column; gap: 7px; }
  .band-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .band-label { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--muted); }
  .band-sel { font-family: var(--mono); font-size: 11px; color: #aeb6c2; white-space: nowrap; }
  .swatch-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .swatch { width: 22px; height: 22px; border-radius: 5px; border: 1px solid #00000055; cursor: pointer; padding: 0; box-shadow: inset 0 0 0 1px #ffffff14; transition: transform .08s; }
  .swatch:hover { transform: translateY(-1px); }
  .swatch.sel { outline: 2px solid var(--cyan); outline-offset: 2px; }
  .rc-lead { stroke: #8a92a0; stroke-width: 3; stroke-linecap: round; }

  /* ---------------- REYNOLDS / FLOW TOOL ---------------- */
  .re-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .re-stage { background: var(--well); border-right: 1px solid var(--line); padding: 22px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .re-svg { width: 100%; height: auto; max-height: 175px; display: block; }
  .re-badge { text-align: center; }
  .re-num { font-family: var(--mono); font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
  .re-regime { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; margin-top: 5px; }
  .re-cap { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--muted); margin-bottom: 2px; }
  .pipe-wall { stroke: #4a5262; stroke-width: 4; stroke-linecap: round; }
  .streamline { fill: none; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 9 5; animation: flowmove 1.1s linear infinite; }
  .eddy { fill: none; stroke-width: 2; opacity: .8; }
  @keyframes flowmove { to { stroke-dashoffset: -56; } }

  /* ---------------- VOLTAGE DROP / WIRE TOOL ---------------- */
  .wd-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .wd-stage { background: var(--well); border-right: 1px solid var(--line); padding: 22px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .wd-svg { width: 100%; height: auto; max-height: 175px; display: block; }
  .wd-sym { stroke: #aeb6c2; stroke-width: 2; fill: none; stroke-linecap: round; }
  .wd-flow { fill: none; stroke: #14171c; stroke-linecap: round; stroke-dasharray: 1 10; animation: chainmove .9s linear infinite; opacity: .55; }

  /* ---------------- RC/RL FILTER TOOL ---------------- */
  .filter-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .filter-stage { background: var(--well); border-right: 1px solid var(--line); padding: 20px; display: flex; align-items: center; justify-content: center; }
  .filter-svg { width: 100%; height: auto; max-height: 210px; display: block; }
  .filter-grid { stroke: #262b35; stroke-width: 1; }
  .filter-curve { stroke: var(--cyan); stroke-width: 2.5; fill: none; stroke-linecap: round; filter: drop-shadow(0 0 6px var(--cyan-dim)); }
  .filter-cutoff { stroke: var(--amber); stroke-width: 1.3; stroke-dasharray: 3 4; opacity: .8; }
  .filter-op { fill: var(--amber); filter: drop-shadow(0 0 5px var(--amber)); }
  .filter-axis-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; fill: var(--muted); }
  .filter-tick-label { font-family: var(--mono); font-size: 10px; fill: var(--amber); }

  /* ---------------- 555 TIMER TOOL ---------------- */
  .timer-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .timer-stage { background: var(--well); border-right: 1px solid var(--line); padding: 20px; display: flex; align-items: center; justify-content: center; }
  .timer-svg { width: 100%; height: auto; max-height: 210px; display: block; }
  .timer-axis { stroke: #3a4150; stroke-width: 1.4; }
  .timer-axis-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: .06em; fill: var(--muted); }
  .timer-cap-wave { fill: none; stroke: var(--cyan); stroke-width: 2.3; stroke-linecap: round; filter: drop-shadow(0 0 5px var(--cyan-dim)); }
  .timer-out-wave { fill: none; stroke: var(--amber); stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px var(--amber-dim)); }
  .timer-dim { stroke: var(--muted); stroke-width: 1; stroke-dasharray: 2 3; }
  .timer-lbl { font-family: var(--mono); font-size: 10px; fill: var(--muted); }
  .timer-trig { stroke: var(--amber); stroke-width: 2; }

  /* ---------------- OP-AMP GAIN TOOL ---------------- */
  .opamp-layout { display: grid; grid-template-columns: minmax(240px, 44%) 1fr; }
  .opamp-stage { background: var(--well); border-right: 1px solid var(--line); padding: 22px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .opamp-svg { width: 100%; height: auto; max-height: 200px; display: block; }
  .opamp-tri { fill: #20252e; stroke: #3a4150; stroke-width: 1.6; }
  .opamp-wire { stroke: #aeb6c2; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .opamp-res { stroke: var(--amber); stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .opamp-out { stroke: var(--cyan); stroke-width: 2.4; fill: none; stroke-linecap: round; }
  .opamp-gnd { stroke: #aeb6c2; stroke-width: 2; stroke-linecap: round; }
  .opamp-lbl { font-family: var(--mono); font-size: 11px; fill: var(--muted); }
  .opamp-pm { font-family: var(--mono); font-size: 13px; fill: #c4cad4; font-weight: 600; }

  /* ---------------- DIMENSIONAL ANALYSIS TOOL ---------------- */
  .dim-body { padding: 18px; display: flex; flex-direction: column; gap: 16px; }
  .dim-target { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px 14px; background: var(--well); border: 1px solid var(--line); border-radius: 8px; }
  .dim-target-label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--muted); margin-right: 4px; }
  .dim-exp-lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .dim-table-wrap { overflow-x: auto; }
  .dim-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12.5px; }
  .dim-table th { text-align: left; font-size: 9.5px; letter-spacing: .1em; color: var(--muted); padding: 6px 8px; border-bottom: 1px solid var(--line); font-weight: 500; white-space: nowrap; }
  .dim-table td { padding: 5px 8px; border-bottom: 1px solid var(--line); }
  .dim-sym, .dim-exp, .dim-power {
    width: 48px; background: #1b2029; border: 1px solid var(--line-hi); border-radius: 5px;
    padding: 5px 6px; color: var(--amber); font-family: var(--mono); font-size: 12.5px; text-align: center; -moz-appearance: textfield;
  }
  .dim-sym { width: 44px; color: var(--text); }
  .dim-exp::-webkit-outer-spin-button, .dim-exp::-webkit-inner-spin-button,
  .dim-power::-webkit-outer-spin-button, .dim-power::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .dim-preset { background: #1b2029; border: 1px solid var(--line-hi); border-radius: 5px; padding: 5px 6px; color: var(--text); font-family: var(--sans); font-size: 12px; max-width: 160px; }
  .dim-remove {
    background: none; border: 1px solid var(--line-hi); border-radius: 5px; color: var(--muted);
    width: 24px; height: 24px; cursor: pointer; font-size: 12px; line-height: 1;
  }
  .dim-remove:hover { color: var(--danger); border-color: var(--danger); }
  .dim-add-row {
    margin-top: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: .08em; color: var(--muted);
    background: none; border: 1px dashed var(--line-hi); border-radius: 7px; padding: 8px 14px; cursor: pointer; width: 100%;
  }
  .dim-add-row:hover { color: var(--text); border-color: #4a5262; }
  .dim-result { padding: 16px 18px; background: var(--well); border: 1px solid var(--line); border-radius: 8px; display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .dim-breakdown { font-family: var(--mono); font-size: 13px; color: #c4cad4; line-height: 1.7; }

  /* ---------------- MOTOR TORQUE TOOL ---------------- */
  .motor-svg { width: 100%; height: auto; max-height: 200px; display: block; }
  .motor-body { fill: #20252e; stroke: #3a4150; stroke-width: 2; }
  .motor-rotor { fill: #181c22; stroke: #3a4150; stroke-width: 1.5; }
  .motor-key { stroke: var(--amber); stroke-width: 3; stroke-linecap: round; }
  .motor-hub { fill: #2c3240; stroke: #3a4150; stroke-width: 1; }

  /* ---------------- MOTOR FLA / INRUSH TOOL ---------------- */
  .fla-layout { display: grid; grid-template-columns: minmax(240px, 46%) 1fr; }
  .fla-stage { background: var(--well); border-right: 1px solid var(--line); padding: 20px; display: flex; align-items: center; justify-content: center; }
  .fla-svg { width: 100%; height: auto; max-height: 200px; display: block; }
  .fla-axis { stroke: #3a4150; stroke-width: 1.4; }
  .fla-dash { stroke: var(--cyan); stroke-width: 1; stroke-dasharray: 3 4; opacity: .6; }
  .fla-curve { fill: none; stroke: var(--amber); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px var(--amber-dim)); }
  .fla-lbl { font-family: var(--mono); font-size: 10px; fill: var(--cyan); }
  .fla-lbl-hi { fill: var(--danger); }
  .fla-axis-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; fill: var(--muted); }

  /* ---------------- AC POWER / IMPEDANCE / PFC TOOLS ---------------- */
  .pt-layout { display: grid; grid-template-columns: minmax(240px, 44%) 1fr; }
  .pt-stage { background: var(--well); border-right: 1px solid var(--line); padding: 20px; display: flex; align-items: center; justify-content: center; }
  .pt-svg { width: 100%; height: auto; max-height: 210px; display: block; }
  .pt-p-line { stroke: var(--amber); stroke-width: 3; stroke-linecap: round; }
  .pt-q-line { stroke: var(--cyan); stroke-width: 3; stroke-linecap: round; }
  .pt-s-line { stroke: #c9d0dc; stroke-width: 2.5; stroke-linecap: round; }
  .pt-lbl { font-family: var(--mono); font-size: 11px; }
  .pt-derive-row { display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-top: 1px solid var(--line); background: #181c22; flex-wrap: wrap; }
  .pt-derive-label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--muted); }
  .pfc-ghost { stroke: #4a5262; stroke-width: 2; stroke-dasharray: 3 5; }
  .pfc-bracket { stroke: var(--danger); stroke-width: 1.4; }

  /* ---------------- BLOWN FILM PROCESS TOOL ---------------- */
  .bf-svg { width: 100%; height: auto; max-height: 230px; display: block; }
  .bf-die { fill: #2c3240; stroke: #3a4150; stroke-width: 1.5; }
  .bf-bubble-fill { fill: #20252e; }
  .bf-bubble-outline { fill: none; stroke: var(--cyan); stroke-width: 2; }
  .bf-nip { stroke: #aeb6c2; stroke-width: 3; stroke-linecap: round; }
  .bf-flow { fill: none; stroke: var(--amber); stroke-width: 2; stroke-dasharray: 1 8; stroke-linecap: round; animation: chainmove 1s linear infinite; }
  .bf-lbl { font-family: var(--mono); font-size: 10px; fill: var(--muted); }
  .bf-lbl-hi { fill: var(--cyan); }

  /* ---------------- BUBBLE STRESS TOOL ---------------- */
  .bs-svg { width: 100%; height: auto; max-height: 200px; display: block; }
  .bs-wall { stroke: #aeb6c2; stroke-width: 2.5; fill: none; }
  .bs-arrow { stroke: var(--amber); stroke-width: 2; }
  .bs-arrow-head { fill: var(--amber); }
  .bs-lbl { font-family: var(--mono); font-size: 11px; }

  :focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; border-radius: 4px; }

  /* ---------------- RESPONSIVE ---------------- */
  .mobile-topbar { display: none; }
  .sidebar-backdrop {
    position: fixed; inset: 0; background: #00000090; z-index: 30;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
    .mobile-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--line); background: #14171c;
      position: sticky; top: 0; z-index: 25;
    }
    .mobile-topbar .brand { padding: 0; }
    .mobile-nav-toggle {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--line-hi); border-radius: 7px; color: var(--muted);
      font-size: 16px; cursor: pointer; flex-shrink: 0;
    }
    .mobile-nav-toggle:hover { color: var(--text); border-color: #4a5262; }
    .app.mobile-nav-open .sidebar-backdrop { opacity: 1; pointer-events: auto; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 270px; max-width: 82vw;
      z-index: 35; transform: translateX(-100%); transition: transform .25s ease;
      flex-direction: column; align-items: stretch; overflow-y: auto; overflow-x: hidden;
      border-right: 1px solid var(--line); border-bottom: none;
      box-shadow: 20px 0 44px -20px #000;
    }
    .app.mobile-nav-open .sidebar { transform: translateX(0); }
    .sidebar-toggle { display: none; }
    .app.sidebar-collapsed { grid-template-columns: 1fr; }
    .main { padding: 24px 18px 40px; }
    .channels.cols-4 { grid-template-columns: repeat(2, 1fr); }
    .title { font-size: 24px; }
    .formulae { display: none; }
    .gear-layout { grid-template-columns: 1fr; }
    .gear-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .beam-layout { grid-template-columns: 1fr; }
    .beam-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .chain-layout { grid-template-columns: 1fr; }
    .chain-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .vd-layout { grid-template-columns: 1fr; }
    .vd-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .rc-layout { grid-template-columns: 1fr; }
    .rc-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .re-layout { grid-template-columns: 1fr; }
    .re-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .wd-layout { grid-template-columns: 1fr; }
    .wd-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .filter-layout { grid-template-columns: 1fr; }
    .filter-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .timer-layout { grid-template-columns: 1fr; }
    .timer-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .opamp-layout { grid-template-columns: 1fr; }
    .opamp-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .dim-result { flex-direction: column; align-items: flex-start; }
    .fla-layout { grid-template-columns: 1fr; }
    .fla-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .pt-layout { grid-template-columns: 1fr; }
    .pt-stage { border-right: none; border-bottom: 1px solid var(--line); }
    .channels.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .selectors { gap: 16px; }
  }
  @media (prefers-reduced-motion: reduce) { *, .gear-rot { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="mobile-topbar">
    <div class="brand">
      <div class="brand-mark">Ω</div>
      <div class="brand-name">Toolbench</div>
    </div>
    <button class="mobile-nav-toggle" id="mobileNavToggle" type="button" aria-label="Open menu" aria-expanded="false">☰</button>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Collapse sidebar" title="Collapse sidebar"><span class="icon">‹</span></button>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">Ω</div>
      <div>
        <div class="brand-name">Toolbench</div>
        <div class="brand-sub">ENGINEER'S TOOLKIT</div>
      </div>
    </div>
    <div id="nav"></div>
  </aside>

  <main class="main" id="view"></main>
</div>

<script>
(() => {
  "use strict";

  /* ============================================================
     SHARED HELPERS
     ============================================================ */
  const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; };

  function makeChannel({ sym, name, unit }) {
    const wrap = el("div", "channel");
    wrap.dataset.state = "empty";
    wrap.innerHTML = `
      <div class="ch-sym">${sym} <span class="state">SET</span></div>
      <input class="ch-input" inputmode="decimal" type="number" placeholder="——" aria-label="${name} in ${unit}" />
      <div class="ch-value" hidden></div>
      <div class="ch-unit"><b>${name}</b> \u00B7 ${unit}</div>`;
    return { el: wrap, input: wrap.querySelector(".ch-input"), value: wrap.querySelector(".ch-value"), tag: wrap.querySelector(".state") };
  }
  const chInput    = (c, raw) => { c.el.dataset.state = "input"; c.tag.textContent = "SET"; c.value.hidden = true; c.input.hidden = false; if (raw !== undefined && c.input.value !== raw) c.input.value = raw; };
  const chMeasured = (c, text) => { c.el.dataset.state = "measured"; c.tag.textContent = "MEAS"; c.input.hidden = true; c.value.hidden = false; c.value.textContent = text; };
  const chPending  = (c) => { c.el.dataset.state = "pending"; c.input.hidden = true; c.value.hidden = false; c.value.textContent = "\u2014\u2014"; };
  const chEmpty    = (c) => { c.el.dataset.state = "empty"; c.value.hidden = true; c.input.hidden = false; c.input.value = ""; };

  function formatSI(value, unit) {
    if (!isFinite(value)) return "\u2014";
    if (value === 0) return "0 " + unit;
    const prefixes = [
      { f: 1e9, s: "G" }, { f: 1e6, s: "M" }, { f: 1e3, s: "k" },
      { f: 1, s: "" }, { f: 1e-3, s: "m" }, { f: 1e-6, s: "\u00B5" }, { f: 1e-9, s: "n" },
    ];
    const abs = Math.abs(value);
    let chosen = prefixes[prefixes.length - 1];
    for (const p of prefixes) { if (abs >= p.f) { chosen = p; break; } }
    return `${parseFloat((value / chosen.f).toPrecision(4))} ${chosen.s}${unit}`;
  }
  const trimNumber = (v) => (!isFinite(v) ? "" : String(parseFloat(v.toPrecision(6))));
  const fmt = (v) => parseFloat(v.toPrecision(4));

  /* ============================================================
     TOOL 1 — OHM'S LAW
     ============================================================ */
  const OhmsLaw = {
    id: "ohms",
    discipline: "ELECTRICAL",
    title: "Ohm's Law calculator",
    subtitle: "Enter any two of the four quantities. The other two solve instantly. Enter a third and the oldest input is released \u2014 so you can pivot without clearing.",

    mount(root) {
      const Q = [
        { key: "V", sym: "V", name: "Voltage", unit: "V" },
        { key: "I", sym: "I", name: "Current", unit: "A" },
        { key: "R", sym: "R", name: "Resistance", unit: "\u03A9" },
        { key: "P", sym: "P", name: "Power", unit: "W" },
      ];
      const LAWS = {
        IV: [["R", "V / I"], ["P", "V \u00D7 I"]], RV: [["I", "V / R"], ["P", "V\u00B2 / R"]],
        PV: [["I", "P / V"], ["R", "V\u00B2 / P"]], IR: [["V", "I \u00D7 R"], ["P", "I\u00B2 \u00D7 R"]],
        IP: [["V", "P / I"], ["R", "P / I\u00B2"]], PR: [["V", "\u221A(P\u00D7R)"], ["I", "\u221A(P/R)"]],
      };

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>READOUT</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="channels cols-4"></div>
        <div class="status">
          <div class="status-msg">Enter two values to begin.</div>
          <div class="formulae"></div>
          <button class="btn-reset">CLEAR</button>
        </div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Combinations that solve to negative or infinite results are flagged rather than shown. Resistance and power are treated as non-negative magnitudes.</span>`));

      const channelsEl = panel.querySelector(".channels");
      const statusEl = panel.querySelector(".status-msg");
      const formulaeEl = panel.querySelector(".formulae");

      const chans = {}, raw = {};
      let inputOrder = [];

      Q.forEach(q => {
        const c = makeChannel(q); chans[q.key] = c; raw[q.key] = "";
        channelsEl.appendChild(c.el);
        c.input.addEventListener("input", e => onType(q.key, e.target.value));
        c.value.addEventListener("click", () => takeOver(q.key));
      });

      function onType(key, val) {
        raw[key] = val;
        if (val.trim() === "") inputOrder = inputOrder.filter(k => k !== key);
        else if (!inputOrder.includes(key)) {
          inputOrder.push(key);
          if (inputOrder.length > 2) raw[inputOrder.shift()] = "";
        }
        recompute();
      }
      function takeOver(key) {
        if (!inputOrder.includes(key)) { inputOrder.push(key); if (inputOrder.length > 2) raw[inputOrder.shift()] = ""; }
        chInput(chans[key], raw[key] || "");
        chans[key].input.focus(); chans[key].input.select();
        recompute();
      }
      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const bad = (t) => { const e = new Error(t); e.friendly = true; return e; };

      function solve(a, b) {
        const V = num("V"), I = num("I"), R = num("R"), P = num("P");
        const known = { V, I, R, P }; let out;
        switch ([a, b].sort().join("")) {
          case "IV": if (I === 0) throw bad("Current can't be 0 \u2014 that divides by zero when solving resistance."); out = { R: V / I, P: V * I }; break;
          case "RV": if (R === 0) throw bad("Resistance can't be 0 \u2014 that divides by zero when solving current."); out = { I: V / R, P: (V * V) / R }; break;
          case "PV": if (V === 0) throw bad("Voltage can't be 0 when paired with power."); if (P === 0) throw bad("Power can't be 0 when paired with voltage."); out = { I: P / V, R: (V * V) / P }; break;
          case "IR": out = { V: I * R, P: I * I * R }; break;
          case "IP": if (I === 0) throw bad("Current can't be 0 when paired with power."); out = { V: P / I, R: P / (I * I) }; break;
          case "PR": if (R <= 0) throw bad("Resistance must be greater than 0 when paired with power."); if (P < 0) throw bad("Power can't be negative."); out = { V: Math.sqrt(P * R), I: Math.sqrt(P / R) }; break;
        }
        for (const k in out) if (!isFinite(out[k])) throw bad("That combination doesn't resolve to a real value.");
        return { ...known, ...out };
      }

      function recompute() {
        formulaeEl.innerHTML = "";
        if (inputOrder.length < 2) {
          Q.forEach(q => inputOrder.includes(q.key) ? chInput(chans[q.key], raw[q.key]) : chEmpty(chans[q.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = inputOrder.length === 1 ? "One more value and it solves." : "Enter two values to begin.";
          return;
        }
        const [a, b] = inputOrder; let result;
        try { result = solve(a, b); }
        catch (err) { statusEl.className = "status-msg error"; statusEl.textContent = err.friendly ? err.message : "Check your inputs."; return; }
        Q.forEach(q => {
          if (inputOrder.includes(q.key)) chInput(chans[q.key], raw[q.key]);
          else { chMeasured(chans[q.key], formatSI(result[q.key], q.unit)); raw[q.key] = trimNumber(result[q.key]); }
        });
        statusEl.className = "status-msg"; statusEl.textContent = "Solved.";
        (LAWS[[a, b].sort().join("")] || []).forEach(([lhs, rhs]) => formulaeEl.appendChild(el("span", null, `<b>${lhs}</b> = ${rhs}`)));
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        inputOrder = []; Q.forEach(q => { raw[q.key] = ""; chEmpty(chans[q.key]); });
        statusEl.className = "status-msg"; statusEl.textContent = "Enter two values to begin."; formulaeEl.innerHTML = "";
        chans.V.input.focus();
      });
      recompute();
    },
  };

  /* ============================================================
     TOOL 2 — GEAR RATIO
     ============================================================ */
  const GearRatio = {
    id: "gear",
    discipline: "MECHANICAL",
    title: "Gear ratio calculator",
    subtitle: "Set the driver and driven tooth counts to get the ratio. Add an input speed or torque and the tool carries them through the train \u2014 the visual spins at the real relative rates.",

    mount(root) {
      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>GEAR TRAIN</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="gear-layout">
          <div class="gear-stage">
            <div class="gear-viz"></div>
            <div class="ratio-badge"><div class="r empty">\u2014\u2014 : \u2014\u2014</div><div class="lbl">RATIO</div></div>
          </div>
          <div class="channels cols-2"></div>
        </div>
        <div class="status"><div class="status-msg">Enter driver and driven tooth counts.</div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Ratio is driven \u00F7 driver teeth. Above 1 the train trades speed for torque (reduction); below 1 it trades torque for speed. Meshed external gears turn in opposite directions.</span>`));

      const chansEl = panel.querySelector(".channels");
      const vizEl = panel.querySelector(".gear-viz");
      const ratioEl = panel.querySelector(".ratio-badge .r");
      const ratioLbl = panel.querySelector(".ratio-badge .lbl");
      const statusEl = panel.querySelector(".status-msg");

      const defs = [
        { key: "n1", sym: "N\u2081", name: "Driver teeth", unit: "teeth", role: "in" },
        { key: "n2", sym: "N\u2082", name: "Driven teeth", unit: "teeth", role: "in" },
        { key: "win", sym: "\u03C9\u1D62\u2099", name: "Input speed", unit: "RPM", role: "in" },
        { key: "wout", sym: "\u03C9\u2092\u1D64\u209C", name: "Output speed", unit: "RPM", role: "out" },
        { key: "tin", sym: "\u03C4\u1D62\u2099", name: "Input torque", unit: "N\u00B7m", role: "in" },
        { key: "tout", sym: "\u03C4\u2092\u1D64\u209C", name: "Output torque", unit: "N\u00B7m", role: "out" },
      ];
      const chans = {}, raw = {};
      defs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; raw[d.key] = "";
        chansEl.appendChild(c.el);
        if (d.role === "in") c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        const n1 = num("n1"), n2 = num("n2");
        const teethOK = n1 !== undefined && n2 !== undefined && n1 > 0 && n2 > 0;

        ["n1", "n2", "win", "tin"].forEach(k => chInput(chans[k], raw[k]));

        if (!teethOK) {
          ratioEl.textContent = "\u2014\u2014 : \u2014\u2014"; ratioEl.classList.add("empty"); ratioLbl.textContent = "RATIO";
          chPending(chans.wout); chPending(chans.tout);
          drawGears(0, 0);
          statusEl.className = "status-msg";
          statusEl.textContent = (n1 !== undefined && n1 <= 0) || (n2 !== undefined && n2 <= 0) ? "Tooth counts must be greater than 0." : "Enter driver and driven tooth counts.";
          return;
        }

        const ratio = n2 / n1;
        ratioEl.textContent = `${fmt(ratio)} : 1`; ratioEl.classList.remove("empty");
        ratioLbl.textContent = ratio > 1 ? "REDUCTION" : ratio < 1 ? "OVERDRIVE" : "DIRECT 1:1";

        const win = num("win"), tin = num("tin");
        if (win !== undefined) chMeasured(chans.wout, formatSI(win / ratio, "RPM")); else chPending(chans.wout);
        if (tin !== undefined) chMeasured(chans.tout, formatSI(tin * ratio, "N\u00B7m")); else chPending(chans.tout);

        drawGears(n1, n2);
        statusEl.className = "status-msg"; statusEl.textContent = "Meshed. Output turns opposite the driver.";
      }

      function gearGroup(cx, cy, r, N, cls, dir, period, phase) {
        const tl = Math.max(4, r * 0.16);
        const tw = Math.max(2, (2 * Math.PI * r) / N * 0.5);
        let teeth = "";
        const shown = Math.min(N, 160);
        for (let i = 0; i < shown; i++) {
          const ang = phase + i * 360 / shown;
          teeth += `<rect x="${(cx - tw / 2).toFixed(2)}" y="${(cy - r - tl).toFixed(2)}" width="${tw.toFixed(2)}" height="${(tl + 2).toFixed(2)}" rx="1" class="gear-tooth ${cls}" transform="rotate(${ang.toFixed(2)} ${cx} ${cy})"/>`;
        }
        const rot = period > 0 ? `class="gear-rot" style="animation-duration:${period.toFixed(2)}s;animation-direction:${dir}"` : "";
        return `<g ${rot}>
          ${teeth}
          <circle cx="${cx}" cy="${cy}" r="${r}" class="gear-body gear-cap ${cls}" fill="url(#gearGrad)"/>
          <circle cx="${cx}" cy="${cy}" r="${(r * 0.24).toFixed(2)}" class="gear-hub"/>
          <circle cx="${cx}" cy="${cy}" r="${(r * 0.10).toFixed(2)}" class="gear-hole"/>
        </g>`;
      }

      function drawGears(n1, n2) {
        if (!(n1 > 0 && n2 > 0)) {
          vizEl.innerHTML = `<svg class="gear-svg" viewBox="0 0 240 150" role="img" aria-label="No gears yet">
            <circle cx="90" cy="75" r="42" fill="none" stroke="#2E3440" stroke-width="2" stroke-dasharray="4 6"/>
            <circle cx="168" cy="75" r="30" fill="none" stroke="#2E3440" stroke-width="2" stroke-dasharray="4 6"/></svg>`;
          return;
        }
        const N1 = Math.max(1, Math.round(n1)), N2 = Math.max(1, Math.round(n2));
        const k = 78 / Math.max(N1, N2);
        const r1 = N1 * k, r2 = N2 * k;
        const tlPad = 14;
        const cy = Math.max(r1, r2) + tlPad;
        const cx1 = r1 + tlPad, cx2 = cx1 + (r1 + r2);
        const W = cx2 + r2 + tlPad, H = 2 * cy;
        const pDriver = 2.6, pDriven = 2.6 * (N2 / N1);
        vizEl.innerHTML = `<svg class="gear-svg" viewBox="0 0 ${W.toFixed(1)} ${H.toFixed(1)}" role="img" aria-label="Driver ${N1} teeth meshing with driven ${N2} teeth">
          <defs><radialGradient id="gearGrad" cx="40%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#2b3140"/><stop offset="100%" stop-color="#1d222b"/>
          </radialGradient></defs>
          ${gearGroup(cx1, cy, r1, N1, "driver", "normal", pDriver, 0)}
          ${gearGroup(cx2, cy, r2, N2, "driven", "reverse", pDriven, 180 / Math.min(N2, 160))}
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        defs.forEach(d => { raw[d.key] = ""; if (d.role === "in") chEmpty(chans[d.key]); });
        recompute(); chans.n1.input.focus();
      });
      recompute();
    },
  };

  /* ============================================================
     TOOL 3 — BEAM DEFLECTION
     ============================================================ */
  const BeamDeflection = {
    id: "beam",
    discipline: "MECHANICAL",
    title: "Beam deflection calculator",
    subtitle: "Choose a support and load case, size a section, pick a material. The tool returns maximum deflection, moment, and bending stress \u2014 and draws the real elastic curve for the case.",

    mount(root) {
      const MATERIALS = [
        { name: "Structural steel", E: 200 }, { name: "Stainless steel", E: 193 },
        { name: "Aluminium 6061", E: 69 }, { name: "Titanium", E: 116 },
        { name: "Copper", E: 117 }, { name: "Concrete", E: 30 },
        { name: "Timber (pine)", E: 11 }, { name: "Custom", E: null },
      ];

      const st = { beam: "cantilever", load: "point", section: "rect" };
      const raw = { L: "", load: "", b: "", h: "", d: "", I: "", E: "200" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>BEAM ANALYSIS</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">SUPPORT</span>
            <div class="seg" data-group="beam">
              <button data-v="cantilever" class="on">Cantilever</button><button data-v="ss">Simply supported</button>
            </div>
          </div>
          <div class="seg-field"><span class="seg-label">LOAD</span>
            <div class="seg" data-group="load">
              <button data-v="point" class="on">Point</button><button data-v="udl">Distributed</button>
            </div>
          </div>
          <div class="seg-field"><span class="seg-label">SECTION</span>
            <div class="seg" data-group="section">
              <button data-v="rect" class="on">Rectangle</button><button data-v="circle">Circle</button><button data-v="custom">Custom I</button>
            </div>
          </div>
          <div class="seg-field"><span class="seg-label">MATERIAL</span>
            <select class="mat-select"></select>
          </div>
        </div>
        <div class="beam-layout">
          <div class="beam-stage"><div class="beam-viz"></div></div>
          <div class="channels cols-2 beam-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 beam-outputs"></div></div>
        <div class="status"><div class="status-msg">Enter the beam length, load, and section.</div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Section height <b>h</b> and diameter <b>d</b> are measured in the plane the load acts. Custom I is entered in cm\u2074; bending stress needs a rectangle or circle so the tool knows the extreme-fibre distance.</span>`));

      const vizEl = panel.querySelector(".beam-viz");
      const inputsEl = panel.querySelector(".beam-inputs");
      const outsEl = panel.querySelector(".beam-outputs");
      const statusEl = panel.querySelector(".status-msg");
      const matSel = panel.querySelector(".mat-select");

      MATERIALS.forEach((m, i) => { const o = el("option"); o.value = i; o.textContent = m.name + (m.E ? ` \u00B7 ${m.E} GPa` : ""); matSel.appendChild(o); });
      matSel.addEventListener("change", () => {
        const m = MATERIALS[+matSel.value];
        if (m.E != null) { raw.E = String(m.E); if (chans.E) chans.E.input.value = raw.E; }
        recompute();
      });

      // output channels (built once)
      const outDefs = [
        { key: "delta", sym: "\u03B4", name: "Max deflection", unit: "m" },
        { key: "M", sym: "M", name: "Max moment", unit: "N\u00B7m" },
        { key: "sigma", sym: "\u03C3", name: "Bending stress", unit: "Pa" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      // segmented controls
      panel.querySelectorAll(".seg").forEach(seg => {
        const group = seg.dataset.group;
        seg.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            st[group] = btn.dataset.v;
            seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b === btn));
            buildInputs(); recompute();
          });
        });
      });

      function buildInputs() {
        inputsEl.innerHTML = "";
        const list = [{ key: "L", sym: "L", name: "Length", unit: "m" }];
        list.push(st.load === "point"
          ? { key: "load", sym: "P", name: "Load", unit: "N" }
          : { key: "load", sym: "w", name: "Distributed load", unit: "N/m" });
        if (st.section === "rect") list.push({ key: "b", sym: "b", name: "Width", unit: "mm" }, { key: "h", sym: "h", name: "Height", unit: "mm" });
        else if (st.section === "circle") list.push({ key: "d", sym: "d", name: "Diameter", unit: "mm" });
        else list.push({ key: "I", sym: "I", name: "Moment of area", unit: "cm\u2074" });
        list.push({ key: "E", sym: "E", name: "Young's modulus", unit: "GPa" });

        list.forEach(def => {
          const c = makeChannel(def); chans[def.key] = c;
          inputsEl.appendChild(c.el);
          if (raw[def.key]) chInput(c, raw[def.key]); else chEmpty(c);
          c.input.addEventListener("input", e => { raw[def.key] = e.target.value; recompute(); });
        });
      }

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function sectionProps() {
        // returns { I (m^4), c (m|undefined) } or null if incomplete
        if (st.section === "rect") {
          const b = num("b"), h = num("h");
          if (b > 0 && h > 0) return { I: (b * 1e-3) * Math.pow(h * 1e-3, 3) / 12, c: (h * 1e-3) / 2 };
        } else if (st.section === "circle") {
          const d = num("d");
          if (d > 0) return { I: Math.PI * Math.pow(d * 1e-3, 4) / 64, c: (d * 1e-3) / 2 };
        } else {
          const I = num("I");
          if (I > 0) return { I: I * 1e-8, c: undefined }; // cm^4 -> m^4
        }
        return null;
      }

      function recompute() {
        drawBeam();

        const L = num("L"), load = num("load"), Eg = num("E");
        const sec = sectionProps();
        const missing = [];
        if (!(L > 0)) missing.push("length");
        if (!(load > 0)) missing.push("load");
        if (!(Eg > 0)) missing.push("modulus");
        if (!sec) missing.push("section");

        if (missing.length) {
          [chans.delta, chans.M, chans.sigma].forEach(chPending);
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + missing.join(", ") + " to solve.";
          return;
        }

        const E = Eg * 1e9, I = sec.I;
        let delta, M;
        switch (st.beam + "|" + st.load) {
          case "cantilever|point": delta = load * Math.pow(L, 3) / (3 * E * I); M = load * L; break;
          case "cantilever|udl":   delta = load * Math.pow(L, 4) / (8 * E * I); M = load * L * L / 2; break;
          case "ss|point":         delta = load * Math.pow(L, 3) / (48 * E * I); M = load * L / 4; break;
          case "ss|udl":           delta = 5 * load * Math.pow(L, 4) / (384 * E * I); M = load * L * L / 8; break;
        }
        chMeasured(chans.delta, formatSI(delta, "m"));
        chMeasured(chans.M, formatSI(M, "N\u00B7m"));
        if (sec.c !== undefined) chMeasured(chans.sigma, formatSI(M * sec.c / I, "Pa"));
        else chPending(chans.sigma);

        statusEl.className = "status-msg";
        statusEl.textContent = sec.c === undefined
          ? "Solved. Add a rectangle or circle section for bending stress."
          : "Solved.";
        drawBeam(delta);
      }

      // normalized elastic curve, peak = 1
      function shape(u) {
        if (st.beam === "cantilever") {
          return st.load === "point" ? u * u * (3 - u) / 2 : u * u * (u * u - 4 * u + 6) / 3;
        }
        if (st.load === "point") { const v = u <= 0.5 ? u : 1 - u; return v * (3 - 4 * v * v); }
        return 16 * u * (1 - 2 * u * u + u * u * u) / 5;
      }

      function drawBeam(deltaVal) {
        const W = 360, H = 210, x0 = 44, x1 = 320, span = x1 - x0, by = 74, sag = 52;
        const maxAt = (st.beam === "cantilever") ? 1 : 0.5;
        const maxX = x0 + maxAt * span;

        // deflected curve
        let d = "";
        for (let i = 0; i <= 60; i++) { const u = i / 60; d += (i ? "L" : "M") + (x0 + u * span).toFixed(1) + " " + (by + shape(u) * sag).toFixed(1) + " "; }

        // supports
        let supports = "";
        if (st.beam === "cantilever") {
          supports += `<line class="beam-fix" x1="${x0}" y1="${by - 26}" x2="${x0}" y2="${by + 26}"/>`;
          for (let y = by - 24; y < by + 26; y += 8) supports += `<line class="beam-hatch" x1="${x0}" y1="${y}" x2="${x0 - 9}" y2="${y + 9}"/>`;
        } else {
          const tri = (cx) => `<path class="beam-supp-fill" d="M${cx} ${by} L${cx - 9} ${by + 16} L${cx + 9} ${by + 16} Z"/>` +
            `<line class="beam-hatch" x1="${cx - 14}" y1="${by + 16}" x2="${cx + 14}" y2="${by + 16}"/>`;
          supports += tri(x0);
          supports += `<path class="beam-supp-fill" d="M${x1} ${by} L${x1 - 9} ${by + 13} L${x1 + 9} ${by + 13} Z"/>` +
            `<circle class="beam-supp" cx="${x1 - 5}" cy="${by + 16}" r="2.5"/><circle class="beam-supp" cx="${x1 + 5}" cy="${by + 16}" r="2.5"/>` +
            `<line class="beam-hatch" x1="${x1 - 14}" y1="${by + 20}" x2="${x1 + 14}" y2="${by + 20}"/>`;
        }

        // load
        const arrow = (x, y1, y2) => `<line class="beam-load" x1="${x}" y1="${y1}" x2="${x}" y2="${y2}"/><path class="beam-load-head" d="M${x - 4} ${y2 - 6} L${x + 4} ${y2 - 6} L${x} ${y2} Z"/>`;
        let load = "";
        if (st.load === "point") {
          const lx = st.beam === "cantilever" ? x1 : x0 + span / 2;
          load += arrow(lx, by - 40, by - 6);
          load += `<text class="beam-label" x="${lx + 7}" y="${by - 30}">${st.load === "point" ? "P" : "w"}</text>`;
        } else {
          const railY = by - 38;
          load += `<line class="beam-load" x1="${x0}" y1="${railY}" x2="${x1}" y2="${railY}"/>`;
          for (let i = 0; i <= 9; i++) { const lx = x0 + (i / 9) * span; load += arrow(lx, railY, by - 6); }
          load += `<text class="beam-label" x="${x0 + span / 2 - 4}" y="${railY - 6}">w</text>`;
        }

        // deflection dimension marker
        let dim = `<line class="beam-dim" x1="${maxX}" y1="${by}" x2="${maxX}" y2="${(by + sag).toFixed(1)}"/>`;
        dim += `<text class="beam-dim-label" x="${maxX + 8}" y="${by + sag - 4}">${deltaVal !== undefined ? formatSI(deltaVal, "m") : "\u03B4"}</text>`;

        vizEl.innerHTML = `<svg class="beam-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${st.beam} beam under ${st.load} load, deflected shape">
          ${supports}${load}
          <line class="beam-orig" x1="${x0}" y1="${by}" x2="${x1}" y2="${by}"/>
          <path class="beam-curve" d="${d}"/>
          ${dim}
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.keys(raw).forEach(k => raw[k] = k === "E" ? "200" : "");
        matSel.value = "0";
        buildInputs(); recompute();
      });

      buildInputs();
      recompute();
    },
  };

  /* ============================================================
     TOOL 4 — CHAIN PITCH & DRIVE
     ============================================================ */
  const ChainPitch = {
    id: "chain",
    discipline: "MECHANICAL",
    title: "Chain drive calculator",
    subtitle: "Pick a chain size and two sprockets, set a target centre distance. The tool returns chain length in whole even pitches, the exact centre distance that length gives, and both pitch diameters \u2014 and draws the running drive.",

    mount(root) {
      const CHAINS = [
        { name: "ANSI #25", p: 6.35 }, { name: "ANSI #35", p: 9.525 },
        { name: "ANSI #40", p: 12.70 }, { name: "ANSI #50", p: 15.875 },
        { name: "ANSI #60", p: 19.05 }, { name: "ANSI #80", p: 25.40 },
        { name: "ANSI #100", p: 31.75 }, { name: "ANSI #120", p: 38.10 },
        { name: "ISO 08B", p: 12.70 }, { name: "ISO 10B", p: 15.875 },
        { name: "ISO 12B", p: 19.05 }, { name: "ISO 16B", p: 25.40 },
        { name: "Custom", p: null },
      ];

      // demo defaults so the drive is alive on open
      const raw = { p: "12.7", n1: "17", n2: "34", C: "400" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>CHAIN DRIVE</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">CHAIN SIZE</span><select class="mat-select"></select></div>
        </div>
        <div class="chain-layout">
          <div class="chain-stage"><div class="chain-viz"></div></div>
          <div class="channels cols-2 chain-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 chain-outputs"></div></div>
        <div class="status"><div class="status-msg">Set the sprockets and centre distance.</div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Chain length rounds up to a whole even number of pitches (chains join in even links), so the exact centre distance is recomputed from that rounded length. Both sprockets turn the same way \u2014 a chain doesn't reverse direction.</span>`));

      const vizEl = panel.querySelector(".chain-viz");
      const inputsEl = panel.querySelector(".chain-inputs");
      const outsEl = panel.querySelector(".chain-outputs");
      const statusEl = panel.querySelector(".status-msg");
      const chainSel = panel.querySelector(".mat-select");

      CHAINS.forEach((c, i) => { const o = el("option"); o.value = i; o.textContent = c.name + (c.p ? ` \u00B7 ${c.p} mm` : ""); chainSel.appendChild(o); });
      chainSel.value = "2"; // ANSI #40
      chainSel.addEventListener("change", () => {
        const c = CHAINS[+chainSel.value];
        if (c.p != null) { raw.p = String(c.p); if (chans.p) chans.p.input.value = raw.p; }
        recompute();
      });

      // inputs
      const inDefs = [
        { key: "p", sym: "p", name: "Chain pitch", unit: "mm" },
        { key: "C", sym: "C", name: "Target centre", unit: "mm" },
        { key: "n1", sym: "N\u2081", name: "Driver teeth", unit: "teeth" },
        { key: "n2", sym: "N\u2082", name: "Driven teeth", unit: "teeth" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        if (raw[d.key]) chInput(c, raw[d.key]); else chEmpty(c);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      // outputs
      const outDefs = [
        { key: "links", sym: "L", name: "Chain length", unit: "pitches" },
        { key: "lenmm", sym: "L", name: "Chain length", unit: "mm" },
        { key: "Cact", sym: "C", name: "Actual centre", unit: "mm" },
        { key: "pd1", sym: "PD\u2081", name: "Driver pitch dia", unit: "mm" },
        { key: "pd2", sym: "PD\u2082", name: "Driven pitch dia", unit: "mm" },
        { key: "ratio", sym: "i", name: "Speed ratio", unit: ": 1" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const PD = (p, N) => p / Math.sin(Math.PI / N);

      function recompute() {
        const p = num("p"), C = num("C");
        const N1 = num("n1"), N2 = num("n2");
        const n1ok = N1 >= 3, n2ok = N2 >= 3, pok = p > 0;

        // pitch diameters + ratio need only pitch + teeth
        const pd1 = (pok && n1ok) ? PD(p, Math.round(N1)) : undefined;
        const pd2 = (pok && n2ok) ? PD(p, Math.round(N2)) : undefined;
        pd1 !== undefined ? chMeasured(chans.pd1, formatSI(pd1 / 1000, "m")) : chPending(chans.pd1);
        pd2 !== undefined ? chMeasured(chans.pd2, formatSI(pd2 / 1000, "m")) : chPending(chans.pd2);
        (n1ok && n2ok) ? chMeasured(chans.ratio, `${fmt(N2 / N1)} : 1`) : chPending(chans.ratio);

        // chain length + exact centre need everything
        let Cact;
        if (pok && n1ok && n2ok && C > 0) {
          const a = Math.round(N1), b = Math.round(N2);
          if (C <= (pd1 + pd2) / 2) {
            [chans.links, chans.lenmm, chans.Cact].forEach(chPending);
            statusEl.className = "status-msg error";
            statusEl.textContent = "Centre distance is smaller than the sprockets \u2014 increase it.";
            drawChain(p, a, b, pd1, pd2, undefined);
            return;
          }
          const term = Math.pow((b - a) / (2 * Math.PI), 2) * (p / C);
          const Lraw = 2 * (C / p) + (a + b) / 2 + term;
          const L = 2 * Math.ceil(Lraw / 2); // round up to even pitches
          const A = L - (a + b) / 2;
          Cact = (p / 4) * (A + Math.sqrt(A * A - 2 * Math.pow(b - a, 2) / (Math.PI * Math.PI)));
          chMeasured(chans.links, `${L}`);
          chMeasured(chans.lenmm, formatSI((L * p) / 1000, "m"));
          chMeasured(chans.Cact, formatSI(Cact / 1000, "m"));
          statusEl.className = "status-msg";
          statusEl.textContent = "Solved.";
        } else {
          [chans.links, chans.lenmm, chans.Cact].forEach(chPending);
          statusEl.className = "status-msg";
          const need = [];
          if (!pok) need.push("pitch");
          if (!n1ok || !n2ok) need.push("both sprockets (\u2265 3 teeth)");
          if (!(C > 0)) need.push("centre distance");
          statusEl.textContent = need.length ? "Add the " + need.join(", ") + " to solve." : "Solved.";
        }

        drawChain(pok ? p : undefined, n1ok ? Math.round(N1) : undefined, n2ok ? Math.round(N2) : undefined, pd1, pd2, Cact !== undefined ? Cact : C);
      }

      function sprocketGroup(cx, cy, r, N, cls, period) {
        const tl = Math.max(3, r * 0.14);
        const tw = Math.max(2, (2 * Math.PI * r) / N * 0.55);
        let teeth = "";
        const shown = Math.min(N, 90);
        for (let i = 0; i < shown; i++) {
          const ang = i * 360 / shown;
          teeth += `<rect x="${(cx - tw / 2).toFixed(2)}" y="${(cy - r - tl).toFixed(2)}" width="${tw.toFixed(2)}" height="${(tl + 2).toFixed(2)}" rx="1" class="sprocket-tooth ${cls}" transform="rotate(${ang.toFixed(2)} ${cx} ${cy})"/>`;
        }
        return `<g class="gear-rot" style="animation-duration:${period.toFixed(2)}s">
          ${teeth}
          <circle cx="${cx}" cy="${cy}" r="${r}" class="sprocket-body" fill="url(#sprGrad)"/>
          <circle cx="${cx}" cy="${cy}" r="${(r * 0.24).toFixed(2)}" class="sprocket-hub"/>
          <circle cx="${cx}" cy="${cy}" r="${(r * 0.10).toFixed(2)}" class="sprocket-hole"/>
        </g>`;
      }

      // closed chain loop around two circles (external tangents + wraps)
      function loopPath(cx1, cy, r1, cx2, r2) {
        const d = cx2 - cx1;
        const a = (r2 - r1) / d, bb = Math.sqrt(Math.max(0, 1 - a * a));
        const T = (cx, r, s) => [cx - r * a, cy - r * (s * bb)];
        const T1t = T(cx1, r1, 1), T1b = T(cx1, r1, -1), T2t = T(cx2, r2, 1), T2b = T(cx2, r2, -1);
        const ang = (pt, cx) => Math.atan2(pt[1] - cy, pt[0] - cx);
        const arc = (cx, r, s, e, thr) => {
          const norm = x => { while (x < 0) x += 2 * Math.PI; while (x >= 2 * Math.PI) x -= 2 * Math.PI; return x; };
          s = norm(s); e = norm(e); thr = norm(thr);
          const ccw = norm(e - s);
          const useCcw = norm(thr - s) <= ccw;
          const len = useCcw ? ccw : ccw - 2 * Math.PI;
          const pts = [];
          for (let i = 0; i <= 24; i++) { const t = s + len * (i / 24); pts.push([cx + r * Math.cos(t), cy + r * Math.sin(t)]); }
          return pts;
        };
        const left = arc(cx1, r1, ang(T1b, cx1), ang(T1t, cx1), Math.PI);
        const right = arc(cx2, r2, ang(T2t, cx2), ang(T2b, cx2), 0);
        const pts = left.concat(right);
        return "M" + pts.map(q => `${q[0].toFixed(1)} ${q[1].toFixed(1)}`).join(" L") + " Z";
      }

      function drawChain(p, N1, N2, pd1, pd2, Cmm) {
        const W = 360, H = 220, pad = 22, cy = H / 2;
        if (!(p > 0 && N1 && N2 && pd1 && pd2 && Cmm > 0)) {
          vizEl.innerHTML = `<svg class="chain-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Chain drive preview">
            <path class="chain-ghost" d="M120 70 L240 70 A40 40 0 0 1 240 150 L120 150 A40 40 0 0 1 120 70 Z"/>
            <circle cx="120" cy="110" r="34" fill="none" stroke="#2E3440" stroke-width="2" stroke-dasharray="4 6"/>
            <circle cx="240" cy="110" r="34" fill="none" stroke="#2E3440" stroke-width="2" stroke-dasharray="4 6"/></svg>`;
          return;
        }
        const r1mm = pd1 / 2, r2mm = pd2 / 2;
        const worldW = Cmm + r1mm + r2mm, worldH = 2 * Math.max(r1mm, r2mm);
        const tl = 1.16; // tooth allowance factor
        const scale = Math.min((W - 2 * pad) / (worldW * tl), (H - 2 * pad) / (worldH * tl));
        const r1 = r1mm * scale, r2 = r2mm * scale, Cpx = Cmm * scale;
        const cx1 = pad + Math.max(r1, r2) * (tl - 1) + r1;
        const cx2 = cx1 + Cpx;
        const per1 = 0.18 * N1, per2 = 0.18 * N2;
        vizEl.innerHTML = `<svg class="chain-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${N1}-tooth driver and ${N2}-tooth driven sprocket, chain running">
          <defs><radialGradient id="sprGrad" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#2b3140"/><stop offset="100%" stop-color="#1d222b"/></radialGradient></defs>
          <path class="chain-guide" d="${loopPath(cx1, cy, r1, cx2, r2)}"/>
          <path class="chain-roller" d="${loopPath(cx1, cy, r1, cx2, r2)}"/>
          ${sprocketGroup(cx1, cy, r1, N1, "driver", per1)}
          ${sprocketGroup(cx2, cy, r2, N2, "driven", per2)}
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        raw.n1 = ""; raw.n2 = ""; raw.C = "";
        chEmpty(chans.n1); chEmpty(chans.n2); chEmpty(chans.C);
        recompute(); chans.n1.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 5 — VOLTAGE DIVIDER
     ============================================================ */
  const VoltageDivider = {
    id: "vdiv",
    discipline: "ELECTRICAL",
    title: "Voltage divider calculator",
    subtitle: "Vout is tapped between two series resistors. Enter any three of Vin, Vout, R1, R2 and the tool solves the fourth \u2014 then gives the divider current and the power each resistor must handle.",

    mount(root) {
      const Q = [
        { key: "Vin", sym: "Vin", name: "Input voltage", unit: "V" },
        { key: "Vout", sym: "Vout", name: "Output voltage", unit: "V" },
        { key: "R1", sym: "R1", name: "Top resistor", unit: "\u03A9" },
        { key: "R2", sym: "R2", name: "Bottom resistor", unit: "\u03A9" },
      ];

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>DIVIDER</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="vd-layout">
          <div class="vd-stage"><div class="vd-viz"></div></div>
          <div class="channels cols-2 vd-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 vd-outputs"></div></div>
        <div class="status"><div class="status-msg">Enter any three values.</div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>A passive divider only attenuates, so Vout is always at or below Vin. Power figures are the steady dissipation in each resistor with no load on the tap \u2014 pick parts rated above them.</span>`));

      const vizEl = panel.querySelector(".vd-viz");
      const inputsEl = panel.querySelector(".vd-inputs");
      const outsEl = panel.querySelector(".vd-outputs");
      const statusEl = panel.querySelector(".status-msg");

      const chans = {}, raw = {};
      let inputOrder = [];

      Q.forEach(q => {
        const c = makeChannel(q); chans[q.key] = c; raw[q.key] = "";
        inputsEl.appendChild(c.el);
        c.input.addEventListener("input", e => onType(q.key, e.target.value));
        c.value.addEventListener("click", () => takeOver(q.key));
      });

      const outDefs = [
        { key: "I", sym: "I", name: "Divider current", unit: "A" },
        { key: "P1", sym: "P1", name: "Power in R1", unit: "W" },
        { key: "P2", sym: "P2", name: "Power in R2", unit: "W" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      function onType(key, val) {
        raw[key] = val;
        if (val.trim() === "") inputOrder = inputOrder.filter(k => k !== key);
        else if (!inputOrder.includes(key)) {
          inputOrder.push(key);
          if (inputOrder.length > 3) raw[inputOrder.shift()] = "";
        }
        recompute();
      }
      function takeOver(key) {
        if (!inputOrder.includes(key)) { inputOrder.push(key); if (inputOrder.length > 3) raw[inputOrder.shift()] = ""; }
        chInput(chans[key], raw[key] || "");
        chans[key].input.focus(); chans[key].input.select();
        recompute();
      }
      const num = (k) => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const bad = (t) => { const e = new Error(t); e.friendly = true; return e; };

      function solve(unknown) {
        const V = num("Vin"), o = num("Vout"), R1 = num("R1"), R2 = num("R2");
        const known = { Vin: V, Vout: o, R1, R2 };
        let out = {};
        switch (unknown) {
          case "Vout":
            if (R1 + R2 === 0) throw bad("R1 and R2 can't both be 0.");
            if (R1 < 0 || R2 < 0) throw bad("Resistances can't be negative.");
            out.Vout = V * R2 / (R1 + R2); break;
          case "Vin":
            if (R2 === 0) throw bad("R2 can't be 0 when solving the input \u2014 the tap would read nothing.");
            if (R1 < 0 || R2 < 0) throw bad("Resistances can't be negative.");
            out.Vin = o * (R1 + R2) / R2; break;
          case "R1":
            if (o === 0) throw bad("Output can't be 0 when solving R1.");
            if (V < o) throw bad("Output can't exceed the input in a passive divider.");
            out.R1 = R2 * (V - o) / o; break;
          case "R2":
            if (V === o) throw bad("Input and output can't be equal when solving R2 \u2014 that needs R2 to be infinite.");
            if (V < o) throw bad("Output can't exceed the input in a passive divider.");
            out.R2 = R1 * o / (V - o); break;
        }
        for (const k in out) if (!isFinite(out[k]) || out[k] < 0) throw bad("That combination doesn't give a real, positive value.");
        return { ...known, ...out };
      }

      function recompute() {
        if (inputOrder.length < 3) {
          Q.forEach(q => inputOrder.includes(q.key) ? chInput(chans[q.key], raw[q.key]) : chEmpty(chans[q.key]));
          [chans.I, chans.P1, chans.P2].forEach(chPending);
          statusEl.className = "status-msg";
          statusEl.textContent = inputOrder.length === 2 ? "One more value and it solves." : "Enter any three values.";
          drawDivider(currentVals(), currentStates());
          return;
        }
        const unknown = Q.map(q => q.key).find(k => !inputOrder.includes(k));
        let res;
        try { res = solve(unknown); }
        catch (err) {
          [chans.I, chans.P1, chans.P2].forEach(chPending);
          Q.forEach(q => inputOrder.includes(q.key) ? chInput(chans[q.key], raw[q.key]) : chPending(chans[q.key]));
          statusEl.className = "status-msg error";
          statusEl.textContent = err.friendly ? err.message : "Check your inputs.";
          drawDivider(currentVals(), currentStates());
          return;
        }
        Q.forEach(q => {
          if (inputOrder.includes(q.key)) chInput(chans[q.key], raw[q.key]);
          else { chMeasured(chans[q.key], formatSI(res[q.key], q.unit)); raw[q.key] = trimNumber(res[q.key]); }
        });

        const I = res.Vin / (res.R1 + res.R2);
        if (isFinite(I)) {
          chMeasured(chans.I, formatSI(I, "A"));
          chMeasured(chans.P1, formatSI(I * I * res.R1, "W"));
          chMeasured(chans.P2, formatSI(I * I * res.R2, "W"));
        } else [chans.I, chans.P1, chans.P2].forEach(chPending);

        statusEl.className = "status-msg"; statusEl.textContent = "Solved.";
        drawDivider(res, currentStates());
      }

      function currentVals() { return { Vin: num("Vin"), Vout: num("Vout"), R1: num("R1"), R2: num("R2") }; }
      function currentStates() {
        const s = {};
        Q.forEach(q => s[q.key] = inputOrder.includes(q.key) ? "input" : (chans[q.key].el.dataset.state === "measured" ? "measured" : "empty"));
        return s;
      }

      // ---- schematic ----
      function zig(x, y1, y2, amp) {
        const n = 6, h = y2 - y1, pts = [[x, y1]];
        for (let i = 0; i < n; i++) pts.push([x + (i % 2 === 0 ? amp : -amp), y1 + h * ((i + 0.5) / n)]);
        pts.push([x, y2]);
        return pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
      }
      function drawDivider(vals, states) {
        const cx = 92, W = 240, H = 250;
        const solved = states.Vin !== "empty" && states.Vout !== "empty" && states.R1 !== "empty" && states.R2 !== "empty";
        const col = s => s === "measured" ? "var(--cyan)" : s === "input" ? "var(--amber)" : "#5a6270";
        const val = (k, u) => vals[k] !== undefined ? formatSI(vals[k], u) : "\u2014";

        // one continuous conductor: top -> R1 -> node -> R2 -> ground wire
        const path = `M${cx} 24 L${cx} 54 ` + zig(cx, 54, 108, 9) + ` L${cx} 138 ` + zig(cx, 138, 192, 9) + ` L${cx} 214`;

        vizEl.innerHTML = `<svg class="vd-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Voltage divider schematic">
          <path class="vd-conductor" d="${path}"/>
          ${solved ? `<path class="vd-flow" d="${path}"/>` : ""}
          <line class="vd-tap" x1="${cx}" y1="123" x2="176" y2="123"/>
          <circle class="vd-node" cx="${cx}" cy="123" r="3.4"/>
          <circle class="vd-term" cx="182" cy="123" r="5"/>

          <line class="vd-conductor" x1="${cx - 10}" y1="24" x2="${cx + 10}" y2="24"/>
          <line class="vd-gnd" x1="${cx - 13}" y1="214" x2="${cx + 13}" y2="214"/>
          <line class="vd-gnd" x1="${cx - 8}" y1="220" x2="${cx + 8}" y2="220"/>
          <line class="vd-gnd" x1="${cx - 4}" y1="226" x2="${cx + 4}" y2="226"/>

          <text class="vd-cap" x="${cx - 34}" y="16">SOURCE</text>
