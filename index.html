        statusEl.className = "status-msg";
        statusEl.textContent = `n = ${vars.length} variable${vars.length === 1 ? "" : "s"}, rank = ${rank} → ${k} dimensionless group${k === 1 ? "" : "s"}.`;
      }

      function recompute() { st.mode === "verify" ? verifyRecompute() : deriveRecompute(); }

      function buildBody() {
        targetWrap.style.display = st.mode === "verify" ? "flex" : "none";
        if (st.mode === "verify") renderTarget();
        buildTable();
        recompute();
      }

      panel.querySelectorAll(".seg button").forEach(btn => btn.addEventListener("click", () => {
        st.mode = btn.dataset.v;
        panel.querySelectorAll(".seg button").forEach(b => b.classList.toggle("on", b === btn));
        buildBody();
      }));

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        varsByMode.verify = freshVerifyVars();
        varsByMode.derive = freshDeriveVars();
        target = freshTarget();
        buildBody();
      });

      buildBody();
    },
  };

  /* ============================================================
     TOOL 14 — MOTOR TORQUE & SPEED
     ============================================================ */
  const MotorTorque = {
    id: "mtorque",
    discipline: "MOTORS & DRIVES",
    title: "Motor torque & speed calculator",
    subtitle: "Enter any two of power, speed, and torque — the third solves instantly. Toggle between metric and imperial units.",

    mount(root) {
      const st = { unit: "metric" };
      const raw = { P: "15", N: "1450", T: "" };
      let inputOrder = ["P", "N"];
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>MOTOR SHAFT</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">UNITS</span>
            <div class="seg" data-group="unit"><button data-v="metric" class="on">Metric · kW·N·m</button><button data-v="imperial">Imperial · hp·lb·ft</button></div>
          </div>
        </div>
        <div class="gear-layout">
          <div class="gear-stage"><div class="motor-viz"></div></div>
          <div class="channels cols-2 mtorque-channels"></div>
        </div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>T = 9549.3×P/N (metric, P in kW) or T = 5252×P/N (imperial, P in hp). Speed is shaft RPM in both systems. Switching units converts the values you've already entered.</span>`));

      const vizEl = panel.querySelector(".motor-viz");
      const chansEl = panel.querySelector(".mtorque-channels");
      const statusEl = panel.querySelector(".status-msg");

      function defs() {
        return st.unit === "metric"
          ? [{ key: "P", sym: "P", name: "Power", unit: "kW" }, { key: "N", sym: "N", name: "Speed", unit: "RPM" }, { key: "T", sym: "T", name: "Torque", unit: "N·m" }]
          : [{ key: "P", sym: "P", name: "Power", unit: "hp" }, { key: "N", sym: "N", name: "Speed", unit: "RPM" }, { key: "T", sym: "T", name: "Torque", unit: "lb·ft" }];
      }

      function buildChannels() {
        chansEl.innerHTML = "";
        defs().forEach(d => {
          const c = makeChannel(d); chans[d.key] = c; chansEl.appendChild(c.el);
          c.input.addEventListener("input", e => onType(d.key, e.target.value));
          c.value.addEventListener("click", () => takeOver(d.key));
        });
      }

      function onType(key, val) {
        raw[key] = val;
        if (val.trim() === "") inputOrder = inputOrder.filter(k => k !== key);
        else if (!inputOrder.includes(key)) { inputOrder.push(key); if (inputOrder.length > 2) raw[inputOrder.shift()] = ""; }
        recompute();
      }
      function takeOver(key) {
        if (!inputOrder.includes(key)) { inputOrder.push(key); if (inputOrder.length > 2) raw[inputOrder.shift()] = ""; }
        chInput(chans[key], raw[key] || "");
        chans[key].input.focus(); chans[key].input.select();
        recompute();
      }
      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const KCONST = () => st.unit === "metric" ? 9549.3 : 5252;

      function recompute() {
        const keys = ["P", "N", "T"];
        if (inputOrder.length < 2) {
          keys.forEach(k => inputOrder.includes(k) ? chInput(chans[k], raw[k]) : chEmpty(chans[k]));
          statusEl.className = "status-msg";
          statusEl.textContent = inputOrder.length === 1 ? "One more value and it solves." : "Enter two values to begin.";
          drawMotor(null);
          return;
        }
        const [a, b] = inputOrder;
        const P = num("P"), N = num("N"), T = num("T");
        const K = KCONST();
        const result = {};
        try {
          const pair = [a, b].sort().join("");
          if (pair === "NP") { if (!(N > 0)) throw new Error("Speed must be greater than 0."); result.T = K * P / N; }
          else if (pair === "NT") { if (!(N > 0)) throw new Error("Speed must be greater than 0."); result.P = T * N / K; }
          else { if (!(T > 0)) throw new Error("Torque must be greater than 0."); result.N = K * P / T; }
          for (const k in result) if (!isFinite(result[k]) || result[k] < 0) throw new Error("That combination doesn't resolve to a real value.");
        } catch (err) {
          statusEl.className = "status-msg error"; statusEl.textContent = err.message;
          drawMotor(null);
          return;
        }
        const vals = { P, N, T, ...result };
        keys.forEach(k => {
          if (inputOrder.includes(k)) chInput(chans[k], raw[k]);
          else { chMeasured(chans[k], String(fmt(vals[k]))); raw[k] = trimNumber(vals[k]); }
        });
        statusEl.className = "status-msg";
        statusEl.textContent = "Solved.";
        drawMotor(vals.N);
      }

      function drawMotor(N) {
        const spin = N > 0;
        const dur = spin ? Math.max(0.3, Math.min(4, 200 / N)) : 0;
        const rot = spin ? `class="gear-rot" style="animation-duration:${dur.toFixed(2)}s"` : "";
        vizEl.innerHTML = `<svg class="motor-svg" viewBox="0 0 200 160" role="img" aria-label="${spin ? "Motor shaft turning" : "Motor, no speed set"}">
          <circle cx="100" cy="80" r="58" class="motor-body"/>
          <circle cx="100" cy="80" r="42" class="motor-rotor"/>
          <g ${rot}>
            <line x1="100" y1="80" x2="100" y2="40" class="motor-key"/>
            <line x1="100" y1="80" x2="132" y2="98" class="motor-key"/>
            <line x1="100" y1="80" x2="68" y2="98" class="motor-key"/>
          </g>
          <circle cx="100" cy="80" r="9" class="motor-hub"/>
        </svg>`;
      }

      panel.querySelectorAll(".seg button").forEach(btn => btn.addEventListener("click", () => {
        const newUnit = btn.dataset.v;
        if (newUnit !== st.unit) {
          const toImperial = newUnit === "imperial";
          if (raw.P.trim() !== "") { const v = parseFloat(raw.P); if (!Number.isNaN(v)) raw.P = trimNumber(toImperial ? v / 0.7457 : v * 0.7457); }
          if (raw.T.trim() !== "") { const v = parseFloat(raw.T); if (!Number.isNaN(v)) raw.T = trimNumber(toImperial ? v / 1.35582 : v * 1.35582); }
        }
        st.unit = newUnit;
        panel.querySelectorAll(".seg button").forEach(b => b.classList.toggle("on", b === btn));
        buildChannels();
        inputOrder.forEach(k => chInput(chans[k], raw[k]));
        recompute();
      }));

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        inputOrder = []; ["P", "N", "T"].forEach(k => { raw[k] = ""; chEmpty(chans[k]); });
        statusEl.className = "status-msg"; statusEl.textContent = "Enter two values to begin.";
        drawMotor(null);
        chans.P.input.focus();
      });

      buildChannels();
      recompute();
    },
  };

  /* ============================================================
     TOOL 15 — MOTOR FLA & INRUSH
     ============================================================ */
  const MotorFLA = {
    id: "mfla",
    discipline: "MOTORS & DRIVES",
    title: "Motor FLA & inrush calculator",
    subtitle: "Estimate full-load current from power, voltage, power factor, and efficiency, then apply a starting multiplier for locked-rotor (inrush) current.",

    mount(root) {
      const st = { phase: "3ph", unit: "kw" };
      const raw = { P: "15", V: "400", PF: "0.85", eff: "90", mult: "6.5" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>MOTOR CURRENT</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">SUPPLY</span>
            <div class="seg" data-group="phase"><button data-v="3ph" class="on">3-Phase</button><button data-v="1ph">1-Phase</button></div>
          </div>
          <div class="seg-field"><span class="seg-label">POWER UNIT</span>
            <div class="seg" data-group="unit"><button data-v="kw" class="on">kW</button><button data-v="hp">hp</button></div>
          </div>
        </div>
        <div class="fla-layout">
          <div class="fla-stage"><div class="fla-viz"></div></div>
          <div class="channels cols-2 fla-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-4 fla-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>FLA = P ÷ (η·√3·V·PF) for 3-phase, or P ÷ (η·V·PF) for 1-phase — a physics estimate, not a substitute for the motor's nameplate FLA when sizing conductors or overloads. Inrush multipliers typically run 5–10× FLA for direct-on-line starts; VFDs and soft starters cut this dramatically.</span>`));

      const vizEl = panel.querySelector(".fla-viz");
      const inputsEl = panel.querySelector(".fla-inputs");
      const outsEl = panel.querySelector(".fla-outputs");
      const statusEl = panel.querySelector(".status-msg");

      const inDefs = [
        { key: "P", sym: "P", name: "Motor power", unit: "kW" },
        { key: "V", sym: "V", name: "Line voltage", unit: "V" },
        { key: "PF", sym: "PF", name: "Power factor", unit: "0–1" },
        { key: "eff", sym: "η", name: "Efficiency", unit: "%" },
        { key: "mult", sym: "×", name: "Starting multiplier", unit: "× FLA" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        chInput(c, raw[d.key]);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "fla", sym: "FLA", name: "Full-load current", unit: "A" },
        { key: "inrush", sym: "LRA", name: "Inrush current", unit: "A" },
        { key: "kva", sym: "S", name: "Apparent power", unit: "kVA" },
        { key: "pin", sym: "Pin", name: "Input power", unit: "kW" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      function updateUnitLabel() {
        chans.P.el.querySelector(".ch-unit").innerHTML = `<b>Motor power</b> · ${st.unit === "kw" ? "kW" : "hp"}`;
        chans.P.input.setAttribute("aria-label", `Motor power in ${st.unit === "kw" ? "kW" : "hp"}`);
      }

      panel.querySelectorAll(".seg").forEach(seg => {
        const group = seg.dataset.group;
        seg.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
          if (group === "unit" && btn.dataset.v !== st.unit) {
            const v = parseFloat(raw.P);
            if (!Number.isNaN(v)) raw.P = trimNumber(btn.dataset.v === "hp" ? v / 0.7457 : v * 0.7457);
          }
          st[group] = btn.dataset.v;
          seg.querySelectorAll("button").forEach(b => b.classList.toggle("on", b === btn));
          if (group === "unit") { updateUnitLabel(); chInput(chans.P, raw.P); }
          recompute();
        }));
      });

      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        inDefs.forEach(d => chInput(chans[d.key], raw[d.key]));
        const P = num("P"), V = num("V"), PF = num("PF"), eff = num("eff"), mult = num("mult");
        const need = [];
        if (!(P > 0)) need.push("power");
        if (!(V > 0)) need.push("voltage");
        if (!(PF > 0 && PF <= 1)) need.push("power factor (0–1)");
        if (!(eff > 0 && eff <= 100)) need.push("efficiency (0–100%)");

        if (need.length) {
          outDefs.forEach(d => chPending(chans[d.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawMeter(null);
          return;
        }

        const Pw = P * (st.unit === "kw" ? 1000 : 745.7);
        const etaF = eff / 100;
        const FLA = st.phase === "3ph" ? Pw / (etaF * Math.sqrt(3) * V * PF) : Pw / (etaF * V * PF);
        const kva = (st.phase === "3ph" ? Math.sqrt(3) * V * FLA : V * FLA) / 1000;
        const pin = Pw / etaF / 1000;

        chMeasured(chans.fla, formatSI(FLA, "A"));
        chMeasured(chans.kva, formatSI(kva * 1000, "VA"));
        chMeasured(chans.pin, formatSI(pin * 1000, "W"));

        if (mult > 0) {
          chMeasured(chans.inrush, formatSI(FLA * mult, "A"));
          statusEl.className = "status-msg";
          statusEl.textContent = `FLA = ${formatSI(FLA, "A")} · inrush = ${fmt(mult)}× FLA`;
        } else {
          chPending(chans.inrush);
          statusEl.className = "status-msg";
          statusEl.textContent = `FLA = ${formatSI(FLA, "A")}. Add a starting multiplier for inrush.`;
        }

        drawMeter({ fla: FLA, inrush: mult > 0 ? FLA * mult : undefined });
      }

      function drawMeter(vals) {
        const W = 300, H = 190, x0 = 30, x1 = 280, base = 160, top = 30;
        if (!vals) {
          vizEl.innerHTML = `<svg class="fla-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No current set yet">
            <line class="fla-axis" x1="${x0}" y1="${base}" x2="${x1}" y2="${base}"/>
          </svg>`;
          return;
        }
        const peak = vals.inrush || vals.fla;
        const scale = (base - top) / (peak * 1.15);
        const flaY = base - vals.fla * scale;
        const inrushY = vals.inrush !== undefined ? base - vals.inrush * scale : flaY;
        const tStart = 70, tRun = 130;
        const d = `M${x0} ${base} L${tStart} ${base} ` +
          (vals.inrush !== undefined ? `L${tStart} ${inrushY.toFixed(1)} L${tRun} ${inrushY.toFixed(1)} L${tRun} ${flaY.toFixed(1)} ` : `L${tStart} ${flaY.toFixed(1)} `) +
          `L${x1} ${flaY.toFixed(1)}`;
        vizEl.innerHTML = `<svg class="fla-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Current versus time, inrush then full load">
          <line class="fla-axis" x1="${x0}" y1="${base}" x2="${x1}" y2="${base}"/>
          <line class="fla-dash" x1="${x0}" y1="${flaY.toFixed(1)}" x2="${x1}" y2="${flaY.toFixed(1)}"/>
          <path class="fla-curve" d="${d}"/>
          <text class="fla-lbl" x="${x0}" y="${(flaY - 8).toFixed(1)}">FLA · ${formatSI(vals.fla, "A")}</text>
          ${vals.inrush !== undefined ? `<text class="fla-lbl fla-lbl-hi" x="${tStart + 4}" y="${(inrushY - 8).toFixed(1)}">INRUSH · ${formatSI(vals.inrush, "A")}</text>` : ""}
          <text class="fla-axis-lbl" x="${(x0 + x1) / 2}" y="${base + 18}" text-anchor="middle">TIME → (START-UP THEN RUN)</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { P: "", V: "", PF: "", eff: "", mult: "" });
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.P.input.focus();
      });

      updateUnitLabel();
      recompute();
    },
  };

  /* ============================================================
     TOOL 16 — VFD CABLE SIZING
     ============================================================ */
  const VFDCable = {
    id: "vfdcable",
    discipline: "MOTORS & DRIVES",
    title: "VFD cable sizing calculator",
    subtitle: "Size motor-side conductors for a VFD using the NEC 125% continuous-duty rule, then check the voltage drop over the run.",

    mount(root) {
      const GOOD = "#45D4C4", HIGH = "#ff7a45";
      const RHO = { cu: 1.724e-8, al: 2.826e-8 };
      const WIRE_COL = { cu: "#c98a3a", al: "#b9bec7" };
      const AWG = [
        { label: "14 AWG", n: 14, cu: 20, al: null }, { label: "12 AWG", n: 12, cu: 25, al: 20 },
        { label: "10 AWG", n: 10, cu: 35, al: 30 }, { label: "8 AWG", n: 8, cu: 50, al: 40 },
        { label: "6 AWG", n: 6, cu: 65, al: 50 }, { label: "4 AWG", n: 4, cu: 85, al: 65 },
        { label: "3 AWG", n: 3, cu: 100, al: 75 }, { label: "2 AWG", n: 2, cu: 115, al: 90 },
        { label: "1 AWG", n: 1, cu: 130, al: 100 }, { label: "1/0 AWG", n: -1, cu: 150, al: 120 },
        { label: "2/0 AWG", n: -2, cu: 175, al: 135 }, { label: "3/0 AWG", n: -3, cu: 200, al: 155 },
        { label: "4/0 AWG", n: -4, cu: 230, al: 180 },
      ];
      const awgArea = n => { const d = 0.127 * Math.pow(92, (36 - n) / 39); return Math.PI / 4 * d * d; };

      const st = { mat: "cu" };
      const raw = { I: "40", L: "60", Vs: "480" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>VFD FEEDER</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">CONDUCTOR</span>
            <div class="seg" data-group="mat"><button data-v="cu" class="on">Copper</button><button data-v="al">Aluminium</button></div>
          </div>
        </div>
        <div class="wd-layout">
          <div class="wd-stage">
            <div class="wd-viz"></div>
            <div class="re-badge"><div class="re-cap">RECOMMENDED SIZE</div><div class="re-num">—</div><div class="re-regime"></div></div>
          </div>
          <div class="channels cols-2 vfd-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 vfd-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>NEC 430.122 requires VFD output conductors sized for at least 125% of the drive's rated current. Assumes a 3-phase motor feeder and 75°C THHN/THWN ampacity — confirm against the drive and motor nameplates and local code. PWM switching can also cause reflected-wave voltage spikes on long runs; check the drive manual for its maximum recommended cable length.</span>`));

      const vizEl = panel.querySelector(".wd-viz");
      const numEl = panel.querySelector(".re-num");
      const regEl = panel.querySelector(".re-regime");
      const inputsEl = panel.querySelector(".vfd-inputs");
      const outsEl = panel.querySelector(".vfd-outputs");
      const statusEl = panel.querySelector(".status-msg");

      const inDefs = [
        { key: "I", sym: "I", name: "Rated current", unit: "A" },
        { key: "L", sym: "L", name: "Run length", unit: "m" },
        { key: "Vs", sym: "Vs", name: "Source voltage", unit: "V" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        chInput(c, raw[d.key]);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "req", sym: "1.25I", name: "Min. ampacity", unit: "A" },
        { key: "vd", sym: "ΔV", name: "Voltage drop", unit: "V" },
        { key: "vl", sym: "Vₗ", name: "Voltage at motor", unit: "V" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      panel.querySelectorAll(".seg button").forEach(btn => btn.addEventListener("click", () => {
        st.mat = btn.dataset.v;
        panel.querySelectorAll(".seg button").forEach(b => b.classList.toggle("on", b === btn));
        recompute();
      }));

      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        inDefs.forEach(d => chInput(chans[d.key], raw[d.key]));
        const I = num("I"), L = num("L"), Vs = num("Vs");
        const need = [];
        if (!(I > 0)) need.push("rated current");
        if (!(L > 0)) need.push("run length");

        if (need.length) {
          outDefs.forEach(d => chPending(chans[d.key]));
          numEl.textContent = "—"; numEl.style.color = "#5a6270"; regEl.textContent = "";
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawWire(null);
          return;
        }

        const req = 1.25 * I;
        chMeasured(chans.req, formatSI(req, "A"));

        const pick = AWG.find(g => g[st.mat] !== null && g[st.mat] >= req);
        if (!pick) {
          numEl.textContent = "> 4/0"; numEl.style.color = HIGH; regEl.textContent = "OUT OF TABLE RANGE";
          [chans.vd, chans.vl].forEach(chPending);
          statusEl.className = "status-msg error";
          statusEl.textContent = "Needs more ampacity than 4/0 AWG provides — consider paralleled conductors.";
          drawWire(null);
          return;
        }

        numEl.textContent = pick.label; numEl.style.color = GOOD;
        regEl.textContent = `${pick[st.mat]} A ≥ ${fmt(req)} A REQUIRED`;

        const area = awgArea(pick.n) * 1e-6;
        const Vdrop = Math.sqrt(3) * I * RHO[st.mat] * L / area;
        chMeasured(chans.vd, formatSI(Vdrop, "V"));

        if (Vs > 0) {
          const pct = Vdrop / Vs * 100;
          chMeasured(chans.vl, formatSI(Vs - Vdrop, "V"));
          statusEl.className = "status-msg";
          statusEl.textContent = `${pick.label} · ΔV = ${formatSI(Vdrop, "V")} · ${fmt(pct)}% of source`;
        } else {
          chPending(chans.vl);
          statusEl.className = "status-msg";
          statusEl.textContent = `${pick.label} · ΔV = ${formatSI(Vdrop, "V")} over ${fmt(L)} m. Add source voltage for % drop.`;
        }

        drawWire({ label: pick.label, area: awgArea(pick.n) });
      }

      function drawWire(info) {
        const W = 300, H = 150, sx = 46, lx = 250, topY = 52, botY = 108;
        const tw = info ? Math.min(15, Math.max(2.5, 1.4 + Math.sqrt(info.area) * 1.5)) : 3;
        const col = WIRE_COL[st.mat];
        const rail = y => `<line x1="${sx}" y1="${y}" x2="${lx}" y2="${y}" stroke="${col}" stroke-width="${tw.toFixed(1)}" stroke-linecap="round"/>`;
        const flow = info ? `<line class="wd-flow" x1="${sx}" y1="${topY}" x2="${lx}" y2="${topY}" stroke-width="${Math.max(1.5, tw - 1.5).toFixed(1)}"/>
          <line class="wd-flow" x1="${lx}" y1="${botY}" x2="${sx}" y2="${botY}" stroke-width="${Math.max(1.5, tw - 1.5).toFixed(1)}"/>` : "";
        const vfdBox = `<rect x="${sx - 16}" y="${topY - 6}" width="32" height="${botY - topY + 12}" rx="4" class="wd-sym"/>
          <text x="${sx}" y="${(topY + botY) / 2 + 4}" class="vd-cap" text-anchor="middle">VFD</text>`;
        const motor = `<circle cx="${lx}" cy="${(topY + botY) / 2}" r="20" class="wd-sym"/>
          <text x="${lx}" y="${(topY + botY) / 2 + 4}" class="vd-cap" text-anchor="middle">M</text>`;
        const gaugeLbl = info ? `<text x="${(sx + lx) / 2}" y="${topY - 12}" class="vd-cap" text-anchor="middle">${info.label}</text>` : "";
        vizEl.innerHTML = `<svg class="wd-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="VFD to motor feeder${info ? ", " + info.label : ""}">
          ${rail(topY)}${rail(botY)}${flow}${vfdBox}${motor}${gaugeLbl}
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { I: "", L: "", Vs: "" });
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.I.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 17 — AC POWER TRIANGLE
     ============================================================ */
  const ACPowerTriangle = {
    id: "acpower",
    discipline: "ELECTRICAL",
    title: "AC power triangle calculator",
    subtitle: "Enter any two of apparent, active, and reactive power, or the power factor — the rest solve instantly. Optionally derive apparent power from voltage and current.",

    mount(root) {
      const DEFS = [
        { key: "S", sym: "S", name: "Apparent power", unit: "VA" },
        { key: "P", sym: "P", name: "Active power", unit: "W" },
        { key: "Qr", sym: "Q", name: "Reactive power", unit: "VAR" },
        { key: "PF", sym: "PF", name: "Power factor", unit: "ratio" },
      ];

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>POWER TRIANGLE</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="pt-layout">
          <div class="pt-stage"><div class="pt-viz"></div></div>
          <div class="channels cols-2 pt-channels"></div>
        </div>
        <div class="pt-derive-row">
          <span class="pt-derive-label">DERIVE S FROM V &amp; I</span>
          <div class="seg" data-group="phase"><button data-v="1ph">1φ</button><button data-v="3ph" class="on">3φ</button></div>
        </div>
        <div class="channels cols-2 pt-derive"></div>
        <div class="status"><div class="status-msg">Enter two values to begin.</div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>S² = P² + Q² and PF = P/S = cos φ. Reactive power is shown as a positive magnitude — whether it's inductive or capacitive depends on the load, not the arithmetic.</span>`));

      const chansEl = panel.querySelector(".pt-channels");
      const deriveEl = panel.querySelector(".pt-derive");
      const statusEl = panel.querySelector(".status-msg");
      const vizEl = panel.querySelector(".pt-viz");

      const chans = {}, raw = {};
      let inputOrder = ["P", "PF"];
      raw.P = "15000"; raw.PF = "0.85"; raw.S = ""; raw.Qr = "";

      DEFS.forEach(q => {
        const c = makeChannel(q); chans[q.key] = c;
        chansEl.appendChild(c.el);
        c.input.addEventListener("input", e => onType(q.key, e.target.value));
        c.value.addEventListener("click", () => takeOver(q.key));
      });

      const deriveRaw = { V: "", I: "" };
      const dChans = {};
      let phase = "3ph";
      const dDefs = [{ key: "V", sym: "V", name: "Voltage", unit: "V" }, { key: "I", sym: "I", name: "Current", unit: "A" }];
      dDefs.forEach(d => {
        const c = makeChannel(d); dChans[d.key] = c; deriveEl.appendChild(c.el);
        c.input.addEventListener("input", e => { deriveRaw[d.key] = e.target.value; applyDerive(); });
      });

      panel.querySelectorAll('.seg[data-group="phase"] button').forEach(btn => {
        btn.addEventListener("click", () => {
          phase = btn.dataset.v;
          panel.querySelectorAll('.seg[data-group="phase"] button').forEach(b => b.classList.toggle("on", b === btn));
          applyDerive();
        });
      });

      function applyDerive() {
        const V = parseFloat(deriveRaw.V), I = parseFloat(deriveRaw.I);
        if (!Number.isNaN(V) && !Number.isNaN(I) && V > 0 && I > 0) {
          const Sva = phase === "3ph" ? Math.sqrt(3) * V * I : V * I;
          onType("S", trimNumber(Sva));
        }
      }

      function onType(key, val) {
        raw[key] = val;
        if (val.trim() === "") inputOrder = inputOrder.filter(k => k !== key);
        else if (!inputOrder.includes(key)) {
          inputOrder.push(key);
          if (inputOrder.length > 2) raw[inputOrder.shift()] = "";
        }
        recompute();
      }
      function takeOver(key) {
        if (!inputOrder.includes(key)) { inputOrder.push(key); if (inputOrder.length > 2) raw[inputOrder.shift()] = ""; }
        chInput(chans[key], raw[key] || "");
        chans[key].input.focus(); chans[key].input.select();
        recompute();
      }
      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const bad = t => { const e = new Error(t); e.friendly = true; return e; };

      function solve(a, b) {
        const S = num("S"), P = num("P"), Qr = num("Qr"), PF = num("PF");
        const known = { S, P, Qr, PF };
        let out = {};
        switch ([a, b].sort().join("")) {
          case "PS":
            if (S < P) throw bad("Apparent power can't be less than active power.");
            out.Qr = Math.sqrt(S * S - P * P); out.PF = P / S;
            break;
          case "QrS":
            if (S < Qr) throw bad("Apparent power can't be less than reactive power.");
            out.P = Math.sqrt(S * S - Qr * Qr); out.PF = out.P / S;
            break;
          case "PFS":
            if (PF <= 0 || PF > 1) throw bad("Power factor must be between 0 and 1.");
            out.P = S * PF; out.Qr = Math.sqrt(Math.max(0, S * S - out.P * out.P));
            break;
          case "PQr":
            out.S = Math.sqrt(P * P + Qr * Qr); out.PF = P / out.S;
            break;
          case "PPF":
            if (PF <= 0 || PF > 1) throw bad("Power factor must be between 0 and 1.");
            out.S = P / PF; out.Qr = Math.sqrt(Math.max(0, out.S * out.S - P * P));
            break;
          case "PFQr": {
            if (PF <= 0 || PF >= 1) throw bad("Power factor must be between 0 and 1 (exclusive) when paired with reactive power.");
            const phiAngle = Math.acos(PF), t = Math.tan(phiAngle);
            if (t === 0) throw bad("That power factor implies zero reactive power.");
            out.P = Qr / t; out.S = Qr / Math.sin(phiAngle);
            break;
          }
        }
        for (const k in out) if (!isFinite(out[k]) || out[k] < 0) throw bad("That combination doesn't resolve to a real value.");
        return { ...known, ...out };
      }

      function recompute() {
        if (inputOrder.length < 2) {
          DEFS.forEach(q => inputOrder.includes(q.key) ? chInput(chans[q.key], raw[q.key]) : chEmpty(chans[q.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = inputOrder.length === 1 ? "One more value and it solves." : "Enter two values to begin.";
          drawTriangle(null);
          return;
        }
        const [a, b] = inputOrder;
        let result;
        try { result = solve(a, b); }
        catch (err) {
          statusEl.className = "status-msg error"; statusEl.textContent = err.friendly ? err.message : "Check your inputs.";
          drawTriangle(null);
          return;
        }
        DEFS.forEach(q => {
          if (inputOrder.includes(q.key)) chInput(chans[q.key], raw[q.key]);
          else {
            if (q.key === "PF") chMeasured(chans[q.key], String(fmt(result[q.key])));
            else chMeasured(chans[q.key], formatSI(result[q.key], q.unit));
            raw[q.key] = trimNumber(result[q.key]);
          }
        });
        const phi = Math.acos(Math.min(1, Math.max(0, result.PF))) * 180 / Math.PI;
        statusEl.className = "status-msg";
        statusEl.textContent = `Solved. φ = ${fmt(phi)}°`;
        drawTriangle(result);
      }

      function drawTriangle(vals) {
        const W = 300, H = 200, pad = 30;
        if (!vals) {
          vizEl.innerHTML = `<svg class="pt-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No power values set yet">
            <line class="pt-p-line" x1="${pad}" y1="${H - pad}" x2="${W - pad}" y2="${H - pad}" stroke-dasharray="4 6" opacity="0.4"/>
          </svg>`;
          return;
        }
        const { P, Qr, S } = vals;
        const maxDim = Math.max(P, Qr, 1);
        const scale = (Math.min(W, H) - 2 * pad * 1.4) / maxDim;
        const px = pad, py = H - pad;
        const qx = pad + P * scale, qy = H - pad - Qr * scale;
        vizEl.innerHTML = `<svg class="pt-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Power triangle">
          <line class="pt-p-line" x1="${px}" y1="${py}" x2="${qx.toFixed(1)}" y2="${py}"/>
          <line class="pt-q-line" x1="${qx.toFixed(1)}" y1="${py}" x2="${qx.toFixed(1)}" y2="${qy.toFixed(1)}"/>
          <line class="pt-s-line" x1="${px}" y1="${py}" x2="${qx.toFixed(1)}" y2="${qy.toFixed(1)}"/>
          <text class="pt-lbl" x="${(px + qx) / 2}" y="${py + 18}" text-anchor="middle" fill="var(--amber)">P · ${formatSI(P, "W")}</text>
          <text class="pt-lbl" x="${(qx + 8).toFixed(1)}" y="${((py + qy) / 2).toFixed(1)}" fill="var(--cyan)">Q · ${formatSI(Qr, "VAR")}</text>
          <text class="pt-lbl" x="${(px + qx) / 2 - 10}" y="${((py + qy) / 2 - 8).toFixed(1)}" fill="#c9d0dc">S · ${formatSI(S, "VA")}</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        inputOrder = []; DEFS.forEach(q => { raw[q.key] = ""; chEmpty(chans[q.key]); });
        deriveRaw.V = ""; deriveRaw.I = ""; dDefs.forEach(d => chEmpty(dChans[d.key]));
        statusEl.className = "status-msg"; statusEl.textContent = "Enter two values to begin.";
        drawTriangle(null);
        chans.P.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 18 — AC IMPEDANCE
     ============================================================ */
  const ACImpedance = {
    id: "acimpedance",
    discipline: "ELECTRICAL",
    title: "AC impedance calculator",
    subtitle: "Enter any two of resistance, reactance, impedance, and phase angle — the rest solve instantly. Optionally build reactance from L, C, and frequency.",

    mount(root) {
      const DEFS = [
        { key: "R", sym: "R", name: "Resistance", unit: "Ω" },
        { key: "X", sym: "X", name: "Reactance", unit: "Ω" },
        { key: "Z", sym: "Z", name: "Impedance", unit: "Ω" },
        { key: "Th", sym: "θ", name: "Phase angle", unit: "°" },
      ];

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>IMPEDANCE</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="pt-layout">
          <div class="pt-stage"><div class="imp-viz"></div></div>
          <div class="channels cols-2 imp-channels"></div>
        </div>
        <div class="pt-derive-row">
          <span class="pt-derive-label">BUILD X FROM L, C, f</span>
        </div>
        <div class="channels cols-3 imp-derive"></div>
        <div class="status"><div class="status-msg">Enter two values to begin.</div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Z² = R² + X² and θ = atan(X/R). Reactance is signed — positive is inductive, negative is capacitive — while resistance and impedance magnitude are always non-negative. Solving X from R and Z alone can't recover the sign, so it's assumed inductive; flip the result's sign yourself if the load is capacitive.</span>`));

      const chansEl = panel.querySelector(".imp-channels");
      const deriveEl = panel.querySelector(".imp-derive");
      const statusEl = panel.querySelector(".status-msg");
      const vizEl = panel.querySelector(".imp-viz");

      const chans = {}, raw = {};
      let inputOrder = ["R", "X"];
      raw.R = "30"; raw.X = "40"; raw.Z = ""; raw.Th = "";

      DEFS.forEach(q => {
        const c = makeChannel(q); chans[q.key] = c;
        chansEl.appendChild(c.el);
        c.input.addEventListener("input", e => onType(q.key, e.target.value));
        c.value.addEventListener("click", () => takeOver(q.key));
      });

      const deriveRaw = { L: "", C: "", f: "" };
      const dChans = {};
      const dDefs = [
        { key: "L", sym: "L", name: "Inductance", unit: "mH" },
        { key: "C", sym: "C", name: "Capacitance", unit: "µF" },
        { key: "f", sym: "f", name: "Frequency", unit: "Hz" },
      ];
      dDefs.forEach(d => {
        const c = makeChannel(d); dChans[d.key] = c; deriveEl.appendChild(c.el);
        c.input.addEventListener("input", e => { deriveRaw[d.key] = e.target.value; applyDerive(); });
      });

      function applyDerive() {
        const L = parseFloat(deriveRaw.L), C = parseFloat(deriveRaw.C), f = parseFloat(deriveRaw.f);
        if (Number.isNaN(f) || f <= 0) return;
        let XL = 0, XC = 0, any = false;
        if (!Number.isNaN(L) && L > 0) { XL = 2 * Math.PI * f * (L * 1e-3); any = true; }
        if (!Number.isNaN(C) && C > 0) { XC = 1 / (2 * Math.PI * f * (C * 1e-6)); any = true; }
        if (!any) return;
        onType("X", trimNumber(XL - XC));
      }

      function onType(key, val) {
        raw[key] = val;
        if (val.trim() === "") inputOrder = inputOrder.filter(k => k !== key);
        else if (!inputOrder.includes(key)) {
          inputOrder.push(key);
          if (inputOrder.length > 2) raw[inputOrder.shift()] = "";
        }
        recompute();
      }
      function takeOver(key) {
        if (!inputOrder.includes(key)) { inputOrder.push(key); if (inputOrder.length > 2) raw[inputOrder.shift()] = ""; }
        chInput(chans[key], raw[key] || "");
        chans[key].input.focus(); chans[key].input.select();
        recompute();
      }
      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };
      const bad = t => { const e = new Error(t); e.friendly = true; return e; };
      const D2R = Math.PI / 180, R2D = 180 / Math.PI;

      function solve(a, b) {
        const R = num("R"), X = num("X"), Z = num("Z"), Th = num("Th");
        const known = { R, X, Z, Th };
        let out = {};
        switch ([a, b].sort().join("")) {
          case "RX":
            out.Z = Math.sqrt(R * R + X * X); out.Th = Math.atan2(X, R) * R2D;
            break;
          case "RZ":
            if (Z < R) throw bad("Impedance can't be less than resistance.");
            out.X = Math.sqrt(Z * Z - R * R); out.Th = Math.atan2(out.X, R) * R2D;
            break;
          case "RTh":
            if (Th <= -90 || Th >= 90) throw bad("Phase angle must be between -90° and 90° when paired with resistance.");
            out.X = R * Math.tan(Th * D2R); out.Z = R / Math.cos(Th * D2R);
            break;
          case "ThX":
            if (Th === 0) throw bad("Phase angle can't be 0° when paired with reactance.");
            out.R = X / Math.tan(Th * D2R); out.Z = X / Math.sin(Th * D2R);
            break;
          case "ThZ":
            out.R = Z * Math.cos(Th * D2R); out.X = Z * Math.sin(Th * D2R);
            break;
          case "XZ":
            if (Z < Math.abs(X)) throw bad("Impedance can't be less than the reactance magnitude.");
            out.R = Math.sqrt(Z * Z - X * X); out.Th = Math.asin(X / Z) * R2D;
            break;
        }
        if (out.R !== undefined && out.R < 0) throw bad("That combination gives a negative resistance, which isn't physical here.");
        if (out.Z !== undefined && out.Z < 0) throw bad("That combination doesn't resolve to a real impedance.");
        for (const k in out) if (!isFinite(out[k])) throw bad("That combination doesn't resolve to a real value.");
        return { ...known, ...out };
      }

      function recompute() {
        if (inputOrder.length < 2) {
          DEFS.forEach(q => inputOrder.includes(q.key) ? chInput(chans[q.key], raw[q.key]) : chEmpty(chans[q.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = inputOrder.length === 1 ? "One more value and it solves." : "Enter two values to begin.";
          drawImpedance(null);
          return;
        }
        const [a, b] = inputOrder;
        let result;
        try { result = solve(a, b); }
        catch (err) {
          statusEl.className = "status-msg error"; statusEl.textContent = err.friendly ? err.message : "Check your inputs.";
          drawImpedance(null);
          return;
        }
        DEFS.forEach(q => {
          if (inputOrder.includes(q.key)) chInput(chans[q.key], raw[q.key]);
          else {
            if (q.key === "Th") chMeasured(chans[q.key], `${fmt(result[q.key])}°`);
            else chMeasured(chans[q.key], formatSI(result[q.key], "Ω"));
            raw[q.key] = trimNumber(result[q.key]);
          }
        });
        statusEl.className = "status-msg";
        statusEl.textContent = `Solved. ${result.X >= 0 ? "Inductive" : "Capacitive"} reactance.`;
        drawImpedance(result);
      }

      function drawImpedance(vals) {
        const W = 300, H = 200, pad = 30, midY = H / 2;
        if (!vals) {
          vizEl.innerHTML = `<svg class="pt-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No impedance set yet">
            <line class="pt-p-line" x1="${pad}" y1="${midY}" x2="${W - pad}" y2="${midY}" stroke-dasharray="4 6" opacity="0.4"/>
          </svg>`;
          return;
        }
        const { R, X, Z } = vals;
        const maxDim = Math.max(Math.abs(R), Math.abs(X), 1);
        const scale = (Math.min(W, H - 2 * pad) - 2 * pad * 0.6) / maxDim;
        const px = pad, py = midY;
        const rx = pad + R * scale, xy = midY - X * scale;
        vizEl.innerHTML = `<svg class="pt-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Impedance triangle, ${X >= 0 ? "inductive" : "capacitive"}">
          <line class="pt-p-line" x1="${px}" y1="${py}" x2="${rx.toFixed(1)}" y2="${py}"/>
          <line class="pt-q-line" x1="${rx.toFixed(1)}" y1="${py}" x2="${rx.toFixed(1)}" y2="${xy.toFixed(1)}"/>
          <line class="pt-s-line" x1="${px}" y1="${py}" x2="${rx.toFixed(1)}" y2="${xy.toFixed(1)}"/>
          <text class="pt-lbl" x="${(px + rx) / 2}" y="${py + 18}" text-anchor="middle" fill="var(--amber)">R · ${formatSI(R, "Ω")}</text>
          <text class="pt-lbl" x="${(rx + 8).toFixed(1)}" y="${((py + xy) / 2).toFixed(1)}" fill="var(--cyan)">X · ${formatSI(X, "Ω")}</text>
          <text class="pt-lbl" x="${(px + rx) / 2 - 10}" y="${((py + xy) / 2 - 8).toFixed(1)}" fill="#c9d0dc">Z · ${formatSI(Z, "Ω")}</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        inputOrder = []; DEFS.forEach(q => { raw[q.key] = ""; chEmpty(chans[q.key]); });
        deriveRaw.L = ""; deriveRaw.C = ""; deriveRaw.f = ""; dDefs.forEach(d => chEmpty(dChans[d.key]));
        statusEl.className = "status-msg"; statusEl.textContent = "Enter two values to begin.";
        drawImpedance(null);
        chans.R.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 19 — POWER FACTOR CORRECTION
     ============================================================ */
  const PowerFactorCorrection = {
    id: "pfc",
    discipline: "ELECTRICAL",
    title: "Power factor correction calculator",
    subtitle: "Given a load's real power and existing power factor, find the capacitor bank needed to reach a target power factor.",

    mount(root) {
      const raw = { P: "100", PF1: "0.75", PF2: "0.95", V: "400", f: "50" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>POWER FACTOR CORRECTION</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="pt-layout">
          <div class="pt-stage"><div class="pfc-viz"></div></div>
          <div class="channels cols-2 pfc-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-4 pfc-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Qc = P·(tan φ₁ − tan φ₂). The equivalent capacitance treats the bank as a single lumped capacitor at the given line voltage and frequency, matching how commercial capacitor banks are rated — it doesn't distinguish a wye from a delta connection internally.</span>`));

      const vizEl = panel.querySelector(".pfc-viz");
      const inputsEl = panel.querySelector(".pfc-inputs");
      const outsEl = panel.querySelector(".pfc-outputs");
      const statusEl = panel.querySelector(".status-msg");

      const inDefs = [
        { key: "P", sym: "P", name: "Real power", unit: "kW" },
        { key: "PF1", sym: "PF₁", name: "Existing power factor", unit: "0–1" },
        { key: "PF2", sym: "PF₂", name: "Target power factor", unit: "0–1" },
        { key: "V", sym: "V", name: "Line voltage", unit: "V" },
        { key: "f", sym: "f", name: "Frequency", unit: "Hz" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        chInput(c, raw[d.key]);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "qc", sym: "Qc", name: "Capacitor bank", unit: "kVAR" },
        { key: "cap", sym: "C", name: "Equivalent capacitance", unit: "µF" },
        { key: "s1", sym: "S₁", name: "Apparent power, before", unit: "kVA" },
        { key: "s2", sym: "S₂", name: "Apparent power, after", unit: "kVA" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        inDefs.forEach(d => chInput(chans[d.key], raw[d.key]));
        const P = num("P"), PF1 = num("PF1"), PF2 = num("PF2"), V = num("V"), f = num("f");
        const need = [];
        if (!(P > 0)) need.push("power");
        if (!(PF1 > 0 && PF1 <= 1)) need.push("existing PF (0–1)");
        if (!(PF2 > 0 && PF2 <= 1)) need.push("target PF (0–1)");

        if (need.length) {
          outDefs.forEach(d => chPending(chans[d.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawPFC(null);
          return;
        }
        if (PF2 <= PF1) {
          outDefs.forEach(d => chPending(chans[d.key]));
          statusEl.className = "status-msg error";
          statusEl.textContent = "Target power factor must be higher than the existing power factor.";
          drawPFC(null);
          return;
        }

        const phi1 = Math.acos(PF1), phi2 = Math.acos(PF2);
        const Q1 = P * Math.tan(phi1), Q2 = P * Math.tan(phi2);
        const Qc = Q1 - Q2;
        const S1 = P / PF1, S2 = P / PF2;

        chMeasured(chans.qc, `${fmt(Qc)} kVAR`);
        chMeasured(chans.s1, `${fmt(S1)} kVA`);
        chMeasured(chans.s2, `${fmt(S2)} kVA`);

        if (V > 0 && f > 0) {
          const C = (Qc * 1000) / (2 * Math.PI * f * V * V) * 1e6;
          chMeasured(chans.cap, `${fmt(C)} µF`);
          statusEl.className = "status-msg";
          statusEl.textContent = `Needs ${fmt(Qc)} kVAR — about ${fmt(C)} µF at ${fmt(V)} V, ${fmt(f)} Hz.`;
        } else {
          chPending(chans.cap);
          statusEl.className = "status-msg";
          statusEl.textContent = `Needs ${fmt(Qc)} kVAR of correction. Add voltage and frequency for the equivalent capacitance.`;
        }

        drawPFC({ P, Q1, Q2, S1, S2 });
      }

      function drawPFC(vals) {
        const W = 300, H = 210, pad = 30;
        if (!vals) {
          vizEl.innerHTML = `<svg class="pt-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No load set yet">
            <line class="pt-p-line" x1="${pad}" y1="${H - pad}" x2="${W - pad}" y2="${H - pad}" stroke-dasharray="4 6" opacity="0.4"/>
          </svg>`;
          return;
        }
        const { P, Q1, Q2 } = vals;
        const maxDim = Math.max(P, Q1, 1);
        const scale = (Math.min(W, H) - 2 * pad * 1.3) / maxDim;
        const px = pad, py = H - pad;
        const qx = pad + P * scale;
        const q1y = py - Q1 * scale, q2y = py - Q2 * scale;
        vizEl.innerHTML = `<svg class="pt-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Before and after power triangles">
          <line class="pt-p-line" x1="${px}" y1="${py}" x2="${qx.toFixed(1)}" y2="${py}"/>
          <line class="pfc-ghost" x1="${qx.toFixed(1)}" y1="${py}" x2="${qx.toFixed(1)}" y2="${q1y.toFixed(1)}"/>
          <line class="pfc-ghost" x1="${px}" y1="${py}" x2="${qx.toFixed(1)}" y2="${q1y.toFixed(1)}"/>
          <line class="pt-q-line" x1="${qx.toFixed(1)}" y1="${py}" x2="${qx.toFixed(1)}" y2="${q2y.toFixed(1)}"/>
          <line class="pt-s-line" x1="${px}" y1="${py}" x2="${qx.toFixed(1)}" y2="${q2y.toFixed(1)}"/>
          <line class="pfc-bracket" x1="${(qx + 10).toFixed(1)}" y1="${q1y.toFixed(1)}" x2="${(qx + 10).toFixed(1)}" y2="${q2y.toFixed(1)}"/>
          <text class="pt-lbl" x="${(qx + 16).toFixed(1)}" y="${((q1y + q2y) / 2).toFixed(1)}" fill="var(--danger)">ΔQ · ${fmt(Q1 - Q2)} kVAR</text>
          <text class="pt-lbl" x="${(px + qx) / 2}" y="${py + 18}" text-anchor="middle" fill="var(--amber)">P · ${fmt(P)} kW</text>
          <text class="pt-lbl" x="${Math.max(2, qx - 60).toFixed(1)}" y="${(q1y - 6).toFixed(1)}" fill="#5a6270">S₁ before</text>
          <text class="pt-lbl" x="${Math.max(2, qx - 56).toFixed(1)}" y="${(q2y - 6).toFixed(1)}" fill="var(--cyan)">S₂ after</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { P: "", PF1: "", PF2: "", V: "", f: "" });
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.P.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 20 — BLOWN FILM PROCESS
     ============================================================ */
  const BlownFilmProcess = {
    id: "blownfilm",
    discipline: "PLASTICS PROCESSING",
    title: "Blown film process calculator",
    subtitle: "Set the die geometry, layflat, gauge, and line speed to get blow-up ratio, draw-down, output rate, and die wall shear rate — the visual tracks the die-to-bubble-to-nip geometry.",

    mount(root) {
      const RESINS = [
        { name: "LDPE", rho: 750 }, { name: "LLDPE", rho: 735 }, { name: "HDPE", rho: 730 },
        { name: "PP", rho: 720 }, { name: "Custom", rho: null },
      ];
      const raw = { Ddie: "200", hdie: "1.0", Wlay: "600", tfilm: "50", Vline: "60", rho: "750", n: "0.4" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>BLOWN FILM LINE</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="selectors">
          <div class="seg-field"><span class="seg-label">RESIN</span><select class="mat-select"></select></div>
        </div>
        <div class="gear-layout">
          <div class="gear-stage">
            <div class="bf-viz"></div>
            <div class="ratio-badge"><div class="r empty">——</div><div class="lbl">BLOW-UP RATIO</div></div>
          </div>
          <div class="channels cols-2 bf-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 bf-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Draw-down assumes volume is conserved from the die to the finished film (no shrinkage). Wall shear rate uses the Newtonian slit approximation γ̇ = 6Q/(w·h²); enter a power-law index below 1 for shear-thinning melts to see the Rabinowitsch-corrected value alongside it.</span>`));

      const vizEl = panel.querySelector(".bf-viz");
      const inputsEl = panel.querySelector(".bf-inputs");
      const outsEl = panel.querySelector(".bf-outputs");
      const statusEl = panel.querySelector(".status-msg");
      const ratioEl = panel.querySelector(".ratio-badge .r");
      const ratioLbl = panel.querySelector(".ratio-badge .lbl");
      const resinSel = panel.querySelector(".mat-select");

      RESINS.forEach((r, i) => { const o = el("option"); o.value = i; o.textContent = r.name + (r.rho ? ` · ${r.rho} kg/m³` : ""); resinSel.appendChild(o); });
      resinSel.addEventListener("change", () => {
        const r = RESINS[+resinSel.value];
        if (r.rho != null) { raw.rho = String(r.rho); if (chans.rho) chans.rho.input.value = raw.rho; }
        recompute();
      });

      const inDefs = [
        { key: "Ddie", sym: "Dₑ", name: "Die diameter", unit: "mm" },
        { key: "hdie", sym: "h", name: "Die gap", unit: "mm" },
        { key: "Wlay", sym: "W", name: "Layflat width", unit: "mm" },
        { key: "tfilm", sym: "t", name: "Film gauge", unit: "µm" },
        { key: "Vline", sym: "Vₗ", name: "Line speed", unit: "m/min" },
        { key: "rho", sym: "ρ", name: "Melt density", unit: "kg/m³" },
        { key: "n", sym: "n", name: "Power-law index", unit: "0–1" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        if (raw[d.key]) chInput(c, raw[d.key]); else chEmpty(c);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "Vdie", sym: "Vₑ", name: "Die exit velocity", unit: "m/min" },
        { key: "ddr", sym: "DDR", name: "Draw-down ratio", unit: ": 1" },
        { key: "out", sym: "Ṁ", name: "Output rate", unit: "kg/hr" },
        { key: "spec", sym: "q", name: "Specific output", unit: "kg/hr/mm" },
        { key: "shearApp", sym: "γ̇ₐ", name: "Wall shear, Newtonian", unit: "1/s" },
        { key: "shearTrue", sym: "γ̇ₜ", name: "Wall shear, corrected", unit: "1/s" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        const Ddie = num("Ddie"), hdie = num("hdie"), Wlay = num("Wlay"), tfilm = num("tfilm"), Vline = num("Vline"), rho = num("rho");
        const n = num("n");
        const need = [];
        if (!(Ddie > 0)) need.push("die diameter");
        if (!(hdie > 0)) need.push("die gap");
        if (!(Wlay > 0)) need.push("layflat width");
        if (!(tfilm > 0)) need.push("film gauge");
        if (!(Vline > 0)) need.push("line speed");
        if (!(rho > 0)) need.push("melt density");

        if (need.length) {
          ratioEl.textContent = "——"; ratioEl.classList.add("empty"); ratioLbl.textContent = "BLOW-UP RATIO";
          outDefs.forEach(d => chPending(chans[d.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawBubble(null);
          return;
        }

        const Ddie_m = Ddie * 1e-3, hdie_m = hdie * 1e-3, tfilm_m = tfilm * 1e-6, Vline_ms = Vline / 60;
        const Dbubble_mm = 2 * Wlay / Math.PI;
        const BUR = Dbubble_mm / Ddie;

        ratioEl.textContent = `${fmt(BUR)} : 1`; ratioEl.classList.remove("empty");
        ratioLbl.textContent = "BLOW-UP RATIO";

        const Vdie_ms = (BUR * tfilm_m * Vline_ms) / hdie_m;
        const DDR = Vline_ms / Vdie_ms;
        const Q = Math.PI * Ddie_m * hdie_m * Vdie_ms;
        const massRate = rho * Q;
        const outKgHr = massRate * 3600;
        const specific = outKgHr / (Math.PI * Ddie);
        const shearApp = (6 * Q) / (Math.PI * Ddie_m * hdie_m * hdie_m);

        chMeasured(chans.Vdie, `${fmt(Vdie_ms * 60)} m/min`);
        chMeasured(chans.ddr, `${fmt(DDR)} : 1`);
        chMeasured(chans.out, `${fmt(outKgHr)} kg/hr`);
        chMeasured(chans.spec, `${fmt(specific)} kg/hr/mm`);
        chMeasured(chans.shearApp, `${fmt(shearApp)} 1/s`);

        if (n > 0 && n !== 1) {
          const shearTrue = shearApp * (2 * n + 1) / (3 * n);
          chMeasured(chans.shearTrue, `${fmt(shearTrue)} 1/s`);
        } else {
          chPending(chans.shearTrue);
        }

        statusEl.className = "status-msg";
        statusEl.textContent = `BUR = ${fmt(BUR)} · DDR = ${fmt(DDR)} · ${fmt(outKgHr)} kg/hr`;
        drawBubble({ BUR, Dbubble_mm, Ddie });
      }

      function drawBubble(vals) {
        const W = 220, H = 260;
        if (!vals) {
          vizEl.innerHTML = `<svg class="bf-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No geometry set yet">
            <rect x="${W / 2 - 10}" y="${H - 40}" width="20" height="30" class="bf-die"/>
          </svg>`;
          return;
        }
        const dieW = Math.min(50, Math.max(14, vals.Ddie * 0.15));
        const bubbleW = Math.min(160, dieW * vals.BUR);
        const cx = W / 2, dieY = H - 34, bubbleTopY = 40, waistY = dieY - 70;
        const path = `M${cx - dieW / 2} ${dieY} L${cx - dieW / 2} ${dieY - 20}
          C ${cx - bubbleW / 2} ${waistY + 40} ${cx - bubbleW / 2} ${waistY} ${cx - bubbleW / 2} ${bubbleTopY + 30}
          L${cx - dieW * 0.3} ${bubbleTopY}
          L${cx + dieW * 0.3} ${bubbleTopY}
          L${cx + bubbleW / 2} ${bubbleTopY + 30}
          C ${cx + bubbleW / 2} ${waistY} ${cx + bubbleW / 2} ${waistY + 40} ${cx + dieW / 2} ${dieY - 20}
          L${cx + dieW / 2} ${dieY} Z`;
        vizEl.innerHTML = `<svg class="bf-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Bubble at blow-up ratio ${fmt(vals.BUR)}">
          <path class="bf-bubble-fill" d="${path}"/>
          <path class="bf-bubble-outline" d="${path}"/>
          <rect x="${cx - dieW / 2 - 6}" y="${dieY}" width="${dieW + 12}" height="14" class="bf-die"/>
          <line class="bf-nip" x1="${cx - dieW * 0.3 - 10}" y1="${bubbleTopY - 4}" x2="${cx + dieW * 0.3 + 10}" y2="${bubbleTopY - 4}"/>
          <path class="bf-flow" d="M${cx} ${dieY} L${cx} ${bubbleTopY}"/>
          <text class="bf-lbl" x="${cx}" y="${dieY + 30}" text-anchor="middle">DIE · ${fmt(vals.Ddie)} mm</text>
          <text class="bf-lbl bf-lbl-hi" x="${cx}" y="${waistY - 6}" text-anchor="middle">BUBBLE · ${fmt(vals.Dbubble_mm)} mm</text>
          <text class="bf-lbl" x="${cx}" y="${bubbleTopY - 12}" text-anchor="middle">NIP ROLLS</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { Ddie: "", hdie: "", Wlay: "", tfilm: "", Vline: "", rho: "", n: "" });
        resinSel.value = "4";
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.Ddie.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     TOOL 21 — BUBBLE STRESS
     ============================================================ */
  const BubbleStress = {
    id: "bubblestress",
    discipline: "PLASTICS PROCESSING",
    title: "Bubble stress calculator",
    subtitle: "Enter the internal bubble pressure, layflat width, and gauge to get hoop stress in the film — add a haul-off tension for machine-direction stress and the biaxial balance.",

    mount(root) {
      const raw = { dP: "4", Wlay: "600", tfilm: "50", F: "" };
      const chans = {};

      root.innerHTML = "";
      const panel = el("div", "panel");
      panel.innerHTML = `
        <div class="panel-head">
          <h2>BUBBLE WALL</h2>
          <div class="legend"><span><i class="dot set"></i> SET</span><span><i class="dot meas"></i> MEASURED</span></div>
        </div>
        <div class="pt-layout">
          <div class="pt-stage"><div class="bs-viz"></div></div>
          <div class="channels cols-2 bs-inputs"></div>
        </div>
        <div class="outputs-wrap"><div class="channels cols-3 bs-outputs"></div></div>
        <div class="status"><div class="status-msg"></div><button class="btn-reset">CLEAR</button></div>`;
      root.appendChild(panel);
      root.appendChild(el("p", "note", `<span class="k">i</span><span>Hoop stress uses the thin-wall pressure vessel relation σ = ΔP·R/t. Machine-direction stress needs an actual haul-off tension — geometry alone can't give you that, so it only appears once you enter one.</span>`));

      const vizEl = panel.querySelector(".bs-viz");
      const inputsEl = panel.querySelector(".bs-inputs");
      const outsEl = panel.querySelector(".bs-outputs");
      const statusEl = panel.querySelector(".status-msg");

      const inDefs = [
        { key: "dP", sym: "ΔP", name: "Bubble pressure", unit: "inH₂O" },
        { key: "Wlay", sym: "W", name: "Layflat width", unit: "mm" },
        { key: "tfilm", sym: "t", name: "Film gauge", unit: "µm" },
        { key: "F", sym: "F", name: "Haul-off tension", unit: "N" },
      ];
      inDefs.forEach(d => {
        const c = makeChannel(d); chans[d.key] = c; inputsEl.appendChild(c.el);
        if (raw[d.key]) chInput(c, raw[d.key]); else chEmpty(c);
        c.input.addEventListener("input", e => { raw[d.key] = e.target.value; recompute(); });
      });

      const outDefs = [
        { key: "Dbubble", sym: "D", name: "Bubble diameter", unit: "mm" },
        { key: "hoop", sym: "σₕ", name: "Hoop stress", unit: "Pa" },
        { key: "md", sym: "σₘ", name: "MD stress", unit: "Pa" },
        { key: "ratio", sym: "σₕ/σₘ", name: "Biaxial ratio", unit: "ratio" },
      ];
      outDefs.forEach(d => { const c = makeChannel(d); chans[d.key] = c; outsEl.appendChild(c.el); chPending(c); });

      const num = k => { const v = parseFloat(raw[k]); return Number.isNaN(v) ? undefined : v; };

      function recompute() {
        const dP_inH2O = num("dP"), Wlay = num("Wlay"), tfilm = num("tfilm"), F = num("F");
        const need = [];
        if (!(dP_inH2O > 0)) need.push("bubble pressure");
        if (!(Wlay > 0)) need.push("layflat width");
        if (!(tfilm > 0)) need.push("film gauge");

        if (need.length) {
          outDefs.forEach(d => chPending(chans[d.key]));
          statusEl.className = "status-msg";
          statusEl.textContent = "Add the " + need.join(", ") + " to solve.";
          drawBubble(null);
          return;
        }

        const dP = dP_inH2O * 249.089;
        const Dbubble_mm = 2 * Wlay / Math.PI;
        const R_m = (Dbubble_mm * 1e-3) / 2;
        const t_m = tfilm * 1e-6;
        const hoop = dP * R_m / t_m;

        chMeasured(chans.Dbubble, `${fmt(Dbubble_mm)} mm`);
        chMeasured(chans.hoop, formatSI(hoop, "Pa"));

        if (F > 0) {
          const md = F / (Math.PI * (Dbubble_mm * 1e-3) * t_m);
          chMeasured(chans.md, formatSI(md, "Pa"));
          chMeasured(chans.ratio, fmt(hoop / md));
          statusEl.className = "status-msg";
          statusEl.textContent = `σₕ = ${formatSI(hoop, "Pa")} · σₘ = ${formatSI(md, "Pa")}`;
        } else {
          chPending(chans.md); chPending(chans.ratio);
          statusEl.className = "status-msg";
          statusEl.textContent = `σₕ = ${formatSI(hoop, "Pa")}. Add a haul-off tension for MD stress.`;
        }

        drawBubble({ dP: dP_inH2O, hasF: F > 0 });
      }

      function drawBubble(vals) {
        const W = 260, H = 200, cx = W / 2, cy = H / 2, r = 70;
        if (!vals) {
          vizEl.innerHTML = `<svg class="bs-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="No pressure set yet">
            <circle cx="${cx}" cy="${cy}" r="${r}" class="bs-wall" stroke-dasharray="4 6" opacity="0.4"/>
          </svg>`;
          return;
        }
        let arrows = "";
        for (let i = 0; i < 8; i++) {
          const ang = i * Math.PI / 4;
          const x1 = cx + Math.cos(ang) * (r - 18), y1 = cy + Math.sin(ang) * (r - 18);
          const x2 = cx + Math.cos(ang) * (r + 2), y2 = cy + Math.sin(ang) * (r + 2);
          arrows += `<line class="bs-arrow" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
        }
        const mdArrows = vals.hasF ? `
          <line class="bs-arrow" x1="${cx}" y1="${cy - r - 4}" x2="${cx}" y2="${cy - r - 24}"/>
          <path class="bs-arrow-head" d="M${cx - 5} ${cy - r - 20} L${cx + 5} ${cy - r - 20} L${cx} ${cy - r - 28} Z"/>
          <line class="bs-arrow" x1="${cx}" y1="${cy + r + 4}" x2="${cx}" y2="${cy + r + 24}"/>
          <path class="bs-arrow-head" d="M${cx - 5} ${cy + r + 20} L${cx + 5} ${cy + r + 20} L${cx} ${cy + r + 28} Z"/>` : "";
        vizEl.innerHTML = `<svg class="bs-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Bubble wall under internal pressure${vals.hasF ? " and haul-off tension" : ""}">
          <circle cx="${cx}" cy="${cy}" r="${r}" class="bs-wall"/>
          ${arrows}${mdArrows}
          <text class="bs-lbl" x="${cx}" y="${cy + 4}" text-anchor="middle" fill="var(--muted)">ΔP · ${fmt(vals.dP)} inH₂O</text>
        </svg>`;
      }

      panel.querySelector(".btn-reset").addEventListener("click", () => {
        Object.assign(raw, { dP: "", Wlay: "", tfilm: "", F: "" });
        inDefs.forEach(d => chEmpty(chans[d.key]));
        recompute(); chans.dP.input.focus();
      });

      recompute();
    },
  };

  /* ============================================================
     ROUTER + SIDEBAR
     ============================================================ */
  const MODULES = { ohms: OhmsLaw, gear: GearRatio, beam: BeamDeflection, chain: ChainPitch, vdiv: VoltageDivider, rcode: ResistorCodes, reynolds: ReynoldsNumber, vdrop: VoltageDrop, filter: RCFilter, timer555: Timer555, opamp: OpAmpGain, units: UnitConverter, dimensional: DimensionalAnalysis, mtorque: MotorTorque, mfla: MotorFLA, vfdcable: VFDCable, acpower: ACPowerTriangle, acimpedance: ACImpedance, pfc: PowerFactorCorrection, blownfilm: BlownFilmProcess, bubblestress: BubbleStress };
  const DISCIPLINES = [
    { name: "ELECTRICAL", tools: [
      { id: "ohms", name: "Ohm's Law", status: "active" },
      { id: "vdiv", name: "Voltage Divider", status: "active" },
      { id: "rcode", name: "Resistor Codes", status: "active" },
      { id: "vdrop", name: "Voltage Drop", status: "active" },
      { id: "acpower", name: "AC Power Triangle", status: "active" },
      { id: "acimpedance", name: "AC Impedance", status: "active" },
      { id: "pfc", name: "Power Factor Correction", status: "active" },
    ]},
    { name: "MECHANICAL", tools: [
      { id: "gear", name: "Gear Ratio", status: "active" },
      { id: "beam", name: "Beam Deflection", status: "active" },
      { id: "chain", name: "Chain Pitch", status: "active" },
    ]},
    { name: "FLUIDS & THERMAL", tools: [
      { id: "reynolds", name: "Reynolds Number", status: "active" },
    ]},
    { name: "CONTROLS", tools: [
      { id: "filter", name: "RC/RL Filter", status: "active" },
      { id: "timer555", name: "555 Timer", status: "active" },
      { id: "opamp", name: "Op-Amp Gain", status: "active" },
    ]},
    { name: "REFERENCE", tools: [
      { id: "units", name: "Unit Converter", status: "active" },
      { id: "dimensional", name: "Dimensional Analysis", status: "active" },
    ]},
    { name: "MOTORS & DRIVES", tools: [
      { id: "mtorque", name: "Motor Torque & Speed", status: "active" },
      { id: "mfla", name: "Motor FLA & Inrush", status: "active" },
      { id: "vfdcable", name: "VFD Cable Sizing", status: "active" },
    ]},
    { name: "PLASTICS PROCESSING", tools: [
      { id: "blownfilm", name: "Blown Film Process", status: "active" },
      { id: "bubblestress", name: "Bubble Stress", status: "active" },
    ]},
  ];

  const navEl = document.getElementById("nav");
  const viewEl = document.getElementById("view");
  const navButtons = {};
  const navGroups = {};
  const toolDiscipline = {};

  DISCIPLINES.forEach(group => {
    const g = el("nav", "nav-group");
    navGroups[group.name] = g;
    const label = el("button", "nav-label", `<span>${group.name}</span><span class="nav-chevron">›</span>`);
    label.type = "button";
    label.setAttribute("aria-expanded", "false");
    label.addEventListener("click", () => setExpandedGroup(group.name));
    g.appendChild(label);
    const items = el("div", "nav-group-items");
    group.tools.forEach(t => {
      toolDiscipline[t.id] = group.name;
      if (t.status === "soon") {
        items.appendChild(el("button", "nav-item soon", `${t.name} <span class="tag">SOON</span>`));
      } else {
        const b = el("button", "nav-item", t.name);
        b.addEventListener("click", () => route(t.id));
        navButtons[t.id] = b;
        items.appendChild(b);
      }
    });
    g.appendChild(items);
    navEl.appendChild(g);
  });

  function setExpandedGroup(name) {
    Object.entries(navGroups).forEach(([gname, g]) => {
      const isOpen = gname === name;
      g.classList.toggle("expanded", isOpen);
      g.querySelector(".nav-label").setAttribute("aria-expanded", String(isOpen));
    });
  }

  const appEl = document.getElementById("app");
  const sidebarToggle = document.getElementById("sidebarToggle");
  sidebarToggle.addEventListener("click", () => {
    const collapsed = appEl.classList.toggle("sidebar-collapsed");
    sidebarToggle.setAttribute("aria-label", collapsed ? "Expand sidebar" : "Collapse sidebar");
    sidebarToggle.title = collapsed ? "Expand sidebar" : "Collapse sidebar";
  });

  const mobileNavToggle = document.getElementById("mobileNavToggle");
  const sidebarBackdrop = document.getElementById("sidebarBackdrop");
  function setMobileNavOpen(open) {
    appEl.classList.toggle("mobile-nav-open", open);
    mobileNavToggle.setAttribute("aria-expanded", String(open));
    mobileNavToggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
  }
  mobileNavToggle.addEventListener("click", () => setMobileNavOpen(!appEl.classList.contains("mobile-nav-open")));
  sidebarBackdrop.addEventListener("click", () => setMobileNavOpen(false));

  function route(id) {
    const mod = MODULES[id]; if (!mod) return;
    Object.values(navButtons).forEach(b => b.classList.remove("active"));
    navButtons[id].classList.add("active");
    setExpandedGroup(toolDiscipline[id]);
    setMobileNavOpen(false);
    viewEl.innerHTML = `
      <div class="crumb">${mod.discipline} / <b>${mod.title.replace(/ calculator$/i, "").toUpperCase()}</b></div>
      <h1 class="title">${mod.title}</h1>
      <p class="subtitle">${mod.subtitle}</p>
      <div id="tool-root"></div>`;
    mod.mount(document.getElementById("tool-root"));
  }

  route("ohms");
})();
</script>
</body>
</html>
